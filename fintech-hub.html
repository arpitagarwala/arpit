<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>React FinTech Hub (Firebase Enabled)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
    .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- ENHANCED CLOUD/LOCAL DATABASE ENGINE ---
    // Simulates Firebase/Supabase connection. Falls back to persistent IndexedDB/LocalStorage logic.
    const CloudDB = {
      loginWithGoogle: async () => {
        // Simulate OAuth Popup
        return new Promise(resolve => {
            setTimeout(() => {
                let existingUser = JSON.parse(localStorage.getItem('finhub_user'));
                if(!existingUser) {
                    existingUser = { uid: 'google_user_' + Math.floor(Math.random()*10000), name: 'Arpit Agarwala (Signed In)', email: 'arpit@google.com', balance: 14250.75, joined: new Date().getFullYear() };
                    localStorage.setItem('finhub_user', JSON.stringify(existingUser));
                }
                resolve(existingUser);
            }, 1000); // UI delay for effect
        });
      },
      logout: () => {
         localStorage.removeItem('finhub_user');
      },
      getUser: () => {
         return JSON.parse(localStorage.getItem('finhub_user'));
      },
      getTransactions: () => {
         const tx = localStorage.getItem('finhub_tx');
         if(tx) return JSON.parse(tx);
         // Initial seeding
         const initial = [
            { id: 1, type: 'Send', amount: -250.00, to: 'Google Cloud Platform', date: 'Oct 24, 2026', icon: 'ri-cloud-fill' },
            { id: 2, type: 'Receive', amount: 3000.00, to: 'Freelance Payout', date: 'Oct 22, 2026', icon: 'ri-briefcase-4-line' }
         ];
         localStorage.setItem('finhub_tx', JSON.stringify(initial));
         return initial;
      },
      addTransaction: (tx) => {
         const list = CloudDB.getTransactions();
         list.unshift({ ...tx, id: Date.now() });
         localStorage.setItem('finhub_tx', JSON.stringify(list));
      }
    };

    // --- COMPONENTS ---
    const Sidebar = ({ activeTab, setActiveTab, user, handleLogout }) => (
      <aside className="w-16 lg:w-64 h-screen bg-slate-900 text-white flex flex-col fixed left-0 top-0 pt-8 pb-6 lg:px-4 transition-all z-50 overflow-hidden">
        <div className="flex items-center justify-center lg:justify-start gap-3 px-0 lg:px-4 mb-10 overflow-hidden shrink-0">
          <div className="w-8 h-8 rounded-lg bg-indigo-500 flex items-center justify-center shadow-lg shadow-indigo-500/50 shrink-0">
            <i className="ri-bank-card-line text-white"></i>
          </div>
          <h1 className="font-extrabold text-xl tracking-tight hidden lg:block">FinHub</h1>
        </div>

        <nav className="flex-1 flex flex-col gap-2 px-2 lg:px-0">
          {['Dashboard', 'Transactions', 'Cards', 'Settings'].map(tab => (
            <button key={tab} title={tab}
                    onClick={() => setActiveTab(tab)}
                    className={`flex items-center gap-3 lg:px-4 py-3 rounded-xl transition-all font-semibold justify-center lg:justify-start ${activeTab === tab ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400 hover:text-white hover:bg-slate-800'}`}>
              <i className={`${
                tab === 'Dashboard' ? 'ri-dashboard-line' : 
                tab === 'Transactions' ? 'ri-swap-line' : 
                tab === 'Cards' ? 'ri-wallet-3-line' : 'ri-settings-4-line'
              } text-xl lg:text-base`}></i> 
              <span className="hidden lg:block">{tab}</span>
            </button>
          ))}
        </nav>

        <div className="mt-auto px-2 lg:px-4 py-4 rounded-xl bg-slate-800 flex items-center gap-3 mx-2 lg:mx-0 justify-center lg:justify-start cursor-pointer group" onClick={handleLogout} title="Click to Logout">
          <div className="w-10 h-10 rounded-full bg-slate-700 flex items-center justify-center shrink-0 group-hover:bg-rose-500 transition">
            <i className="ri-user-fill group-hover:hidden"></i>
            <i className="ri-logout-box-r-line hidden group-hover:block text-white"></i>
          </div>
          <div className="overflow-hidden hidden lg:block">
            <h4 className="font-bold text-sm truncate">{user.name}</h4>
            <p className="text-[10px] text-slate-400 truncate mt-0.5">{user.email}</p>
          </div>
        </div>
      </aside>
    );

    const Dashboard = ({ user, transactions }) => {
      const balance = user.balance.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
      return (
        <div className="space-y-6 animate-fade-in">
          {/* Top Metric Cards */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="bg-gradient-to-br from-indigo-600 to-violet-700 p-6 rounded-3xl text-white shadow-xl shadow-indigo-200 h-40 flex flex-col justify-between hover:scale-[1.02] transition-transform">
              <span className="text-indigo-100 font-semibold text-sm flex items-center gap-2"><i className="ri-wallet-3-fill"></i> Total Balance</span>
              <h2 className="text-4xl font-extrabold">{balance}</h2>
            </div>
            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-40 flex flex-col justify-between hover:scale-[1.02] transition-transform relative overflow-hidden">
              <i className="ri-arrow-right-up-fill text-9xl text-emerald-50 absolute -right-5 -top-5 z-0"></i>
              <span className="text-slate-400 font-semibold text-sm flex items-center gap-2 relative z-10"><i className="ri-arrow-right-up-fill text-emerald-500"></i> Lifetime Income</span>
              <div className="relative z-10">
                <h2 className="text-3xl font-extrabold text-slate-800">$14,250.00</h2>
              </div>
            </div>
            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm h-40 flex flex-col justify-between hover:scale-[1.02] transition-transform relative overflow-hidden">
             <i className="ri-arrow-right-down-fill text-9xl text-rose-50 absolute -right-5 -bottom-5 z-0"></i>
              <span className="text-slate-400 font-semibold text-sm flex items-center gap-2 relative z-10"><i className="ri-arrow-right-down-fill text-rose-500"></i> Lifetime Expenses</span>
              <div className="relative z-10">
                <h2 className="text-3xl font-extrabold text-slate-800">$2,412.00</h2>
              </div>
            </div>
          </div>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div className="lg:col-span-2 bg-white rounded-3xl shadow-sm border border-slate-100 p-6 overflow-hidden">
              <div className="flex justify-between items-end mb-6">
                <h3 className="text-lg font-extrabold text-slate-800">Recent Transactions Database</h3>
              </div>
              <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                {transactions.length === 0 && <p className="text-slate-400 text-sm italic">No transactions in database.</p>}
                {transactions.map(t => (
                  <div key={t.id} className="flex items-center justify-between p-3 rounded-2xl hover:bg-slate-50 border border-transparent hover:border-slate-100 transition cursor-pointer group">
                    <div className="flex items-center gap-4">
                      <div className={`w-12 h-12 rounded-full flex items-center justify-center transition-all ${t.amount > 0 ? 'bg-emerald-100 text-emerald-600 group-hover:bg-emerald-500 group-hover:text-white' : 'bg-rose-100 text-rose-600 group-hover:bg-rose-500 group-hover:text-white'}`}>
                        <i className={`${t.icon} text-xl`}></i>
                      </div>
                      <div>
                        <h4 className="font-extrabold text-slate-800">{t.to}</h4>
                        <p className="text-xs text-slate-400 font-semibold">{t.date}</p>
                      </div>
                    </div>
                    <span className={`font-extrabold text-lg ${t.amount > 0 ? 'text-emerald-500' : 'text-slate-800'}`}>
                      {t.amount > 0 ? '+' : ''}{t.amount.toLocaleString('en-US',{style:'currency',currency:'USD'})}
                    </span>
                  </div>
                ))}
              </div>
            </div>
            
            <div className="bg-slate-900 rounded-3xl p-6 text-white flex flex-col justify-start shadow-xl gap-4">
              <h3 className="font-extrabold">Send Money (DB Push)</h3>
              <form onSubmit={e => e.preventDefault()} className="flex flex-col gap-3">
                <input type="text" placeholder="Recipient Name" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-500" id="db-rec"/>
                <input type="number" placeholder="Amount ($)" className="w-full bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 text-sm outline-none focus:border-indigo-500" id="db-amt"/>
                <button 
                  onClick={() => {
                     const r = document.getElementById('db-rec').value;
                     const a = document.getElementById('db-amt').value;
                     if(r && a) {
                       CloudDB.addTransaction({type:'Send', amount: -Math.abs(parseFloat(a)), to: r, date: new Date().toLocaleDateString(), icon: 'ri-user-smile-line'});
                       window.location.reload(); // Refresh component
                     }
                  }}
                  className="w-full bg-indigo-600 hover:bg-indigo-500 font-bold rounded-xl py-3 transition mt-2">Transfer to Database</button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    const App = () => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [activeTab, setActiveTab] = useState('Dashboard');
      const [tx, setTx] = useState([]);

      useEffect(() => {
        // Init check database
        const loadedUser = CloudDB.getUser();
        if(loadedUser) {
            setUser(loadedUser);
            setTx(CloudDB.getTransactions());
        }
        setLoading(false);
      }, []);

      const handleLogin = async () => {
        setLoading(true);
        const u = await CloudDB.loginWithGoogle();
        setUser(u);
        setTx(CloudDB.getTransactions());
        setLoading(false);
      };

      const handleLogout = () => {
        CloudDB.logout();
        setUser(null);
      };

      if(loading) {
          return <div className="h-screen w-full flex items-center justify-center bg-slate-50"><div className="w-8 h-8 rounded-full border-4 border-slate-200 border-t-indigo-600 animate-spin"></div></div>
      }

      if(!user) {
          return (
              <div className="h-screen w-full flex items-center justify-center bg-slate-50 relative overflow-hidden">
                <div className="absolute top-0 right-0 w-96 h-96 bg-indigo-500 rounded-full blur-[100px] opacity-20 hidden md:block"></div>
                <div className="absolute bottom-0 left-0 w-96 h-96 bg-emerald-500 rounded-full blur-[100px] opacity-20 hidden md:block"></div>
                
                <div className="glass p-10 rounded-3xl shadow-2xl max-w-sm w-full text-center relative z-10 mb-[10vh]">
                    <div className="w-16 h-16 rounded-2xl bg-indigo-600 mx-auto mb-6 flex items-center justify-center shadow-lg shadow-indigo-500/50">
                        <i className="ri-bank-card-line text-white text-3xl"></i>
                    </div>
                    <h1 className="text-3xl font-extrabold tracking-tight text-slate-800 mb-2">FinHub API</h1>
                    <p className="text-slate-500 text-sm mb-8 font-medium">To protect your financial data, please authenticate with the secure database.</p>
                    
                    <button onClick={handleLogin} className="w-full bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 font-bold py-3.5 px-4 rounded-xl shadow-sm flex items-center justify-center gap-3 transition active:scale-95">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" className="w-5 h-5" alt="Google"/>
                        Sign in with Google
                    </button>
                    
                    <p className="mt-6 text-[10px] text-slate-400 font-semibold uppercase tracking-widest text-center">Connected via Simulated Firebase Auth</p>
                </div>
              </div>
          );
      }

      return (
        <div className="flex min-h-screen">
          <Sidebar activeTab={activeTab} setActiveTab={setActiveTab} user={user} handleLogout={handleLogout} />
          
          <main className="flex-1 ml-16 lg:ml-64 relative bg-slate-50 min-h-screen">
            <header className="h-20 flex items-center justify-between px-6 lg:px-8 bg-white/70 backdrop-blur border-b border-slate-200/50 sticky top-0 z-10 transition-all">
              <div>
                <h2 className="text-lg lg:text-2xl font-extrabold text-slate-800 truncate">Welcome back, {user.name.split(' ')[0]} 👋</h2>
              </div>
              <div className="flex items-center gap-4 shrink-0">
                <a href="projects.html" className="text-xs lg:text-sm font-bold text-slate-400 hover:text-indigo-600 border border-slate-200 bg-white px-3 py-1.5 rounded-lg shadow-sm">Exit App</a>
              </div>
            </header>
            
            <div className="p-4 lg:p-8 max-w-6xl mx-auto">
              {activeTab === 'Dashboard' && <Dashboard user={user} transactions={tx} />}
              {activeTab !== 'Dashboard' && (
                <div className="flex flex-col items-center justify-center py-20 text-slate-400 animate-fade-in">
                  <i className="ri-database-2-fill text-6xl mb-4 text-slate-200"></i>
                  <h2 className="text-2xl font-bold text-slate-600 mb-2">{activeTab} Database</h2>
                  <p className="max-w-md text-center">This cloud module is actively syncing. Please utilize the Dashboard to verify database transaction pushing.</p>
                </div>
              )}
            </div>
          </main>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
