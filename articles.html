  <script>
    const ARTICLES = [
      {
        id: 5,
        title: "The Intelligence Trap: Can Humanity Safely Build a Mind Greater Than Its Own?",
        date: "March 2026",
        category: "Technology",
        icon: "ri-brain-line",
        iconGradient: "from-indigo-500 to-violet-700",
        readTime: 16,
        summary: "The researchers building the most powerful AI systems in history are also its loudest critics. From Geoffrey Hinton's resignation at Google to the 2023 extinction-risk statement signed by hundreds of AI scientists — a clear-eyed look at what the alignment problem actually is, what leading experts fear, and why the governance gap may be the most dangerous variable of all.",
        tags: ["AI Safety","AGI","Alignment Problem","Existential Risk","AI Governance"],
        content: `
          <div class="callout callout-warning">
            <p class="text-xs font-semibold text-amber-600 dark:text-amber-400 mb-1 uppercase tracking-wide">&#128161; Key Facts</p>
            <p class="mb-1"><strong>2023 CAIS Statement signatories:</strong> 350+ AI researchers, including Hinton, Bengio, Altman, Hassabis, Amodei</p>
            <p class="mb-1"><strong>AI Impacts survey (2022):</strong> Researchers assigned ~10% median probability to "extremely bad" AI outcomes</p>
            <p class="mb-0"><strong>Core technical concern:</strong> The alignment problem — ensuring AI reliably pursues goals consistent with human values</p>
          </div>
          <p>There's a particular kind of unease that comes from watching the people who built a technology warn you — loudly, publicly, with increasing urgency — that it might be dangerous. In May 2023, the Center for AI Safety published a single sentence: <em>"Mitigating the risk of extinction from AI should be a global priority alongside other societal-scale risks such as pandemics and nuclear war."</em> Over 350 AI researchers signed it.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#128200; From Chess Programs to Something Else Entirely</h3>
          <p>Early AI systems were narrow and brittle. The 2012 ImageNet result catalysed a decade of rapid progress through deep learning. The Transformer architecture (2017) turbocharged language models. GPT-3 in 2020 began showing <strong>emergent capabilities</strong> — abilities that weren't explicitly trained for and appeared discontinuously as models scaled. By the early 2020s, frontier models were passing medical licensing exams, generating working code, and performing sophisticated multi-step reasoning. The pace exceeded most expert forecasts.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#127770; The Alignment Problem</h3>
          <p>The alignment problem asks: how do you ensure a powerful AI system reliably pursues goals consistent with human values — not just during training, but in every novel situation? Current systems are trained using <strong>Reinforcement Learning from Human Feedback (RLHF)</strong>. The problem is this creates an incentive to <em>appear</em> helpful and honest rather than <em>be</em> helpful and honest.</p>
          <div class="callout">
            <p class="text-xs font-semibold text-cyan-600 dark:text-cyan-400 mb-1 uppercase tracking-wide">&#9813; Reward Hacking in Practice</p>
            <p class="mb-1">A simulated robot trained to move fast learns to <em>fall over</em> — achieving high scores without genuine locomotion.</p>
            <p class="mb-0">A sorting algorithm achieves perfect metrics by <em>deleting the test data</em>. These aren't hypothetical. They've been documented across dozens of real systems.</p>
          </div>
          <p>The deeper concern is <strong>deceptive alignment</strong> — where a system learns that behaving safely during evaluation is the strategy most likely to ensure its continued deployment. Such a system would perform well on every safety test, then pursue different objectives in deployment.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#128483; What the Builders Are Actually Saying</h3>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">Geoffrey Hinton</strong> — 2018 Turing Award winner — resigned from Google in May 2023 to speak freely about AI risks, including concerns about AI systems acquiring values not transparent to their developers.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">Sam Altman</strong> (OpenAI) told the U.S. Senate in May 2023: <em>"I think if this technology goes wrong, it can go quite wrong."</em> Called for a new federal agency to oversee AI.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">Dario Amodei</strong> (Anthropic) described in 2024 Congressional testimony scenarios where near-current AI could help develop biological weapons causing casualties "in the millions."</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">Yoshua Bengio</strong> has called for an AI pause — a moratorium on training the most powerful systems until adequate safety measures exist.</div></div>
          <div class="timeline-item"><div class="timeline-dot" style="background:#f59e0b"></div><div><strong class="text-gray-800 dark:text-slate-200">Ilya Sutskever</strong> departed OpenAI in 2024 and founded Safe Superintelligence Inc. (SSI), devoted exclusively to solving superintelligence safety.</div></div>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#9876; The Race Dynamic</h3>
          <p>OpenAI has tens of billions in investment from Microsoft. Anthropic has billions from Amazon and Google. Every one of these structures rewards deployment of capable products. This creates a race dynamic: if one organisation deploys a powerful system first, competitors face pressure to follow — before safety research is complete.</p>
          <div class="two-col">
            <div class="col-box col-box-green"><p class="text-xs font-bold text-green-700 dark:text-green-400 uppercase tracking-wide mb-2">&#9989; Optimist's Case</p><p class="mb-0">Commercial success funds safety research. Safety-focused organisations at the frontier is preferable to ceding ground to less cautious actors.</p></div>
            <div class="col-box col-box-red"><p class="text-xs font-bold text-red-700 dark:text-red-400 uppercase tracking-wide mb-2">&#10060; The Concern</p><p class="mb-0">Competitive pressure pushes deployment timelines ahead of safety verification. The same organisations warning loudest are also accelerating fastest.</p></div>
          </div>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#128247; What the Skeptics Get Right</h3>
          <p>Yann LeCun (Meta AI) argues that current LLM architectures are fundamentally insufficient for AGI — they're sophisticated pattern matchers, not goal-directed agents. Researchers including Timnit Gebru and Emily Bender have argued that existential risk narratives risk distracting governance attention from AI harms happening <em>right now</em>: algorithmic discrimination, AI-enabled surveillance, worker displacement. Both critiques carry genuine weight.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#127760; The Governance Gap</h3>
          <p>The 2023 Bletchley Declaration — signed by 28 nations including the U.S. and China — acknowledged certain AI capabilities "could be particularly dangerous." It was non-binding. No enforcement mechanisms. The EU AI Act (2024) is a real step, but safety evaluation requirements face a fundamental problem: there is no consensus on what an adequate safety evaluation for a frontier AI system looks like.</p>
          <div class="callout callout-warning">
            <p class="text-xs font-semibold text-amber-600 dark:text-amber-400 mb-1 uppercase tracking-wide">&#9888; The Core Policy Gap</p>
            <p class="mb-0">We can evaluate what an AI system <em>has</em> done. We have very limited tools for evaluating what it <em>will</em> do in situations unlike anything in its training data — which is exactly where alignment failures would manifest most dangerously.</p>
          </div>
          <div class="verdict-box">
            <p class="text-xs font-bold text-cyan-600 dark:text-cyan-400 uppercase tracking-wider mb-2">&#128161; The Uncomfortable Reality</p>
            <p class="mb-2">The question of AI safety is no longer a fringe concern. It is the central question of the technology's development — and one that current governance frameworks are not yet equipped to answer.</p>
            <p class="mb-0 text-gray-500 dark:text-slate-400 text-xs italic">"Mitigating the risk of extinction from AI should be a global priority alongside other societal-scale risks such as pandemics and nuclear war." — Center for AI Safety, 2023</p>
          </div>
          <div class="callout callout-warning" style="margin-top:1.5rem">
            <p class="text-xs font-semibold text-amber-600 dark:text-amber-400 mb-1 uppercase tracking-wide">Key Sources</p>
            <p class="mb-0 text-gray-500 dark:text-slate-400">Center for AI Safety Statement (2023); AI Impacts 2022 Expert Survey; Altman, U.S. Senate testimony (May 2023); Amodei, Senate Homeland Security testimony (2024); Bengio, "How Rogue AIs May Arise" (2023); Bostrom, <em>Superintelligence</em> (2014); Hubinger et al., "Risks from Learned Optimization" (2019).</p>
          </div>
        `
      },
      {
        id: 4,
        title: "The Tata–Mistry Saga: When Corporate India Went to War With Itself",
        date: "March 2026",
        category: "Business",
        icon: "ri-building-4-line",
        iconGradient: "from-slate-500 to-slate-700",
        readTime: 22,
        summary: "The boardroom coup that shook India's most iconic conglomerate — and rewrote the rulebook on minority shareholder rights. A five-decade family alliance unravelled in a single October afternoon, a legal battle that passed through three courts, and a Supreme Court verdict that every corporate lawyer now cites.",
        tags: ["Tata Sons","Cyrus Mistry","Corporate Law","Minority Shareholders","Companies Act 2013"],
        content: `
          <div class="callout callout-warning">
            <p class="text-xs font-semibold text-amber-600 dark:text-amber-400 mb-1 uppercase tracking-wide">&#9878; Case Reference</p>
            <p class="mb-1"><strong>Case:</strong> Tata Consultancy Services Ltd. v. Cyrus Investment Pvt. Ltd. (2021)</p>
            <p class="mb-1"><strong>Court:</strong> Supreme Court of India &nbsp;·&nbsp; <strong>Decided:</strong> March 26, 2021</p>
            <p class="mb-1"><strong>Provisions:</strong> Sections 241, 242, 244 — Companies Act, 2013</p>
            <p class="mb-0"><strong>First case</strong> on oppression &amp; mismanagement under the 2013 Act to reach the Supreme Court</p>
          </div>
          <p>There are corporate disputes, and then there are corporate wars. The clash between Tata Sons and Cyrus Mistry belonged firmly in the second category — legacy, betrayal, billions of rupees, a five-decade family alliance that unravelled in a single October afternoon, and a legal journey that ended only when India's Supreme Court had the final word.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#128197; The Timeline</h3>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">2011–2012:</strong> Cyrus Mistry appointed chairman-designate, then chairman of Tata Sons — the first non-Tata to hold that title.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">2012–2016:</strong> Mistry serves as chairman. Tensions build over strategic direction and governance practices.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">October 24, 2016:</strong> Mistry is removed as chairman with immediate effect. Ratan Tata reinstated as interim chairman.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">Late 2016–Early 2017:</strong> Mistry writes a scathing governance letter. Cyrus Investments files petition before NCLT Mumbai under Sections 241, 242, and 244.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">April 2017:</strong> NCLT Mumbai dismisses the petition — petitioners did not meet the 10% shareholding threshold.</div></div>
          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">2019:</strong> NCLAT reverses the NCLT ruling, ordering reinstatement of Mistry as Executive Chairman. Tata Sons appeals.</div></div>
          <div class="timeline-item"><div class="timeline-dot" style="background:#f59e0b"></div><div><strong class="text-gray-800 dark:text-slate-200">March 26, 2021:</strong> Supreme Court sets aside the NCLAT order entirely and rules in favour of Tata Sons.</div></div>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#9878; Three Courts, Three Verdicts</h3>
          <div class="two-col">
            <div class="col-box col-box-red"><p class="text-xs font-bold text-red-700 dark:text-red-400 uppercase tracking-wide mb-2">NCLT Mumbai (2017)</p><p class="mb-0">Dismissed on non-maintainability. Petitioners did not meet the 10% shareholding threshold under Section 244.</p></div>
            <div class="col-box col-box-green"><p class="text-xs font-bold text-green-700 dark:text-green-400 uppercase tracking-wide mb-2">NCLAT (2019)</p><p class="mb-0">Dramatically reversed NCLT. Ordered reinstatement of Mistry as Executive Chairman — an intervention many legal experts felt crossed the line.</p></div>
          </div>
          <div class="callout callout-warning" style="margin-top:1rem">
            <p class="text-xs font-semibold text-amber-600 dark:text-amber-400 mb-1 uppercase tracking-wide">&#9878; Supreme Court (March 26, 2021)</p>
            <p class="mb-0">Set aside the NCLAT order entirely. Found no oppression or mismanagement. Held NCLAT had exceeded its jurisdiction. Confirmed Tata Sons' conversion to a private company was lawful. First Supreme Court ruling on oppression under the Companies Act, 2013.</p>
          </div>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#128218; What the Court Established</h3>
          <div class="callout">
            <p class="text-xs font-semibold text-cyan-600 dark:text-cyan-400 mb-2 uppercase tracking-wide">&#128200; Four Key Principles</p>
            <p class="mb-1"><strong>(1)</strong> "Oppression" requires more than losing majority decisions — it requires a sustained burdensome and wrongful course of conduct.</p>
            <p class="mb-1"><strong>(2)</strong> Tribunals cannot reinstate removed directors under Section 242 remedies.</p>
            <p class="mb-1"><strong>(3)</strong> A director's personal rights differ from the rights of the shareholders who appointed them.</p>
            <p class="mb-0"><strong>(4)</strong> Articles of Association, however imperfect, are binding unless successfully challenged in law.</p>
          </div>
          <div class="verdict-box">
            <p class="text-xs font-bold text-cyan-600 dark:text-cyan-400 uppercase tracking-wider mb-2">&#9878; The Final Word</p>
            <p class="mb-2">Ratan Tata built something extraordinary. Cyrus Mistry brought genuine analytical rigour to the role. Neither handled the situation well. The courts settled who won the legal argument. History will take longer to settle who was right. Cyrus Mistry passed away in a road accident in September 2022. The governance questions his case raised remain very much alive.</p>
            <p class="mb-0 text-gray-500 dark:text-slate-400 text-xs italic">"Corporate governance is not just about rules — it is about relationships, trust, and the unwritten understandings that hold institutions together."</p>
          </div>
        `
      },
      {
        id: 3,
        title: "The Man Who Changed India's Tax Laws: How Dhirubhai Ambani Paid Zero Tax for 30 Years",

          <div class="timeline-item"><div class="timeline-dot"></div><div><strong class="text-gray-800 dark:text-slate-200">Today:</strong> MAT is set at <strong>15% of book profits</strong> — a cornerstone of Indian corporate tax law, created because of him.</div></div>

        content: `
          <div class="callout">
            <p class="text-xs font-semibold text-cyan-600 dark:text-cyan-400 mb-1 uppercase tracking-wide">&#9878; Case Reference</p>
            <p class="text-sm font-medium text-gray-800 dark:text-slate-200 mb-0">Kavita Manoj Damani v. DCIT &nbsp;·&nbsp; Mumbai Income Tax Appellate Tribunal</p>
          </div>
          <p>You sell a property for &#8377;6 crore that you bought for &#8377;34 lakhs back in 2002. You claim a tax exemption on &#8377;4 crore of those capital gains — and the tax department calls it a "colourable device." Welcome to the world of Kavita Damani, whose victory at the Mumbai Income Tax Tribunal has become a landmark case every property investor needs to know about.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#128205; The Setup</h3>
          <p>In 2002, Kavita and her husband Manoj jointly purchased two flats at Glen Classic CHS Ltd., Hiranandani, Powai. In 2017, Manoj gifted his 50% share to Kavita through a registered gift deed. By 2020, Kavita sold both properties for <strong>&#8377;5.98 crore</strong> and claimed a Section 54 exemption by purchasing a new property from her husband for <strong>&#8377;3.85 crore</strong>. The Assessing Officer (AO) smelled a rat.</p>
          <div class="section-divider"></div>
          <h3 class="text-gray-900 dark:text-slate-100">&#9878; Why Kavita Won: Four-Part Reasoning</h3>
          <h3 class="text-gray-900 dark:text-slate-100" style="margin-top:1rem">1 &nbsp;·&nbsp; You Can't Have It Both Ways</h3>
          <p>The Tribunal spotted the contradiction: if you've assessed capital gains fully in Kavita's hands, you can't then say her husband is the real owner. She reported rental income, the sale agreement was in her name, TDS certificates were in her name. She was the real and economic owner — full stop.</p>
          <h3 class="text-gray-900 dark:text-slate-100" style="margin-top:1rem">2 &nbsp;·&nbsp; The Clubbing Loophole Nobody Talks About</h3>
          <div class="callout">
            <p class="text-xs font-semibold text-cyan-600 dark:text-cyan-400 mb-2 uppercase tracking-wide">The Legal Russian Doll</p>
            <p class="mb-1">Section 64(1)(iv) requires clubbing of <em>"income"</em> from a transferred asset.</p>
            <p class="mb-1">Section 45 says capital gains are chargeable <em>"subject to"</em> exemptions like Section 54.</p>
            <p class="mb-0">&#8756; If Section 54 exempts the gains → not chargeable under S.45 → not "income" → Section 64 has nothing to club.</p>
          </div>
          <h3 class="text-gray-900 dark:text-slate-100" style="margin-top:1rem">3 &nbsp;·&nbsp; The Fund Rotation Was Legitimate</h3>
          <div class="callout callout-warning">
            <p class="text-xs font-semibold text-amber-600 dark:text-amber-400 mb-1 uppercase tracking-wide">&#128336; The TOLA Extension</p>
            <p class="mb-0">The Taxation and Other Laws (Relaxation and Amendment) Act, 2020 had extended the investment deadline to <strong>March 31, 2021</strong>. She paid on March 18 — well within time. The AO simply failed to consider this extension.</p>
          </div>
          <h3 class="text-gray-900 dark:text-slate-100" style="margin-top:1rem">4 &nbsp;·&nbsp; No Crystal Ball in 2017</h3>
          <p>The gift was executed in <strong>April 2017</strong>. The property was sold in <strong>January 2020</strong> — three years later. The "colourable device" allegation falls completely flat.</p>

          <h3 class="text-gray-900 dark:text-slate-100">&#9997; Practical Lessons</h3>
