<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎨 Arpit's Notepad</title>

  <!-- Tailwind & Dark Mode -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class'
    };
  </script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-900 text-slate-100 dark:bg-rose-50 dark:text-rose-900 transition-colors duration-300 p-6">

  <!-- Theme Toggle -->
  <div class="fixed top-4 right-4 z-50">
    <button onclick="toggleTheme()" class="bg-slate-700 text-slate-200 dark:bg-slate-200 dark:text-slate-900 p-2 rounded-full shadow hover:scale-105 transition">
      <i id="theme-icon" class="ri-moon-line text-xl"></i>
    </button>
  </div>

  <!-- Notes App -->
  <div class="max-w-3xl w-full space-y-6">
    <h1 class="text-2xl font-bold text-center">📝 Colorful Notes</h1>

    <!-- New Note Form -->
    <div id="note-form" class="p-4 rounded-lg transition shadow bg-rose-100 dark:bg-rose-950 text-rose-900 dark:text-rose-100">
      <input type="text" id="note-title" placeholder="Title" class="w-full p-2 mb-2 rounded bg-rose-50 dark:bg-rose-900 text-rose-900 dark:text-rose-100" />
      <textarea id="note-body" placeholder="Write your note..." class="w-full p-2 h-32 rounded bg-rose-50 dark:bg-rose-900 text-rose-900 dark:text-rose-100"></textarea>

      <!-- Color Picker -->
      <div class="flex items-center gap-3 mt-4">
        <span class="text-sm font-semibold dark:text-rose-200">Pick a color:</span>
        <div class="flex gap-2">
          <button class="w-6 h-6 rounded-full bg-rose-400 ring-2 ring-white" onclick="setColor('rose')" title="Rose"></button>
          <button class="w-6 h-6 rounded-full bg-blue-400" onclick="setColor('blue')" title="Blue"></button>
          <button class="w-6 h-6 rounded-full bg-green-400" onclick="setColor('green')" title="Green"></button>
          <button class="w-6 h-6 rounded-full bg-yellow-300" onclick="setColor('yellow')" title="Yellow"></button>
          <button class="w-6 h-6 rounded-full bg-purple-400" onclick="setColor('purple')" title="Purple"></button>
        </div>
      </div>

      <button id="add-note-btn" onclick="addNote()" class="mt-4 w-full bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded">➕ Add Note</button>

    </div>

    <!-- Notes List -->
    <div id="notes-container" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
  </div>

<script>
  // Theme logic
  if (localStorage.theme === 'dark' || !('theme' in localStorage)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }

  function toggleTheme() {
    const html = document.documentElement;
    const icon = document.getElementById("theme-icon");
    if (html.classList.contains("dark")) {
      html.classList.remove("dark");
      localStorage.theme = "light";
      icon.className = "ri-moon-line text-xl";
    } else {
      html.classList.add("dark");
      localStorage.theme = "dark";
      icon.className = "ri-sun-line text-xl";
    }
  }

  const storageKey = "arpit-colored-notes";
  let notes = JSON.parse(localStorage.getItem(storageKey)) || [];
  let currentColor = "rose"; // default

  const colorMap = {
    rose: {
  form: "bg-rose-100 dark:bg-rose-800 text-rose-900 dark:text-rose-100",
  input: "bg-rose-50 dark:bg-rose-500 text-rose-900 dark:text-rose-100",
  note: "bg-rose-200 dark:bg-rose-900 text-rose-900 dark:text-rose-100",
  button: "bg-rose-500 hover:bg-rose-600 text-white"
},
blue: {
  form: "bg-blue-100 dark:bg-blue-950 text-blue-900 dark:text-blue-100",
  input: "bg-blue-50 dark:bg-blue-900 text-blue-900 dark:text-blue-100",
  note: "bg-blue-200 dark:bg-blue-900 text-blue-900 dark:text-blue-100",
  button: "bg-blue-500 hover:bg-blue-600 text-white"
},
green: {
  form: "bg-green-100 dark:bg-green-800 text-green-900 dark:text-green-100",
  input: "bg-green-50 dark:bg-green-700 text-green-900 dark:text-green-100",
  note: "bg-green-200 dark:bg-green-900 text-green-900 dark:text-green-100",
  button: "bg-green-700 hover:bg-green-600 text-white"
},
yellow: {
  form: "bg-yellow-50 dark:bg-yellow-800 text-yellow-900 dark:text-yellow-100",
  input: "bg-yellow-100 dark:bg-yellow-700 text-yellow-900 dark:text-yellow-100",
  note: "bg-yellow-200 dark:bg-yellow-900 text-yellow-900 dark:text-yellow-100",
  button: "bg-yellow-500 hover:bg-yellow-600 text-black"
},
purple: {
  form: "bg-purple-100 dark:bg-purple-950 text-purple-900 dark:text-purple-100",
  input: "bg-purple-50 dark:bg-purple-900 text-purple-900 dark:text-purple-100",
  note: "bg-purple-200 dark:bg-purple-900 text-purple-900 dark:text-purple-100",
  button: "bg-purple-500 hover:bg-purple-600 text-white"
}

  };

  function setColor(color) {
  currentColor = color;
  const form = document.getElementById("note-form");
  const input = document.getElementById("note-title");
  const textarea = document.getElementById("note-body");
  const addButton = document.getElementById("add-note-btn");

  form.className = `p-4 rounded-lg transition shadow ${colorMap[color].form}`;
  input.className = `w-full p-2 mb-2 rounded ${colorMap[color].input}`;
  textarea.className = `w-full p-2 h-32 rounded ${colorMap[color].input}`;
  addButton.className = `mt-4 w-full px-4 py-2 rounded ${colorMap[color].button}`;
}

function deleteNote(index) {
  if (confirm("Are you sure you want to delete this note?")) {
    notes.splice(index, 1);
    saveNotes();
    renderNotes();
  }
}


  function saveNotes() {
    localStorage.setItem(storageKey, JSON.stringify(notes));
  }

  function renderNotes() {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";

  if (notes.length === 0) {
    container.innerHTML = '<p class="text-center text-slate-400 dark:text-rose-600 col-span-full">No notes yet!</p>';
    return;
  }

  notes.forEach((note, index) => {
    const colorClass = colorMap[note.color]?.note || colorMap.rose.note;
    const card = document.createElement("div");
    card.className = `p-4 rounded-lg relative shadow transition ${colorClass}`;
    card.innerHTML = `
      <h3 class="font-semibold text-lg">${note.title || "Untitled"}</h3>
      <p class="text-sm mt-1 whitespace-pre-wrap">${note.body}</p>
      <div class="absolute top-2 right-2 flex gap-2 text-sm">
        <button onclick="editNote(${index})" class="text-blue-400 hover:text-blue-600">✏️</button>
        <button onclick="deleteNote(${index})" class="text-red-400 hover:text-red-600">🗑️</button>
      </div>
    `;
    container.appendChild(card);
  });
}


  function addNote() {
    const title = document.getElementById("note-title").value.trim();
    const body = document.getElementById("note-body").value.trim();
    if (!body) return;

    notes.unshift({ title, body, color: currentColor });
    saveNotes();
    renderNotes();

    document.getElementById("note-title").value = "";
    document.getElementById("note-body").value = "";
  }

  function editNote(index) {
  const note = notes[index];
  document.getElementById("note-title").value = note.title;
  document.getElementById("note-body").value = note.body;
  currentColor = note.color;
  setColor(currentColor);

  // Remove the note temporarily until resubmitted
  notes.splice(index, 1);
  saveNotes();
  renderNotes();
}


  renderNotes();
  setColor(currentColor);
</script>
</body>
</html>
