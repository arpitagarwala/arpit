<body class="transition-colors duration-300 overflow-x-hidden bg-slate-950 text-slate-200">

  <div class="fixed top-4 left-4 z-50 pointer-events-auto">

  <!-- Uniform Theme Toggle -->

  <!-- Lightbox Modal -->
  <div id="lightbox" onclick="closeLightbox(event)">
    <button id="lightbox-close" onclick="closeLightbox()" aria-label="Close"><i class="ri-close-line"></i></button>
    <img id="lightbox-img" src="" alt="" />
    <div id="lightbox-meta">
      <div id="lightbox-title"></div>
      <div id="lightbox-sub"></div>
    </div>
    <div id="lightbox-nav">
      <button class="lb-nav-btn" onclick="lbNav(-1)" aria-label="Previous"><i class="ri-arrow-left-s-line"></i></button>
      <span id="lightbox-caption"></span>
      <button class="lb-nav-btn" onclick="lbNav(1)" aria-label="Next"><i class="ri-arrow-right-s-line"></i></button>
    </div>
  </div>

  <div class="max-w-5xl mx-auto px-4 pt-10 pb-12">
    <!-- Integrated Premium Header -->
    <div class="mb-8 fade-up">
      <div class="flex flex-col sm:flex-row sm:items-end gap-4 mb-6">
        <div>
          <h1 class="text-4xl sm:text-5xl font-black tracking-tight leading-none" style="background:linear-gradient(135deg,#10b981,#22d3ee,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Gallery</h1>
          <div class="shimmer-underline" style="height:3px;width:72px;background:linear-gradient(90deg,#10b981,#22d3ee);border-radius:99px;margin-top:6px;"></div>
        </div>
        <p class="text-sm max-w-lg pb-1 leading-relaxed text-slate-400">Moments, milestones & memories — a visual story of who I am beyond the code.</p>
      </div>

      <div class="flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-xl border w-fit text-slate-400 bg-slate-800/40 border-slate-700/30">
        <i class="ri-camera-lens-fill text-orange-500"></i>
        <span id="photo-count-badge">0</span> Captures Total
      </div>
    </div>

    <!-- Gallery Grid -->
    <div id="gallery-grid" class="masonry"></div>

    <!-- Empty State -->
    <div id="empty-state" class="hidden flex-col items-center justify-center py-24 text-center">
      <i class="ri-image-2-line text-5xl mb-4 text-slate-700"></i>
      <p class="text-sm font-medium text-slate-400">No photos in this category yet.</p>
      <button onclick="setFilter('all')" class="mt-3 text-xs hover:underline font-semibold text-cyan-400">Show all</button>
    </div>

    <!-- Footer -->
    <div class="mt-10 text-center py-3.5 px-6 rounded-2xl border text-sm bg-slate-800/50 border-slate-700/30 text-slate-500">
      &copy; 2026 Arpit Agarwala. Engineered with <span class="text-red-400">&#10084;&#65039;</span>
    </div>

  </div>

  <script>

      },

        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894896/WhatsApp_Image_2026-03-07_at_7.54.14_PM_d5wdun.jpg',

        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894898/WhatsApp_Image_2026-03-07_at_8.02.35_PM_ncn6ib.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894898/WhatsApp_Image_2026-03-07_at_8.02.35_PM_ncn6ib.jpg',

        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894898/WhatsApp_Image_2026-03-07_at_8.01.35_PM_cehcpv.jpg',

        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894897/WhatsApp_Image_2026-03-07_at_7.53.41_PM_f49pkm.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894897/WhatsApp_Image_2026-03-07_at_7.53.41_PM_f49pkm.jpg',
        title: 'Moment 08',
        category: 'Moments'
      },
      {
        src:   'https://res.cloudinary.com/dxsja3wy5/image/upload/v1772894896/WhatsApp_Image_2026-03-07_at_7.56.25_PM_qnavfl.jpg',
        thumb: 'https://res.cloudinary.com/dxsja3wy5/image/upload/w_600,q_auto,f_auto/v1772894896/WhatsApp_Image_2026-03-07_at_7.56.25_PM_qnavfl.jpg',
        title: 'Moment 09'
      }
    ];

    let activeFilter = 'all';
    let currentIdx   = 0;

    document.getElementById('photo-count-badge').textContent = PHOTOS.length;

    function renderGallery() {
      const grid  = document.getElementById('gallery-grid');
      const empty = document.getElementById('empty-state');
      const filtered = PHOTOS;

      if (!filtered.length) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        empty.classList.add('flex');
        return;
      }
      empty.classList.add('hidden');

      grid.innerHTML = filtered.map((p, i) => `
        <div class="stagger-item masonry-item" style="--delay: ${i*100}ms">
          <div class="photo-card backdrop-blur-md bg-slate-800/40" onclick="openLightbox(${PHOTOS.indexOf(p)})">
            <img src="${p.thumb}" alt="${p.title}" loading="lazy">
          </div>
        </div>
      `).join('');
    }

    function openLightbox(idx) {
      currentIdx = idx;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox(event) {
      if (event && event.target.id !== 'lightbox' && event.target.id !== 'lightbox-close' && !event.target.closest('#lightbox-close')) return;
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function lbNav(dir) {
      currentIdx = (currentIdx + dir + PHOTOS.length) % PHOTOS.length;
      updateLightbox();
    }

    function updateLightbox() {
      const p = PHOTOS[currentIdx];
      document.getElementById('lightbox-img').src = p.src;
      document.getElementById('lightbox-title').textContent = p.title;
      document.getElementById('lightbox-sub').textContent = p.category;
      document.getElementById('lightbox-caption').textContent = `${currentIdx + 1} / ${PHOTOS.length}`;
    }

    // Removed broken theme sync

    renderGallery();

    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lbNav(-1);
      else if (e.key === 'ArrowRight') lbNav(1);
    });
  </script>

</body>
