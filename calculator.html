<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator – Arpit Agarwala</title>

  <script>
    (function(){
      const t=localStorage.getItem('theme');
      const d=window.matchMedia('(prefers-color-scheme: dark)').matches;
      if(t==='dark'||(!t&&d)) document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;}
    .mono{font-family:'JetBrains Mono',monospace;}

    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px;}
    .dark ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);}

    .glass{
      background:rgba(15,23,42,.72);
      backdrop-filter:blur(24px);
      border:1px solid rgba(255,255,255,.08);
    }
    .dark .glass{
      background:rgba(255,255,255,.72);
      border:1px solid rgba(0,0,0,.08);
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
    .fade-up{animation:fadeUp .4s cubic-bezier(.4,0,.2,1) both;}
    .d1{animation-delay:.04s;}.d2{animation-delay:.08s;}

    @keyframes ripple{from{transform:scale(0);opacity:.4;}to{transform:scale(2.5);opacity:0;}}
    .btn-ripple{position:relative;overflow:hidden;}
    .btn-ripple::after{content:'';position:absolute;inset:0;border-radius:inherit;background:white;transform:scale(0);opacity:0;}
    .btn-ripple:active::after{animation:ripple .35s ease-out;}

    #display{transition:font-size .1s;}

    .mode-tab{transition:all .2s;}
    .mode-tab.active{background:rgba(6,182,212,.18);color:#06b6d4;border-color:rgba(6,182,212,.35);}
    .dark .mode-tab.active{background:rgba(6,182,212,.15);color:#0891b2;border-color:rgba(6,182,212,.3);}
    .mode-tab:not(.active){color:rgba(255,255,255,.45);border-color:transparent;}
    .dark .mode-tab:not(.active){color:rgba(0,0,0,.4);border-color:transparent;}

    .btn-op{background:rgba(251,191,36,.1);color:#fbbf24;}
    .btn-op:hover{background:rgba(251,191,36,.2);}
    .dark .btn-op{background:rgba(217,119,6,.12);color:#d97706;}
    .dark .btn-op:hover{background:rgba(217,119,6,.22);}

    .btn-eq{background:linear-gradient(135deg,#06b6d4,#3b82f6);box-shadow:0 6px 24px rgba(6,182,212,.35);}
    .btn-eq:hover{opacity:.92;}
    .btn-eq:active{transform:scale(.96);}

    .btn-num{background:rgba(255,255,255,.05);}
    .btn-num:hover{background:rgba(255,255,255,.1);}
    .dark .btn-num{background:rgba(0,0,0,.04);}
    .dark .btn-num:hover{background:rgba(0,0,0,.1);}

    .btn-fn{background:rgba(255,255,255,.03);color:rgba(255,255,255,.7);}
    .btn-fn:hover{background:rgba(255,255,255,.09);}
    .dark .btn-fn{background:rgba(0,0,0,.04);color:rgba(0,0,0,.6);}
    .dark .btn-fn:hover{background:rgba(0,0,0,.1);}

    .btn-ac{background:rgba(239,68,68,.12);color:#f87171;}
    .btn-ac:hover{background:rgba(239,68,68,.22);}
    .dark .btn-ac{background:rgba(239,68,68,.1);color:#ef4444;}

    .hist-item{transition:background .15s;}
    .hist-item:hover{background:rgba(255,255,255,.06);}
    .dark .hist-item:hover{background:rgba(0,0,0,.06);}

    .sci-btn{font-size:.7rem;font-weight:600;background:rgba(139,92,246,.1);color:#a78bfa;border:1px solid rgba(139,92,246,.18);border-radius:.75rem;padding:.5rem;transition:all .15s;cursor:pointer;}
    .sci-btn:hover{background:rgba(139,92,246,.2);}
    .dark .sci-btn{background:rgba(109,40,217,.08);color:#7c3aed;border-color:rgba(109,40,217,.2);}
    .dark .sci-btn:hover{background:rgba(109,40,217,.18);}

    #toast{transition:opacity .3s,transform .3s;}
    #angle-badge{cursor:pointer;user-select:none;}
  </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-950 dark:bg-slate-100 text-slate-50 dark:text-slate-900 transition-colors duration-300 p-4">

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 opacity-0 translate-y-4 pointer-events-none">
    <div id="toast-msg" class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-slate-800 dark:bg-white text-slate-100 dark:text-slate-900 border border-slate-700 dark:border-slate-200 shadow-lg"></div>
  </div>

  <!-- BACK -->
  <div class="fixed top-4 left-4 z-50">
    <a href="projects.html"
       class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/90 dark:bg-white/90 backdrop-blur border border-slate-700 dark:border-slate-200 text-slate-300 dark:text-slate-700 hover:border-cyan-400 hover:text-cyan-400 shadow-lg transition-all">
      <i class="ri-arrow-left-line text-lg"></i>
    </a>
  </div>

  <!-- TOP-RIGHT: history + theme -->
  <div class="fixed top-4 right-4 z-50 flex gap-2">
    <button onclick="toggleHistory()"
            class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/90 dark:bg-white/90 backdrop-blur border border-slate-700 dark:border-slate-200 text-slate-300 dark:text-slate-700 hover:border-cyan-400 hover:text-cyan-400 shadow-lg transition-all">
      <i class="ri-history-line text-lg"></i>
    </button>
    <button onclick="toggleTheme()"
            class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-800/90 dark:bg-white/90 backdrop-blur border border-slate-700 dark:border-slate-200 text-slate-300 dark:text-slate-700 hover:border-cyan-400 hover:text-cyan-400 shadow-lg transition-all">
      <i id="theme-icon" class="text-lg"></i>
    </button>
  </div>

  <!-- LAYOUT -->
  <div class="w-full max-w-5xl flex flex-col lg:flex-row gap-5 items-center lg:items-start justify-center pt-16 lg:pt-0">

    <!-- MAIN CALCULATOR -->
    <div class="fade-up d1 w-full max-w-[400px] glass rounded-[2rem] shadow-2xl p-5 flex flex-col gap-4">

      <!-- Header -->
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span class="text-[10px] uppercase tracking-[.18em] font-bold text-slate-400 dark:text-slate-500">Calculator</span>
          <span class="text-[9px] px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-400 dark:text-emerald-600 border border-emerald-500/20">v3.0</span>
        </div>
        <div class="flex items-center gap-2">
          <div id="memory-indicator" class="hidden text-[9px] px-2 py-0.5 rounded-full bg-amber-500/10 text-amber-400 dark:text-amber-600 border border-amber-500/20">M</div>
          <div id="angle-badge" onclick="toggleAngle()" class="hidden text-[9px] px-2 py-0.5 rounded-full bg-violet-500/10 text-violet-400 dark:text-violet-600 border border-violet-500/20">DEG</div>
        </div>
      </div>

      <!-- Mode tabs -->
      <div class="flex gap-1 p-1 bg-white/5 dark:bg-black/5 rounded-xl border border-white/8 dark:border-black/8">
        <button onclick="setMode('standard')"   id="tab-standard"   class="mode-tab active flex-1 py-1.5 text-xs font-bold rounded-lg border">Standard</button>
        <button onclick="setMode('scientific')" id="tab-scientific" class="mode-tab flex-1 py-1.5 text-xs font-bold rounded-lg border">Scientific</button>
        <button onclick="setMode('unit')"       id="tab-unit"       class="mode-tab flex-1 py-1.5 text-xs font-bold rounded-lg border">Unit</button>
      </div>

      <!-- Display -->
      <div class="flex flex-col items-end gap-1 px-1">
        <div id="history-current" class="h-5 text-xs text-slate-400 dark:text-slate-500 mono truncate w-full text-right"></div>
        <div id="display" class="w-full text-right text-5xl font-bold tracking-tight truncate mono text-slate-50 dark:text-slate-900 leading-tight">0</div>
      </div>

      <!-- Scientific panel -->
      <div id="sci-panel" class="hidden grid grid-cols-4 gap-2">
        <button class="sci-btn" onclick="sciOp('sin')">sin</button>
        <button class="sci-btn" onclick="sciOp('cos')">cos</button>
        <button class="sci-btn" onclick="sciOp('tan')">tan</button>
        <button class="sci-btn" onclick="sciOp('log')">log</button>
        <button class="sci-btn" onclick="sciOp('ln')">ln</button>
        <button class="sci-btn" onclick="sciOp('pow2')">x²</button>
        <button class="sci-btn" onclick="sciOp('pow3')">x³</button>
        <button class="sci-btn" onclick="sciOp('cbrt')">∛x</button>
        <button class="sci-btn" onclick="sciOp('inv')">1/x</button>
        <button class="sci-btn" onclick="sciOp('pi')">π</button>
        <button class="sci-btn" onclick="sciOp('e')">e</button>
        <button class="sci-btn" onclick="sciOp('abs')">|x|</button>
      </div>

      <!-- Unit converter panel -->
      <div id="unit-panel" class="hidden flex flex-col gap-3">
        <select id="unit-cat" onchange="renderUnitSelects()" class="w-full px-3 py-2 rounded-xl bg-white/5 dark:bg-black/5 border border-white/10 dark:border-black/10 text-slate-200 dark:text-slate-800 text-sm outline-none focus:ring-2 focus:ring-cyan-500">
          <option value="length">Length</option>
          <option value="weight">Weight</option>
          <option value="temp">Temperature</option>
          <option value="area">Area</option>
          <option value="speed">Speed</option>
          <option value="data">Data</option>
        </select>
        <div class="flex gap-2 items-center">
          <div class="flex-1 flex flex-col gap-1">
            <select id="unit-from" class="w-full px-3 py-2 rounded-xl bg-white/5 dark:bg-black/5 border border-white/10 dark:border-black/10 text-slate-200 dark:text-slate-800 text-xs outline-none focus:ring-2 focus:ring-cyan-500"></select>
            <input id="unit-input" type="number" value="1" oninput="convertUnit()" class="w-full px-3 py-2 rounded-xl bg-white/5 dark:bg-black/5 border border-white/10 dark:border-black/10 text-slate-200 dark:text-slate-800 text-sm outline-none focus:ring-2 focus:ring-cyan-500 mono">
          </div>
          <button onclick="swapUnits()" class="w-8 h-8 flex items-center justify-center rounded-xl bg-cyan-500/15 text-cyan-400 dark:text-cyan-600 border border-cyan-500/20 hover:bg-cyan-500/25 flex-shrink-0 transition-colors">
            <i class="ri-arrow-left-right-line text-sm"></i>
          </button>
          <div class="flex-1 flex flex-col gap-1">
            <select id="unit-to" onchange="convertUnit()" class="w-full px-3 py-2 rounded-xl bg-white/5 dark:bg-black/5 border border-white/10 dark:border-black/10 text-slate-200 dark:text-slate-800 text-xs outline-none focus:ring-2 focus:ring-cyan-500"></select>
            <div id="unit-result" class="w-full px-3 py-2 rounded-xl bg-cyan-500/8 border border-cyan-500/15 text-cyan-300 dark:text-cyan-700 text-sm font-bold mono">1</div>
          </div>
        </div>
      </div>

      <!-- ─────────────── MAIN BUTTON GRID ─────────────── -->
      <!--
        Row 1: MRC  | M+   | M−   | AC
        Row 2: ⌫   | GT   | √    | %
        Row 3: 7    | 8    | 9    | ÷
        Row 4: 4    | 5    | 6    | ×
        Row 5: 1    | 2    | 3    | −
        Row 6: .    | 0    | +/−  | +
        Row 7: ============ = ============
      -->
      <div class="grid grid-cols-4 gap-2.5" id="main-grid">

        <!-- Row 1: Memory + AC -->
        <button onclick="memoryRecall()"   class="btn-ripple btn-fn h-12 rounded-2xl text-xs font-bold transition-all active:scale-95">MRC</button>
        <button onclick="memoryAdd()"      class="btn-ripple btn-fn h-12 rounded-2xl text-xs font-bold transition-all active:scale-95">M+</button>
        <button onclick="memorySubtract()" class="btn-ripple btn-fn h-12 rounded-2xl text-xs font-bold transition-all active:scale-95">M−</button>
        <button onclick="clearAll()"       class="btn-ripple btn-ac h-12 rounded-2xl font-bold transition-all active:scale-95">AC</button>

        <!-- Row 2: ⌫ | GT | √ | % -->
        <button onclick="deleteLast()"           class="btn-ripple btn-fn h-12 rounded-2xl font-bold transition-all active:scale-95"><i class="ri-delete-back-2-line text-xl"></i></button>
        <button onclick="showGT()"               class="btn-ripple btn-fn h-12 rounded-2xl font-bold text-sm transition-all active:scale-95">GT</button>
        <button onclick="calculateRoot()"         class="btn-ripple btn-fn h-12 rounded-2xl font-bold text-lg transition-all active:scale-95">√</button>
        <button onclick="calculatePercentage()"   class="btn-ripple btn-fn h-12 rounded-2xl font-bold text-sm transition-all active:scale-95">%</button>

        <!-- Row 3: 7 8 9 ÷ -->
        <button onclick="appendNumber('7')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">7</button>
        <button onclick="appendNumber('8')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">8</button>
        <button onclick="appendNumber('9')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">9</button>
        <button onclick="appendOperator('/')" class="btn-ripple btn-op  h-12 rounded-2xl font-bold text-xl transition-all active:scale-95">÷</button>

        <!-- Row 4: 4 5 6 × -->
        <button onclick="appendNumber('4')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">4</button>
        <button onclick="appendNumber('5')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">5</button>
        <button onclick="appendNumber('6')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">6</button>
        <button onclick="appendOperator('*')" class="btn-ripple btn-op  h-12 rounded-2xl font-bold text-xl transition-all active:scale-95">×</button>

        <!-- Row 5: 1 2 3 − -->
        <button onclick="appendNumber('1')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">1</button>
        <button onclick="appendNumber('2')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">2</button>
        <button onclick="appendNumber('3')"    class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">3</button>
        <button onclick="appendOperator('-')" class="btn-ripple btn-op  h-12 rounded-2xl font-bold text-xl transition-all active:scale-95">−</button>

        <!-- Row 6: . | 0 | +/− | + -->
        <button onclick="appendNumber('.')"  class="btn-ripple btn-num h-12 rounded-2xl text-xl font-bold transition-all active:scale-95">.</button>
        <button onclick="appendNumber('0')"  class="btn-ripple btn-num h-12 rounded-2xl text-lg font-semibold transition-all active:scale-95">0</button>
        <button onclick="toggleSign()"        class="btn-ripple btn-fn  h-12 rounded-2xl font-bold text-sm transition-all active:scale-95">+/−</button>
        <button onclick="appendOperator('+')" class="btn-ripple btn-op  h-12 rounded-2xl font-bold text-xl transition-all active:scale-95">+</button>

        <!-- Row 7: = full width -->
        <button onclick="calculate()" class="btn-ripple btn-eq col-span-4 h-12 rounded-2xl text-white font-bold text-2xl transition-all active:scale-[.98]">=</button>
      </div>

    </div>

    <!-- HISTORY SIDEBAR -->
    <div id="history-sidebar" class="hidden fade-up d2 w-full lg:w-72 glass rounded-[2rem] shadow-xl p-5 flex flex-col gap-4 max-h-[480px]">
      <div class="flex items-center justify-between border-b border-white/8 dark:border-black/8 pb-3">
        <span class="font-bold text-sm flex items-center gap-2 text-slate-300 dark:text-slate-700">
          <i class="ri-history-line"></i> History
        </span>
        <div class="flex gap-3">
          <button onclick="copyHistory()"  class="text-xs text-cyan-400 dark:text-cyan-600 font-semibold hover:underline">Copy All</button>
          <button onclick="clearHistory()" class="text-xs text-rose-400 dark:text-rose-600 font-semibold hover:underline">Clear</button>
        </div>
      </div>
      <div id="history-panel" class="flex-1 overflow-y-auto pr-1 flex flex-col gap-1">
        <div id="no-history" class="text-xs text-slate-500 italic text-center py-10">No calculations yet</div>
      </div>
    </div>

  </div>

  <script>
    let currentInput   = '0';
    let previousInput  = '';
    let operator       = null;
    let shouldReset    = false;
    let memory         = 0;
    let grandTotal     = 0;
    let lastOperator   = null;
    let lastOperand    = null;
    let justEvaluated  = false;
    let mrcJustPressed = false;
    let angleMode      = 'deg';
    let currentMode    = 'standard';

    const MAX_HISTORY = 200;
    let historyList   = JSON.parse(localStorage.getItem('calcHistory') || '[]');

    const $display  = document.getElementById('display');
    const $histLine = document.getElementById('history-current');
    const $memInd   = document.getElementById('memory-indicator');
    const $angBadge = document.getElementById('angle-badge');

    (function syncIcon(){
      document.getElementById('theme-icon').className =
        document.documentElement.classList.contains('dark') ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    })();
    function toggleTheme() {
      const isDark = document.documentElement.classList.contains('dark');
      document.documentElement.classList.toggle('dark', !isDark);
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-icon').className = isDark ? 'ri-moon-line text-lg' : 'ri-sun-line text-lg';
    }

    function showToast(msg) {
      const t=document.getElementById('toast'), m=document.getElementById('toast-msg');
      m.textContent=msg;
      t.style.opacity='1'; t.style.transform='translateY(0) translateX(-50%)';
      setTimeout(()=>{ t.style.opacity='0'; t.style.transform='translateY(16px) translateX(-50%)'; },2200);
    }

    function setMode(m) {
      currentMode = m;
      ['standard','scientific','unit'].forEach(x => {
        document.getElementById(`tab-${x}`).classList.toggle('active', x===m);
      });
      document.getElementById('sci-panel').classList.toggle('hidden',  m!=='scientific');
      document.getElementById('unit-panel').classList.toggle('hidden', m!=='unit');
      document.getElementById('main-grid').classList.toggle('hidden',  m==='unit');
      $angBadge.classList.toggle('hidden', m!=='scientific');
      if (m==='unit') renderUnitSelects();
    }

    function updateDisplay() {
      const len = currentInput.replace('.','').replace('-','').length;
      $display.style.fontSize = len > 12 ? '1.6rem' : len > 9 ? '2.4rem' : len > 7 ? '3rem' : '';
      $display.textContent = currentInput;
      $memInd.classList.toggle('hidden', memory === 0);
    }

    function appendNumber(n) {
      mrcJustPressed = false;
      if (n === '.' && currentInput.includes('.') && !shouldReset) return;
      if (currentInput === '0' || shouldReset) {
        currentInput = n === '.' ? '0.' : n;
        shouldReset = false;
      } else {
        if (currentInput.replace(/[^0-9]/g,'').length >= 15) return;
        currentInput += n;
      }
      updateDisplay();
    }

    function appendOperator(op) {
      justEvaluated = false; mrcJustPressed = false;
      if (operator !== null && !shouldReset) calculate(true);
      previousInput = currentInput;
      operator = op;
      $histLine.textContent = `${fmtDisplay(previousInput)} ${opSym(op)}`;
      shouldReset = true;
    }

    function toggleSign() {
      if (currentInput === '0' || currentInput === 'Error') return;
      currentInput = currentInput.startsWith('-') ? currentInput.slice(1) : '-' + currentInput;
      updateDisplay();
    }

    function opSym(op) { return { '*':'×', '/':'÷', '-':'−' }[op] || op; }

    function calculate(silent=false) {
      if (justEvaluated && !silent) {
        if (lastOperator===null || lastOperand===null) return;
        const cur = parseFloat(currentInput);
        const res = compute(cur, lastOperand, lastOperator);
        const cs  = `${fmtDisplay(currentInput)} ${opSym(lastOperator)} ${fmtDisplay(lastOperand.toString())}`;
        if (!silent) { addToHistory(cs, res); $histLine.textContent = `${cs} =`; }
        grandTotal += isFinite(res) ? res : 0;
        currentInput = fmtResult(res);
        updateDisplay(); return;
      }
      if (operator===null) return;
      const prev = parseFloat(previousInput);
      const b    = shouldReset ? parseFloat(previousInput) : parseFloat(currentInput);
      const result = compute(prev, b, operator);
      const calcStr = `${fmtDisplay(previousInput)} ${opSym(operator)} ${fmtDisplay(b.toString())}`;
      if (!silent) { addToHistory(calcStr, result); $histLine.textContent = `${calcStr} =`; }
      grandTotal += isFinite(result) ? result : 0;
      lastOperator = operator; lastOperand = b;
      justEvaluated = !silent;
      currentInput = fmtResult(result);
      operator = null; shouldReset = true;
      updateDisplay();
    }

    function compute(a, b, op) {
      switch(op) {
        case '+': return a + b;
        case '-': return a - b;
        case '*': return a * b;
        case '/': return b === 0 ? 'Error' : a / b;
        default:  return b;
      }
    }

    function fmtResult(v) {
      if (v === 'Error') return 'Error';
      return parseFloat(v.toFixed(10)).toString();
    }

    function fmtDisplay(s) {
      const n = parseFloat(s);
      if (isNaN(n)) return s;
      return n.toLocaleString('en-IN', { maximumFractionDigits: 8 });
    }

    function toRad(deg) { return deg * Math.PI / 180; }
    function sciOp(op) {
      const v = parseFloat(currentInput);
      const a = angleMode === 'deg' ? toRad(v) : v;
      let result;
      switch(op) {
        case 'sin':  result = Math.sin(a); break;
        case 'cos':  result = Math.cos(a); break;
        case 'tan':  result = Math.tan(a); break;
        case 'log':  result = v <= 0 ? 'Error' : Math.log10(v); break;
        case 'ln':   result = v <= 0 ? 'Error' : Math.log(v); break;
        case 'pow2': result = v * v; break;
        case 'pow3': result = v * v * v; break;
        case 'cbrt': result = Math.cbrt(v); break;
        case 'inv':  result = v === 0 ? 'Error' : 1 / v; break;
        case 'pi':   currentInput = Math.PI.toString(); shouldReset=true; updateDisplay(); return;
        case 'e':    currentInput = Math.E.toString();  shouldReset=true; updateDisplay(); return;
        case 'abs':  result = Math.abs(v); break;
        default: return;
      }
      const label = `${op}(${v})`;
      addToHistory(label, result);
      $histLine.textContent = `${label} =`;
      currentInput = fmtResult(result);
      shouldReset = true; updateDisplay();
    }

    function toggleAngle() {
      angleMode = angleMode === 'deg' ? 'rad' : 'deg';
      $angBadge.textContent = angleMode.toUpperCase();
      showToast(`Angle mode: ${angleMode.toUpperCase()}`);
    }

    function calculatePercentage() {
      const cur = parseFloat(currentInput);
      if (operator === '*' || operator === '/') {
        currentInput = (cur / 100).toString(); calculate();
      } else if (operator === '+' || operator === '-') {
        currentInput = (parseFloat(previousInput) * cur / 100).toString(); calculate();
      } else {
        currentInput = (cur / 100).toString(); updateDisplay();
      }
    }

    function calculateRoot() {
      const v = parseFloat(currentInput);
      currentInput = v < 0 ? 'Error' : fmtResult(Math.sqrt(v));
      addToHistory(`√(${v})`, currentInput);
      shouldReset = true; updateDisplay();
    }

    function memoryAdd()      { memory += parseFloat(currentInput); shouldReset=true; updateDisplay(); showToast('M+'); }
    function memorySubtract() { memory -= parseFloat(currentInput); shouldReset=true; updateDisplay(); showToast('M−'); }
    function memoryRecall() {
      if (mrcJustPressed) { memory=0; mrcJustPressed=false; updateDisplay(); showToast('Memory cleared'); }
      else { currentInput=memory.toString(); shouldReset=true; mrcJustPressed=true; updateDisplay(); }
    }

    function showGT() {
      currentInput = grandTotal.toString(); $histLine.textContent='Grand Total'; shouldReset=true; updateDisplay();
    }

    function clearAll() {
      currentInput='0'; previousInput=''; operator=null;
      grandTotal=0; lastOperator=null; lastOperand=null; justEvaluated=false;
      $histLine.textContent=''; updateDisplay();
    }

    function deleteLast() {
      if (shouldReset || currentInput==='Error') { currentInput='0'; shouldReset=false; }
      else { currentInput = currentInput.length>1 ? currentInput.slice(0,-1) : '0'; }
      updateDisplay();
    }

    function addToHistory(calc, result) {
      historyList.unshift({ calc, result });
      if (historyList.length > MAX_HISTORY) historyList.pop();
      localStorage.setItem('calcHistory', JSON.stringify(historyList));
      renderHistory();
    }

    function renderHistory() {
      const panel = document.getElementById('history-panel');
      if (!historyList.length) {
        panel.innerHTML = '<div id="no-history" class="text-xs text-slate-500 italic text-center py-10">No calculations yet</div>';
        return;
      }
      panel.innerHTML = historyList.map(item => `
        <div class="hist-item flex flex-col items-end gap-0.5 px-2 py-2 rounded-xl cursor-pointer" onclick="useHistory('${item.result}')">
          <span class="text-[10px] text-slate-400 dark:text-slate-500 mono truncate w-full text-right">${item.calc} =</span>
          <span class="text-sm font-bold mono text-slate-200 dark:text-slate-800">${item.result}</span>
        </div>
      `).join('');
    }

    function useHistory(val) {
      if (val==='Error') return;
      currentInput=val.toString(); shouldReset=true; updateDisplay();
    }

    function clearHistory() {
      historyList=[]; localStorage.removeItem('calcHistory'); renderHistory();
      showToast('🗑️ History cleared');
    }

    function copyHistory() {
      if (!historyList.length) { showToast('Nothing to copy'); return; }
      const txt = historyList.map(h=>`${h.calc} = ${h.result}`).join('\n');
      navigator.clipboard.writeText(txt).then(()=>showToast('📋 History copied!'));
    }

    function toggleHistory() {
      document.getElementById('history-sidebar').classList.toggle('hidden');
    }

    const UNITS = {
      length: { units:['mm','cm','m','km','in','ft','yd','mi'], toBase:{mm:0.001,cm:0.01,m:1,km:1000,in:0.0254,ft:0.3048,yd:0.9144,mi:1609.344} },
      weight: { units:['mg','g','kg','t','oz','lb'], toBase:{mg:0.000001,g:0.001,kg:1,t:1000,oz:0.028349,lb:0.453592} },
      temp:   { units:['°C','°F','K'], toBase:null },
      area:   { units:['mm²','cm²','m²','km²','ft²','ac','ha'], toBase:{'mm²':1e-6,'cm²':1e-4,'m²':1,'km²':1e6,'ft²':0.092903,ac:4046.86,ha:10000} },
      speed:  { units:['m/s','km/h','mph','knot'], toBase:{'m/s':1,'km/h':1/3.6,mph:0.44704,knot:0.514444} },
      data:   { units:['B','KB','MB','GB','TB','PB'], toBase:{B:1,KB:1024,MB:1048576,GB:1073741824,TB:1099511627776,PB:1.126e15} }
    };

    function renderUnitSelects() {
      const cat   = document.getElementById('unit-cat').value;
      const units = UNITS[cat].units;
      const opts  = units.map(u=>`<option value="${u}">${u}</option>`).join('');
      document.getElementById('unit-from').innerHTML = opts;
      document.getElementById('unit-to').innerHTML   = opts;
      document.getElementById('unit-to').selectedIndex = 1;
      convertUnit();
    }

    function convertUnit() {
      const cat  = document.getElementById('unit-cat').value;
      const from = document.getElementById('unit-from').value;
      const to   = document.getElementById('unit-to').value;
      const val  = parseFloat(document.getElementById('unit-input').value);
      if (isNaN(val)) { document.getElementById('unit-result').textContent = '—'; return; }
      let result;
      if (cat==='temp') {
        if (from===to) result=val;
        else if (from==='°C'&&to==='°F') result=val*9/5+32;
        else if (from==='°C'&&to==='K')   result=val+273.15;
        else if (from==='°F'&&to==='°C') result=(val-32)*5/9;
        else if (from==='°F'&&to==='K')   result=(val-32)*5/9+273.15;
        else if (from==='K' &&to==='°C') result=val-273.15;
        else if (from==='K' &&to==='°F') result=(val-273.15)*9/5+32;
      } else {
        const base = UNITS[cat].toBase;
        result = val * base[from] / base[to];
      }
      const fmt = r => r < 0.0001 ? r.toExponential(4) : parseFloat(r.toFixed(6)).toLocaleString('en-IN');
      document.getElementById('unit-result').textContent = fmt(result);
    }

    function swapUnits() {
      const f=document.getElementById('unit-from'), t=document.getElementById('unit-to');
      [f.value, t.value] = [t.value, f.value];
      convertUnit();
    }

    window.addEventListener('keydown', e => {
      if (currentMode==='unit') return;
      if (e.key>='0'&&e.key<='9') appendNumber(e.key);
      if (e.key==='.') appendNumber('.');
      if (e.key==='='||e.key==='Enter') { e.preventDefault(); calculate(); }
      if (e.key==='Backspace') deleteLast();
      if (e.key==='Escape') clearAll();
      if (['+','-','*','/'].includes(e.key)) appendOperator(e.key);
      if (e.key==='%') calculatePercentage();
    });

    updateDisplay();
    renderHistory();
    renderUnitSelects();
  </script>
</body>
</html>
