<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pro Calculator</title>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Custom scrollbar for history */
        #history-panel::-webkit-scrollbar { width: 4px; }
        #history-panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .dark #history-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 transition-colors duration-300 px-3 py-6 sm:p-6">
    <a href="projects.html" class="fixed top-4 left-4 z-50 bg-white dark:bg-slate-800 p-2 rounded-full shadow-md hover:scale-105 transition-all border border-slate-200 dark:border-slate-700">
        <i class="ri-arrow-left-line text-xl"></i>
    </a>
    <div class="fixed top-4 right-4 z-50 flex gap-2">
        <button onclick="toggleHistory()" class="bg-white dark:bg-slate-800 p-2 rounded-full shadow-md hover:scale-105 transition-all border border-slate-200 dark:border-slate-700">
            <i class="ri-history-line text-xl"></i>
        </button>
        <button onclick="toggleTheme()" class="bg-white dark:bg-slate-800 p-2 rounded-full shadow-md hover:scale-105 transition-all border border-slate-200 dark:border-slate-700">
            <i id="theme-icon" class="ri-moon-line text-xl"></i>
        </button>
    </div>

    <div class="w-full max-w-4xl flex flex-col lg:flex-row gap-6 items-start justify-center">
        <!-- Main Calculator -->
        <div class="w-full lg:w-2/3 glass rounded-[2.5rem] shadow-2xl p-4 sm:p-6 flex flex-col gap-6 relative overflow-hidden order-2 lg:order-1">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400 dark:text-slate-500">Pro Calculator</span>
                    <span class="text-[9px] px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20">v2.2</span>
                </div>
                <div id="memory-indicator" class="text-[9px] px-2 py-0.5 rounded-full bg-amber-500/10 text-amber-600 dark:text-amber-400 border border-amber-500/20 hidden">M</div>
            </div>

            <div class="flex flex-col items-end gap-1">
                <div id="history-current" class="h-6 text-sm text-slate-400 dark:text-slate-500 mono"></div>
                <div id="display" class="w-full text-right text-5xl font-bold tracking-tighter truncate mono py-2">0</div>
            </div>

            <div class="grid grid-cols-4 gap-3 sm:gap-4">
                <!-- Memory & Special -->
                <button onclick="memoryClear()" class="h-12 sm:h-14 rounded-2xl text-xs font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-800 active:scale-95">MC</button>
                <button onclick="memoryRecall()" class="h-12 sm:h-14 rounded-2xl text-xs font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-800 active:scale-95">MR</button>
                <button onclick="memoryAdd()" class="h-12 sm:h-14 rounded-2xl text-xs font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-800 active:scale-95">M+</button>
                <button onclick="memorySubtract()" class="h-12 sm:h-14 rounded-2xl text-xs font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-800 active:scale-95">M-</button>

                <button onclick="clearAll()" class="h-12 sm:h-14 rounded-2xl bg-rose-500/10 text-rose-600 dark:text-rose-400 font-bold transition-all hover:bg-rose-500/20 active:scale-95">AC</button>
                <button onclick="showGT()" class="h-12 sm:h-14 rounded-2xl bg-slate-200/50 dark:bg-slate-800/50 font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-800 active:scale-95">GT</button>
                <button onclick="calculateRoot()" class="h-12 sm:h-14 rounded-2xl bg-slate-200/50 dark:bg-slate-800/50 font-bold transition-all hover:bg-slate-200 dark:hover:bg-slate-800 active:scale-95">√</button>
                <button onclick="appendOperator('/')" class="h-12 sm:h-14 rounded-2xl bg-amber-500/10 text-amber-600 dark:text-amber-400 font-bold transition-all hover:bg-amber-500/20 active:scale-95 text-xl">÷</button>

                <button onclick="appendNumber('7')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">7</button>
                <button onclick="appendNumber('8')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">8</button>
                <button onclick="appendNumber('9')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">9</button>
                <button onclick="appendOperator('*')" class="h-12 sm:h-14 rounded-2xl bg-amber-500/10 text-amber-600 dark:text-amber-400 font-bold transition-all hover:bg-amber-500/20 active:scale-95 text-xl">×</button>

                <button onclick="appendNumber('4')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">4</button>
                <button onclick="appendNumber('5')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">5</button>
                <button onclick="appendNumber('6')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">6</button>
                <button onclick="appendOperator('-')" class="h-12 sm:h-14 rounded-2xl bg-amber-500/10 text-amber-600 dark:text-amber-400 font-bold transition-all hover:bg-amber-500/20 active:scale-95 text-xl">−</button>

                <button onclick="appendNumber('1')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">1</button>
                <button onclick="appendNumber('2')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">2</button>
                <button onclick="appendNumber('3')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">3</button>
                <button onclick="appendOperator('+')" class="h-12 sm:h-14 rounded-2xl bg-amber-500/10 text-amber-600 dark:text-amber-400 font-bold transition-all hover:bg-amber-500/20 active:scale-95 text-xl">+</button>

                <button onclick="appendNumber('0')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">0</button>
                <button onclick="appendNumber('.')" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">.</button>
                <button onclick="calculatePercentage()" class="h-12 sm:h-14 rounded-2xl bg-slate-100 dark:bg-slate-800/40 text-lg font-semibold transition-all hover:bg-white dark:hover:bg-slate-800 active:scale-95">%</button>
                <button onclick="calculate()" class="h-12 sm:h-14 rounded-2xl bg-emerald-500 text-white font-bold transition-all hover:bg-emerald-600 shadow-lg shadow-emerald-500/20 active:scale-95 text-xl">=</button>
            </div>
        </div>

        <!-- History Sidebar -->
        <div id="history-sidebar" class="w-full lg:w-1/3 glass rounded-3xl shadow-xl p-4 sm:p-6 flex flex-col gap-4 max-h-[320px] lg:max-h-[500px] overflow-hidden order-1 lg:order-2 transition-all duration-300 transform scale-0 lg:scale-100 origin-top h-0 lg:h-auto">
            <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-2">
                <span class="font-bold flex items-center gap-2">
                    <i class="ri-history-line text-slate-400"></i>
                    History
                </span>
                <button onclick="clearHistory()" class="text-xs text-rose-500 hover:text-rose-600 font-medium">Clear</button>
            </div>
            <div id="history-panel" class="flex-1 overflow-y-auto pr-2 flex flex-col gap-3">
                <div id="no-history" class="text-xs text-slate-400 italic text-center py-10">No calculations yet</div>
            </div>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;
        let memory = 0;
        let grandTotal = 0;
        let historyList = [];

        const display = document.getElementById('display');
        const historyCurrent = document.getElementById('history-current');
        const historyPanel = document.getElementById('history-panel');
        const memoryIndicator = document.getElementById('memory-indicator');

        function updateDisplay() {
            display.innerText = currentInput;
            memoryIndicator.classList.toggle('hidden', memory === 0);
        }

        window.appendNumber = function(number) {
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = number;
                shouldResetScreen = false;
            } else {
                if (number === '.' && currentInput.includes('.')) return;
                currentInput += number;
            }
            updateDisplay();
        };

        window.appendOperator = function(op) {
            if (operator !== null && !shouldResetScreen) calculate();
            previousInput = currentInput;
            operator = op;
            historyCurrent.innerText = `${previousInput} ${getOpSymbol(op)}`;
            shouldResetScreen = true;
        };

        function getOpSymbol(op) {
            const symbols = { '*': '×', '/': '÷', '-': '−' };
            return symbols[op] || op;
        }

        window.calculate = function() {
            if (operator === null || shouldResetScreen) return;
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);

            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = current === 0 ? 'Error' : prev / current; break;
                default: return;
            }

            const calculationStr = `${previousInput} ${getOpSymbol(operator)} ${currentInput}`;
            addToHistory(calculationStr, result);
            historyCurrent.innerText = `${calculationStr} =`;
            currentInput = result.toString();
            grandTotal += (result !== 'Error') ? result : 0;
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
        };

        function addToHistory(calc, result) {
            const item = { calc, result };
            historyList.unshift(item);
            renderHistory();
        }

        function renderHistory() {
            if (historyList.length === 0) {
                historyPanel.innerHTML = '<div id="no-history" class="text-xs text-slate-400 italic text-center py-10">No calculations yet</div>';
                return;
            }
            historyPanel.innerHTML = historyList.map(item => `
                <div class="flex flex-col gap-0.5 items-end group cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 p-2 rounded-lg transition-colors" onclick="useHistoryValue('${item.result}')">
                    <span class="text-[10px] text-slate-400 mono">${item.calc} =</span>
                    <span class="text-sm font-semibold mono">${item.result}</span>
                </div>
            `).join('');
        }

        window.useHistoryValue = function(val) {
            if (val === 'Error') return;
            currentInput = val;
            shouldResetScreen = true;
            updateDisplay();
        };

        window.clearHistory = function() {
            historyList = [];
            renderHistory();
        };

        window.toggleHistory = function() {
            const sidebar = document.getElementById('history-sidebar');
            if (sidebar.classList.contains('scale-0')) {
                sidebar.classList.remove('scale-0', 'h-0');
                sidebar.classList.add('scale-100', 'h-auto');
            } else {
                sidebar.classList.add('scale-0', 'h-0');
                sidebar.classList.remove('scale-100', 'h-auto');
            }
        };

        window.calculatePercentage = function() {
            const current = parseFloat(currentInput);
            if (operator === '*' || operator === '/') {
                currentInput = (current / 100).toString();
                calculate();
            } else if (operator === '+' || operator === '-') {
                const prev = parseFloat(previousInput);
                currentInput = (prev * (current / 100)).toString();
                calculate();
            } else {
                currentInput = (current / 100).toString();
                updateDisplay();
            }
        };

        window.calculateRoot = function() {
            const current = parseFloat(currentInput);
            currentInput = current < 0 ? 'Error' : Math.sqrt(current).toString();
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memoryAdd = function() {
            memory += parseFloat(currentInput);
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memorySubtract = function() {
            memory -= parseFloat(currentInput);
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memoryRecall = function() {
            currentInput = memory.toString();
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memoryClear = function() {
            memory = 0;
            updateDisplay();
        };

        window.showGT = function() {
            currentInput = grandTotal.toString();
            historyCurrent.innerText = 'Grand Total';
            shouldResetScreen = true;
            updateDisplay();
        };

        window.clearAll = function() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            grandTotal = 0;
            historyCurrent.innerText = '';
            updateDisplay();
        };

        window.deleteLast = function() {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
            updateDisplay();
        };

        window.toggleTheme = function() {
            const html = document.documentElement;
            const icon = document.getElementById("theme-icon");
            if (html.classList.contains("dark")) {
                html.classList.remove("dark");
                localStorage.setItem("theme", "light");
                icon.className = "ri-moon-line text-xl";
            } else {
                html.classList.add("dark");
                localStorage.setItem("theme", "dark");
                icon.className = "ri-sun-line text-xl";
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '=' || e.key === 'Enter') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
            if (['+', '-', '*', '/'].includes(e.key)) appendOperator(e.key);
            if (e.key === '%') calculatePercentage();
        });
    </script>
</body>
</html>
