<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pro Calculator</title>
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (theme === 'dark' || (!theme && prefersDark)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-50 transition-colors duration-300 p-4">
    <a href="projects.html" class="fixed top-4 left-4 z-50 bg-white dark:bg-slate-800 p-2 rounded-full shadow-md hover:scale-105 transition-all border border-slate-200 dark:border-slate-700">
        <i class="ri-arrow-left-line text-xl"></i>
    </a>
    <button onclick="toggleTheme()" class="fixed top-4 right-4 z-50 bg-white dark:bg-slate-800 p-2 rounded-full shadow-md hover:scale-105 transition-all border border-slate-200 dark:border-slate-700">
        <i id="theme-icon" class="ri-moon-line text-xl"></i>
    </button>

    <div class="max-w-md w-full glass rounded-[2.5rem] shadow-2xl p-6 flex flex-col gap-6 relative overflow-hidden">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400 dark:text-slate-500">Pro Calculator</span>
                <span class="text-[9px] px-2 py-0.5 rounded-full bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border border-emerald-500/20">v2.0</span>
            </div>
            <div id="memory-indicator" class="text-[9px] px-2 py-0.5 rounded-full bg-amber-500/10 text-amber-600 dark:text-amber-400 border border-amber-500/20 hidden">M</div>
        </div>

        <div class="flex flex-col gap-1 text-right min-h-[120px] justify-end">
            <div id="history" class="text-sm text-slate-400 dark:text-slate-500 h-6 overflow-hidden mono tracking-tighter"></div>
            <div id="display" class="text-6xl font-semibold mono tabular-nums truncate tracking-tighter">0</div>
        </div>

        <div class="grid grid-cols-5 gap-2">
            <!-- Row 0: Memory & Advanced -->
            <button onclick="memoryClear()" class="h-12 rounded-xl bg-slate-200/50 dark:bg-slate-800/50 text-xs font-bold text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">MC</button>
            <button onclick="memoryRecall()" class="h-12 rounded-xl bg-slate-200/50 dark:bg-slate-800/50 text-xs font-bold text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">MR</button>
            <button onclick="memoryAdd()" class="h-12 rounded-xl bg-slate-200/50 dark:bg-slate-800/50 text-xs font-bold text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">M+</button>
            <button onclick="memorySubtract()" class="h-12 rounded-xl bg-slate-200/50 dark:bg-slate-800/50 text-xs font-bold text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">M-</button>
            <button onclick="showGT()" class="h-12 rounded-xl bg-slate-200/50 dark:bg-slate-800/50 text-xs font-bold text-emerald-600 dark:text-emerald-400 hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">GT</button>

            <!-- Row 1 -->
            <button onclick="clearAll()" class="h-14 rounded-2xl bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400 font-bold hover:bg-amber-200 dark:hover:bg-amber-900/50 transition-colors">AC</button>
            <button onclick="deleteLast()" class="h-14 rounded-2xl bg-slate-200/50 dark:bg-slate-800/50 text-slate-600 dark:text-slate-400 font-bold hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">DEL</button>
            <button onclick="calculateRoot()" class="h-14 rounded-2xl bg-slate-200/50 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 font-bold text-xl hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">√</button>
            <button onclick="appendOperator('%')" class="h-14 rounded-2xl bg-slate-200/50 dark:bg-slate-800/50 text-emerald-600 dark:text-emerald-400 font-bold hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">%</button>
            <button onclick="appendOperator('/')" class="h-14 rounded-2xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-bold text-2xl hover:bg-emerald-500/20 transition-colors">÷</button>
            
            <!-- Row 2 -->
            <button onclick="appendNumber('7')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">7</button>
            <button onclick="appendNumber('8')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">8</button>
            <button onclick="appendNumber('9')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">9</button>
            <button onclick="appendOperator('*')" class="h-14 rounded-2xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-bold text-2xl hover:bg-emerald-500/20 transition-colors">×</button>
            <button onclick="appendNumber('4')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">4</button>
            
            <!-- Row 3 -->
            <button onclick="appendNumber('5')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">5</button>
            <button onclick="appendNumber('6')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">6</button>
            <button onclick="appendNumber('1')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">1</button>
            <button onclick="appendOperator('-')" class="h-14 rounded-2xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-bold text-3xl hover:bg-emerald-500/20 transition-colors">−</button>
            <button onclick="appendNumber('2')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">2</button>
            
            <!-- Row 4 -->
            <button onclick="appendNumber('3')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">3</button>
            <button onclick="appendNumber('0')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">0</button>
            <button onclick="appendNumber('.')" class="h-14 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors text-xl font-medium">.</button>
            <button onclick="appendOperator('+')" class="h-14 rounded-2xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-bold text-3xl hover:bg-emerald-500/20 transition-colors">+</button>
            <button onclick="calculate()" class="h-14 rounded-2xl bg-emerald-500 text-slate-900 font-bold text-3xl shadow-lg shadow-emerald-500/30 hover:bg-emerald-400 transition-all active:scale-95">=</button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;
        let memory = 0;
        let grandTotal = 0;

        const display = document.getElementById('display');
        const historyDisplay = document.getElementById('history');
        const memoryIndicator = document.getElementById('memory-indicator');

        function updateDisplay() {
            display.innerText = currentInput;
            memoryIndicator.classList.toggle('hidden', memory === 0);
        }

        window.appendNumber = function(number) {
            if (currentInput === '0' || shouldResetScreen) {
                currentInput = number;
                shouldResetScreen = false;
            } else {
                if (number === '.' && currentInput.includes('.')) return;
                currentInput += number;
            }
            updateDisplay();
        };

        window.appendOperator = function(op) {
            if (operator !== null) calculate();
            previousInput = currentInput;
            operator = op;
            historyDisplay.innerText = `${previousInput} ${getOpSymbol(op)}`;
            shouldResetScreen = true;
        };

        function getOpSymbol(op) {
            const symbols = { '*': '×', '/': '÷', '-': '−' };
            return symbols[op] || op;
        }

        window.calculate = function() {
            if (operator === null || shouldResetScreen) return;
            let result;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            
            switch (operator) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': result = current === 0 ? 'Error' : prev / current; break;
                case '%': result = prev % current; break;
                default: return;
            }

            historyDisplay.innerText = `${previousInput} ${getOpSymbol(operator)} ${currentInput} =`;
            currentInput = result.toString();
            grandTotal += result !== 'Error' ? result : 0;
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
        };

        window.calculateRoot = function() {
            const current = parseFloat(currentInput);
            if (current < 0) {
                currentInput = 'Error';
            } else {
                currentInput = Math.sqrt(current).toString();
            }
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memoryAdd = function() {
            memory += parseFloat(currentInput);
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memorySubtract = function() {
            memory -= parseFloat(currentInput);
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memoryRecall = function() {
            currentInput = memory.toString();
            shouldResetScreen = true;
            updateDisplay();
        };

        window.memoryClear = function() {
            memory = 0;
            updateDisplay();
        };

        window.showGT = function() {
            currentInput = grandTotal.toString();
            historyDisplay.innerText = 'Grand Total';
            shouldResetScreen = true;
            updateDisplay();
        };

        window.clearAll = function() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            historyDisplay.innerText = '';
            updateDisplay();
        };

        window.deleteLast = function() {
            currentInput = currentInput.length > 1 ? currentInput.slice(0, -1) : '0';
            updateDisplay();
        };

        window.toggleTheme = function() {
            const html = document.documentElement;
            const icon = document.getElementById("theme-icon");
            if (html.classList.contains("dark")) {
                html.classList.remove("dark");
                localStorage.setItem("theme", "light");
                icon.className = "ri-moon-line text-xl";
            } else {
                html.classList.add("dark");
                localStorage.setItem("theme", "dark");
                icon.className = "ri-sun-line text-xl";
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            if (e.key === '.') appendNumber('.');
            if (e.key === '=' || e.key === 'Enter') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearAll();
            if (['+', '-', '*', '/', '%'].includes(e.key)) appendOperator(e.key);
        });
    </script>
</body>
</html>
