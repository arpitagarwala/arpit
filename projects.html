  <!--
    THEME INIT (runs before render to avoid flash)
    Convention: .dark on <html> = dark theme visually.
    localStorage 'theme' = 'dark' | 'light'.
    ?theme= URL param overrides on first load (cross-page sync).
  -->
  <script>
    (function () {
      var param = new URLSearchParams(window.location.search).get('theme');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      var theme;
      if (param === 'dark' || param === 'light') {
        theme = param;
        localStorage.setItem('theme', theme);
      } else if (stored === 'dark' || stored === 'light') {
        theme = stored;
      } else {
        theme = prefersDark ? 'dark' : 'light';
      }

      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

        icon: 'ri-shape-2-fill', gradient: 'from-slate-700 to-slate-900',

        sub: 'Focus timer with XP & ranks',

        sub: 'Live WPM & accuracy tracker',
        icon: 'ri-keyboard-line', gradient: 'from-cyan-400 to-blue-500',
        category: 'Utility', featured: true,
        tags: ['Educational', 'Skill', 'WPM']
      }
    ];

    let activeCategory = 'all', activeSearch = '';

    function buildCatFilters() {
      const cats = ['all', ...new Set(PROJECTS.map(p => p.category))];
      const bar = document.getElementById('cat-filters');
      bar.innerHTML = cats.map(c => `
        <button onclick="setCat('${c}',this)" class="cat-chip ${c==='all'?'active-chip':''} px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all
          ${c==='all' ? 'border-emerald-500/40 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400' : 'border-gray-200 dark:border-slate-700/50 bg-white dark:bg-slate-800 text-gray-500 dark:text-slate-400 hover:border-emerald-400/50 hover:text-emerald-500'}">${c==='all'?'All':c}</button>
      `).join('');
    }

    function setCat(c, btn) {
      activeCategory = c;
      document.querySelectorAll('.cat-chip').forEach(b => {
        const isActive = b.textContent.trim() === (c==='all'?'All':c);
        b.className = `cat-chip px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all ${isActive
          ? 'border-emerald-500/40 bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 active-chip'
          : 'border-gray-200 dark:border-slate-700/50 bg-white dark:bg-slate-800 text-gray-500 dark:text-slate-400 hover:border-emerald-400/50 hover:text-emerald-500'}`;
      });
      renderProjects();
    }

    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      const noResults = document.getElementById('no-results');
      const totalEl = document.getElementById('total-count');
      const featuredEl = document.getElementById('featured-count');
      const query = activeSearch.toLowerCase().trim();

      const filtered = PROJECTS.filter(p => {
        const matchCat = activeCategory === 'all' || p.category === activeCategory;
        const matchQ = !query
          || p.title.toLowerCase().includes(query)
          || p.sub.toLowerCase().includes(query)
          || p.tags.some(t => t.toLowerCase().includes(query))
          || p.category.toLowerCase().includes(query);
        return matchCat && matchQ;
      });

      if (totalEl) totalEl.textContent = PROJECTS.length;
      if (featuredEl) featuredEl.textContent = PROJECTS.filter(p=>p.featured).length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden'); noResults.classList.add('flex');
        return;
      }
      noResults.classList.add('hidden'); noResults.classList.remove('flex');

      grid.innerHTML = filtered.map((p, i) => `
        <a href="${p.href}?theme=${isDark() ? 'dark' : 'light'}" class="group bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700/50 hover:border-emerald-500 dark:hover:border-emerald-400 shadow-sm hover:shadow-lg p-4 flex flex-col items-center text-center transition-all duration-200" style="animation:fadeUp .35s ease ${i*40}ms both">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${p.gradient} flex items-center justify-center shadow-lg mb-3 group-hover:scale-110 transition-transform duration-200">
            <i class="${p.icon} text-2xl text-white"></i>
          </div>
          <h2 class="text-xs font-bold text-gray-900 dark:text-slate-100 mb-0.5 leading-tight">${p.title}</h2>
          <p class="text-[10px] text-gray-400 dark:text-slate-500 leading-snug">${p.sub}</p>
        </a>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderProjects();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = ''; activeCategory = 'all';
      document.getElementById('clear-btn').classList.add('hidden');
      buildCatFilters(); renderProjects();
    }

    // Legacy setFilter used by old HTML — route to new setCat
    function setFilter(btn, cat) { setCat(cat, btn); }


    /* ── Theme helpers ── */
    // .dark on <html> = dark theme. No .dark = light theme. Simple & standard.
    function isDark() {
      return document.documentElement.classList.contains('dark');
    }

    function syncIcon() {
      // Moon icon on light theme (click to go dark), Sun icon on dark theme (click to go light)
      document.getElementById('theme-icon').className = isDark() ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }

    function updateBackLink() {
      var a = document.getElementById('back-link');
      if (a) a.href = 'index.html?theme=' + (isDark() ? 'dark' : 'light');
    }

    function toggleTheme() {
      document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark() ? 'dark' : 'light');
      syncIcon();
      updateBackLink();
          renderProjects();
    }

    syncIcon();
    updateBackLink();
    buildCatFilters();
    renderProjects();
  </script>
