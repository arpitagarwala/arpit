<body class="transition-colors duration-300 overflow-x-hidden bg-slate-950 text-slate-200">

  <div class="max-w-6xl mx-auto px-4 sm:px-8 pt-10 pb-12">
    <!-- Integrated Premium Header -->
    <div class="mb-8 fade-up">
      <div class="flex flex-col sm:flex-row sm:items-end gap-4 mb-6">
        <div>
          <h1 class="text-4xl sm:text-5xl font-black tracking-tight leading-none" style="background:linear-gradient(135deg,#10b981,#22d3ee,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Projects</h1>
          <div class="shimmer-underline" style="height:3px;width:72px;background:linear-gradient(90deg,#10b981,#22d3ee);border-radius:99px;margin-top:6px;"></div>
        </div>
        <p class="text-sm max-w-lg pb-1 leading-relaxed text-slate-400">Finance tools, productivity apps, and interactive experiments — engineered with precision.</p>
      </div>

      <!-- Compact Search & Stats Row -->
      <div class="flex flex-wrap gap-4 items-center">
        <div class="flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-xl border text-slate-400 bg-slate-800/40 border-slate-700/30">
          <i class="ri-rocket-2-fill text-emerald-500"></i>
          <span id="total-count">0</span> Tools Total
        </div>
        <div class="relative flex-1 max-w-sm">
          <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-sm pointer-events-none text-slate-500"></i>
          <input id="search-input" type="text" placeholder="Search projects archive..."
            class="w-full pl-9 pr-8 py-2.5 rounded-xl border text-sm focus:outline-none transition-colors shadow-sm bg-slate-800 text-slate-100 placeholder-slate-500 border-slate-700/50 focus:border-emerald-500"
            oninput="handleSearch()" />
          <button id="clear-btn" onclick="clearSearch()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hidden"><i class="ri-close-line text-sm"></i></button>
        </div>
      </div>
    </div>

    <!-- Category Filters -->
    <div class="flex flex-wrap gap-2 mb-5" id="cat-filters">
      <!-- Built dynamically by JS -->
    </div>

    <!-- Grid -->
    <div id="projects-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5"></div>

    <!-- Empty State -->
    <div id="no-results" class="hidden flex-col items-center justify-center py-16 text-center">
      <i class="ri-search-eye-line text-4xl mb-3 text-slate-600"></i>
      <h3 class="text-lg font-bold mb-2 text-slate-400">No projects found.</h3>
      <p class="text-sm mb-3 text-slate-500">Try a different filter or search.</p>
      <button onclick="clearSearch()" class="text-sm hover:underline font-medium text-emerald-400">Clear</button>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center py-3.5 px-6 rounded-2xl border text-sm bg-slate-800/50 border-slate-700/30 text-slate-500">
      &copy; 2026 Arpit Agarwala. Engineered with <span class="text-red-400">&#10084;&#65039;</span>
    </div>
  </div>

  <script>
    const PROJECTS = [
      {
        href: 'projects/ai-assistant.html', title: 'Arpit\'s AI Avatar',
        sub: 'Simulated chatbot interface',
        icon: 'ri-robot-2-fill', gradient: 'from-indigo-600 to-violet-700',
        category: 'Utility', featured: true,
        tags: ['AI', 'Simulation', 'Chat Interface']
      },
      {
        href: 'projects/expense-splitter.html', title: 'Bill Splitter',
        sub: 'Split expenses with friends',
        icon: 'ri-group-line', gradient: 'from-violet-500 to-purple-600',
        category: 'Finance', featured: false,
        tags: ['Bill Splitting', 'Export', 'Finance']
      },
      {
        href: 'projects/budget.html', title: 'FinTech Hub',
        sub: 'Banking dashboard & budget tracker',
        icon: 'ri-bank-card-line', gradient: 'from-emerald-500 to-teal-600',
        category: 'Finance', featured: true,
        tags: ['Cards', 'Charts', 'Personal Finance']
      },
      {
        href: 'projects/calculator.html', title: 'Calculator',
        sub: 'Keyboard-ready with history',
        icon: 'ri-calculator-line', gradient: 'from-orange-500 to-red-500',
        category: 'Utility', featured: true,
        tags: ['Keyboard', 'History Log', 'Glassmorphism']
      },
      {
        href: 'projects/clock.html', title: 'Clock',
        sub: 'Digital + analog world clock',
        icon: 'ri-time-line', gradient: 'from-slate-500 to-slate-700',
        category: 'Utility', featured: false,
        tags: ['Real-time', 'Analog', 'World Clocks']
      },

      {
        href: 'projects/network.html', title: 'Neural Network',
        sub: '3D particle system (WebGL)',
        icon: 'ri-shape-2-fill', gradient: 'from-slate-700 to-slate-900',
        category: 'Utility', featured: true,
        tags: ['Three.js', 'WebGL', 'Physics']
      },
      {
        href: 'projects/notepad.html', title: 'Notepad',
        sub: 'Private auto-saving notes',
        icon: 'ri-sticky-note-line', gradient: 'from-yellow-500 to-amber-500',
        category: 'Utility', featured: false,
        tags: ['Privacy', 'Auto-save', 'Local Storage']
      },
      {
        href: 'projects/pathfinder.html', title: 'Pathfinder',
        sub: 'A* & Dijkstra visualizer',
        icon: 'ri-route-line', gradient: 'from-indigo-500 to-purple-600',
        category: 'Utility', featured: true,
        tags: ['Algorithms', 'DSA', 'Visualizer']
      },
      {
        href: 'projects/pomodoro-gamified.html', title: 'Pomodoro',
        sub: 'Focus timer with XP & ranks',
        icon: 'ri-fire-fill', gradient: 'from-purple-500 to-indigo-600',
        category: 'Utility', featured: false,
        tags: ['Productivity', 'Gamification', 'RPG']
      },
      {
        href: 'projects/github-readme-maker.html', title: 'README Maker',
        sub: 'Auto-generate GitHub READMEs',
        icon: 'ri-github-fill', gradient: 'from-gray-700 to-gray-900',
        category: 'Utility', featured: false,
        tags: ['Automation', 'Markdown', 'GitHub']
      },
      {
        href: 'projects/sip.html', title: 'SIP Calculator',
        sub: 'Mutual fund growth simulator',
        icon: 'ri-line-chart-line', gradient: 'from-cyan-500 to-blue-600',
        category: 'Finance', featured: true,
        tags: ['Chart.js', 'Investing', 'Compound Interest']
      },
      {
        href: 'projects/typing-speed.html', title: 'Typing Test',
        sub: 'Live WPM & accuracy tracker',
        icon: 'ri-keyboard-line', gradient: 'from-cyan-400 to-blue-500',
        category: 'Utility', featured: true,
        tags: ['Educational', 'Skill', 'WPM']
      }
    ];

    let activeCategory = 'all', activeSearch = '';

    function buildCatFilters() {
      const cats = ['all', ...new Set(PROJECTS.map(p => p.category))];
      const bar = document.getElementById('cat-filters');
      bar.innerHTML = cats.map(c => `
        <button onclick="setCat('${c}',this)" class="cat-chip px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all ${c==='all' ? 'border-emerald-500/40 bg-emerald-500/10 text-emerald-400 active-chip' : 'border-slate-700/50 bg-slate-800 text-slate-400 hover:border-emerald-400/50 hover:text-emerald-500'}">${c==='all'?'All':c}</button>
      `).join('');
    }

    function setCat(c, btn) {
      activeCategory = c;
      document.querySelectorAll('.cat-chip').forEach(b => {
        const isActive = b.textContent.trim() === (c==='all'?'All':c);
        b.className = `cat-chip px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all ${isActive
          ? 'border-emerald-500/40 bg-emerald-500/10 text-emerald-400 active-chip'
          : 'border-slate-700/50 bg-slate-800 text-slate-400 hover:border-emerald-400/50 hover:text-emerald-500'}`;
      });
      renderProjects();
    }

    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      const noResults = document.getElementById('no-results');
      const totalEl = document.getElementById('total-count');
      const query = activeSearch.toLowerCase().trim();

      const filtered = PROJECTS.filter(p => {
        const matchCat = activeCategory === 'all' || p.category === activeCategory;
        const matchQ = !query
          || p.title.toLowerCase().includes(query)
          || p.sub.toLowerCase().includes(query)
          || p.tags.some(t => t.toLowerCase().includes(query))
          || p.category.toLowerCase().includes(query);
        return matchCat && matchQ;
      });

      if (totalEl) totalEl.textContent = PROJECTS.length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden'); noResults.classList.add('flex');
        return;
      }
      noResults.classList.add('hidden'); noResults.classList.remove('flex');

      grid.innerHTML = filtered.map((p, i) => `
        <a href="${p.href}" class="stagger-item group backdrop-blur-md rounded-2xl border shadow-sm hover:shadow-xl p-5 flex flex-col items-center text-center transition-all duration-300 bg-slate-800/40 border-slate-700/50 hover:border-emerald-400" style="--delay: ${i*50}ms">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br ${p.gradient} flex items-center justify-center shadow-lg mb-4 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-300">
            <i class="${p.icon} text-2xl text-white"></i>
          </div>
          <h2 class="text-xs font-bold mb-0.5 leading-tight text-slate-100">${p.title}</h2>
          <p class="text-[10px] leading-snug text-slate-500">${p.sub}</p>
        </a>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderProjects();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = ''; activeCategory = 'all';
      document.getElementById('clear-btn').classList.add('hidden');
      buildCatFilters(); renderProjects();
    }

    // Legacy setFilter used by old HTML — route to new setCat
    function setFilter(btn, cat) { setCat(cat, btn); }

    buildCatFilters();
    renderProjects();
  </script>
</body>
