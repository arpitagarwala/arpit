name: Deploy Vite Portfolio

on:
  push:
    branches:
      - vite-migration
    paths:
      - 'vite-app/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: vite-app
        run: npm install

      - name: Build
        working-directory: vite-app
        run: npm run build

      - name: Deploy to GitHub Pages (preview branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-vite
          force_orphan: true
