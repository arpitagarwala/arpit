name: Deploy Vite Portfolio

on:
  push:
    branches:
      - vite-migration
    paths:
      - 'vite-app/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vite-app/package-lock.json

      - name: Install dependencies
        working-directory: vite-app
        run: npm ci

      - name: Build
        working-directory: vite-app
        run: npm run build

      # Copies the built /dist output into the root of the gh-pages branch
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages-vite   # separate branch — won't overwrite your live site
          # Once validated, change to: publish_branch: gh-pages
