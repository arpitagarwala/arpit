<!DOCTYPE html>
<html class="" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Profile Automator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .markdown-body h1 { border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; margin-bottom: 1rem; font-size: 2rem; font-weight: bold; }
    .markdown-body h2 { font-size: 1.5rem; font-weight: bold; margin-top: 1.5rem; margin-bottom: 1rem; }
    .markdown-body p { margin-bottom: 1rem; line-height: 1.6; }
    .markdown-body img { max-width: 100%; display: inline-block; margin-right: 5px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col" x-data="readmeBuilder()">
  
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-3 flex items-center justify-between shadow-sm shrink-0">
      <div class="flex items-center gap-3">
        <i class="ri-github-fill text-2xl"></i>
        <span class="text-sm font-bold tracking-tight">GitHub Profile README Maker</span>
      </div>
      <div class="flex gap-3">
        <button @click="copyCode" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-lg font-bold transition flex items-center gap-2 shadow-lg">
          <i class="ri-file-copy-line"></i> Copy Markdown Code
        </button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      <!-- Sidebar / Form -->
      <aside class="w-[400px] bg-slate-900 border-r border-slate-800 overflow-y-auto p-6 flex flex-col gap-8 shadow-inner shrink-0">
        
        <!-- Identity -->
        <div>
          <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3">Core Identity</h2>
          <div class="flex flex-col gap-3">
            <div>
              <label class="block text-xs font-bold mb-1 text-slate-400">GitHub Username</label>
              <input type="text" x-model="username" placeholder="e.g. arpitagarwala" class="w-full bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-2 text-sm focus:ring-2 ring-indigo-500 outline-none transition font-mono">
            </div>
            <div>
              <label class="block text-xs font-bold mb-1 text-slate-400">Greeting Header</label>
              <input type="text" x-model="title" class="w-full bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-2 text-sm focus:ring-2 ring-indigo-500 outline-none transition">
            </div>
            <div>
              <label class="block text-xs font-bold mb-1 text-slate-400">Short Bio</label>
              <textarea x-model="description" rows="2" class="w-full bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-2 text-sm focus:ring-2 ring-indigo-500 outline-none transition"></textarea>
            </div>
          </div>
        </div>

        <!-- Dynamic Stats & Cards -->
        <div>
          <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3">Dynamic Analytics (Vercel)</h2>
          <div class="flex flex-col gap-3 bg-slate-800 p-4 rounded-xl border border-slate-700">
            <label class="flex items-center gap-2 text-sm font-semibold cursor-pointer text-slate-200">
              <input type="checkbox" x-model="stats.githubStats" class="w-4 h-4 text-indigo-600 rounded"> Enable Main Stats Card
            </label>
            <label class="flex items-center gap-2 text-sm font-semibold cursor-pointer">
              <input type="checkbox" x-model="stats.topLangs" class="w-4 h-4 text-indigo-600 rounded"> Top Languages Chart
            </label>
            <label class="flex items-center gap-2 text-sm font-semibold cursor-pointer">
              <input type="checkbox" x-model="stats.streak" class="w-4 h-4 text-indigo-600 rounded"> GitHub Streak Tracker
            </label>
            <label class="flex items-center gap-2 text-sm font-semibold cursor-pointer">
              <input type="checkbox" x-model="stats.trophies" class="w-4 h-4 text-indigo-600 rounded"> GitHub Trophies UI
            </label>
            <label class="flex items-center gap-2 text-sm font-semibold cursor-pointer text-slate-200">
              <input type="checkbox" x-model="stats.visitors" class="w-4 h-4 text-indigo-600 rounded"> Analytics Visitor Counter
            </label>
            
            <div class="mt-2 pt-3 border-t border-slate-700">
                <label class="block text-xs font-bold mb-1 text-slate-400">Card Theme</label>
                <select x-model="stats.theme" class="w-full bg-slate-900 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
                    <option value="radical">Radical</option>
                    <option value="tokyonight">Tokyo Night</option>
                    <option value="dark">Dark</option>
                    <option value="dracula">Dracula</option>
                    <option value="transparent">Transparent</option>
                </select>
            </div>
          </div>
        </div>

        <!-- Tech Stack -->
        <div>
          <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3">Tech Skills (DevIcons)</h2>
          <div class="flex gap-2 mb-2">
            <select x-model="newTech" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-2 text-sm outline-none">
                <option value="">Select a tech...</option>
                <option value="react">React</option>
                <option value="vuejs">Vue.js</option>
                <option value="angularjs">Angular</option>
                <option value="svelte">Svelte</option>
                <option value="typescript">TypeScript</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="java">Java</option>
                <option value="cplusplus">C++</option>
                <option value="go">Go</option>
                <option value="rust">Rust</option>
                <option value="html5">HTML5</option>
                <option value="css3">CSS3</option>
                <option value="nodejs">Node.js</option>
                <option value="express">Express</option>
                <option value="nextjs">Next.js</option>
                <option value="tailwindcss">Tailwind CSS</option>
                <option value="sass">SASS</option>
                <option value="mongodb">MongoDB</option>
                <option value="mysql">MySQL</option>
                <option value="postgresql">PostgreSQL</option>
                <option value="firebase">Firebase</option>
                <option value="aws">AWS</option>
                <option value="docker">Docker</option>
                <option value="kubernetes">Kubernetes</option>
                <option value="git">Git</option>
                <option value="linux">Linux</option>
            </select>
            <button @click="addTech" class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 rounded-lg font-bold"><i class="ri-add-line"></i> Add</button>
          </div>
          <div class="flex flex-wrap gap-2 mt-3">
             <template x-for="(t, idx) in techStack" :key="idx">
                <span class="inline-flex items-center gap-1 bg-slate-800 border border-slate-700 text-slate-200 text-xs font-bold px-2 py-1 rounded-md">
                    <span x-text="t"></span>
                    <i class="ri-close-circle-fill text-slate-400 hover:text-red-500 cursor-pointer" @click="techStack.splice(idx,1)"></i>
                </span>
             </template>
          </div>
        </div>
        
        <!-- Socials -->
        <div>
          <h2 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-3">Connect / Socials</h2>
          <div class="flex flex-col gap-3">
            <div class="flex items-center gap-2">
              <i class="ri-linkedin-box-fill text-blue-600 text-xl"></i>
              <input type="text" x-model="socials.linkedin" placeholder="LinkedIn URL" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
            </div>
            <div class="flex items-center gap-2">
              <i class="ri-twitter-x-line text-slate-300 text-xl"></i>
              <input type="text" x-model="socials.twitter" placeholder="Twitter/X Username" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
            </div>
            <div class="flex items-center gap-2">
              <i class="ri-links-line text-emerald-600 text-xl"></i>
              <input type="text" x-model="socials.portfolio" placeholder="Portfolio Website URL" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
            </div>
            
            <div class="flex items-center gap-2">
              <i class="ri-youtube-fill text-red-600 text-xl"></i>
              <input type="text" x-model="socials.youtube" placeholder="YouTube Channel URL" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
            </div>
            <div class="flex items-center gap-2">
              <i class="ri-medium-fill text-slate-200 text-xl"></i>
              <input type="text" x-model="socials.medium" placeholder="Medium Profile URL" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
            </div>
            <div class="flex items-center gap-2">
              <i class="ri-terminal-box-fill text-slate-400 text-xl"></i>
              <input type="text" x-model="socials.devto" placeholder="Dev.to Username" class="flex-1 bg-slate-800 border border-slate-700 text-slate-100 rounded-lg px-3 py-1.5 text-sm outline-none">
            </div>
          </div>
        </div>

      </aside>

      <!-- Preview Window -->
      <main class="flex-1 bg-slate-950 p-8 overflow-y-auto relative w-full">
        <div class="absolute top-4 right-4 bg-slate-800 shadow-md border border-slate-700 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-300 flex items-center gap-2 z-10">
          <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
          Live Render
        </div>
        
        <div class="bg-slate-900 text-slate-200 rounded-xl shadow-2xl border border-slate-800 p-10 max-w-4xl mx-auto markdown-body w-full overflow-hidden" x-html="compiledMarkdown"></div>
      </main>
    </div>
  </div>

  <script>
    function readmeBuilder() {
      return {
        username: 'arpitagarwala',
        title: 'Hi there! I am Arpit 👋',
        description: 'BCom (Hons) student and aspiring CA from Kolkata. I build things with tech.',
        stats: { githubStats: true, topLangs: true, streak: true, trophies: false, visitors: true, theme: 'radical' },
        techStack: ['react', 'python', 'javascript', 'html5', 'tailwindcss'],
        newTech: '',
        socials: { linkedin: 'https://linkedin.com/in/arpitagarwala', twitter: '', portfolio: 'https://arpitagarwala.online', youtube: '', medium: '', devto: '' },
        
        addTech() {
          if(this.newTech && !this.techStack.includes(this.newTech)) {
            this.techStack.push(this.newTech);
            this.newTech = '';
          }
        },

        get generatedMarkdown() {
          let u = this.username || 'username';
          let themeStr = `&theme=${this.stats.theme}`;

          let md = `<h1 align="center">${this.title}</h1>\n\n`;
          md += `<p align="center">${this.description}</p>\n\n`;
          
          // Visitor Badge
          if(this.stats.visitors) {
              md += `<p align="center"><img src="https://profile-counter.glitch.me/${u}/count.svg" alt="Visitors" /></p>\n\n`;
          }

          // Socials
          md += `<p align="center">\n`;
          if(this.socials.linkedin) md += `<a href="${this.socials.linkedin}"><img src="https://img.shields.io/badge/LinkedIn-0077B5?style=for-the-badge&logo=linkedin&logoColor=white" alt="LinkedIn"/></a> `;
          if(this.socials.twitter) md += `<a href="https://twitter.com/${this.socials.twitter}"><img src="https://img.shields.io/badge/Twitter-000000?style=for-the-badge&logo=x&logoColor=white" alt="Twitter"/></a> `;
          if(this.socials.portfolio) md += `<a href="${this.socials.portfolio}"><img src="https://img.shields.io/badge/Portfolio-2563EB?style=for-the-badge&logo=Web&logoColor=white" alt="Portfolio"/></a> `;
          if(this.socials.youtube) md += `<a href="${this.socials.youtube}"><img src="https://img.shields.io/badge/YouTube-FF0000?style=for-the-badge&logo=youtube&logoColor=white" alt="YouTube"/></a> `;
          if(this.socials.medium) md += `<a href="${this.socials.medium}"><img src="https://img.shields.io/badge/Medium-000000?style=for-the-badge&logo=medium&logoColor=white" alt="Medium"/></a> `;
          if(this.socials.devto) md += `<a href="https://dev.to/${this.socials.devto}"><img src="https://img.shields.io/badge/dev.to-0A0A0A?style=for-the-badge&logo=dev.to&logoColor=white" alt="Dev.to"/></a> `;
          md += `\n</p>\n\n`;

          // Tech Stack
          if(this.techStack.length > 0) {
              md += `## 🛠️ Languages & Tools\n<p align="left">\n`;
              this.techStack.forEach(t => {
                  md += `<img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/${t}/${t}-original.svg" alt="${t}" width="40" height="40"/> `;
              });
              md += `\n</p>\n\n`;
          }

          // Trophies
          if(this.stats.trophies) {
              md += `## 🏆 GitHub Trophies\n`;
              md += `[![trophy](https://github-profile-trophy.vercel.app/?username=${u}${themeStr}&row=1&column=7&no-frame=true&no-bg=true)](https://github.com/ryo-ma/github-profile-trophy)\n\n`;
          }

          // Stats Layout (GitHub Readme Stats Vercel endpoint)
          if(this.stats.githubStats || this.stats.topLangs) {
              md += `## 📈 GitHub Analytics\n\n`;
              md += `<div>\n`;
              if(this.stats.githubStats) {
                  md += `  <img align="left" height="195" src="https://github-readme-stats.vercel.app/api?username=${u}&show_icons=true&hide_border=true${themeStr}" alt="${u}'s Github Stats" />\n`;
              }
              if(this.stats.topLangs) {
                  md += `  <img align="left" height="195" src="https://github-readme-stats.vercel.app/api/top-langs/?username=${u}&layout=compact&hide_border=true${themeStr}" alt="Top Langs" />\n`;
              }
              md += `</div>\n<br clear="both"/>\n\n`;
          }

          if(this.stats.streak) {
              md += `## 🔥 Current Streak\n`;
              md += `[![GitHub Streak](https://streak-stats.demolab.com?user=${u}${themeStr}&hide_border=true)](https://git.io/streak-stats)\n\n`;
          }

          return md;
        },

        get compiledMarkdown() {
          return marked.parse(this.generatedMarkdown);
        },

        copyCode() {
          navigator.clipboard.writeText(this.generatedMarkdown).then(() => {
            alert('Markdown successfully copied to your clipboard!');
          });
        }
      }
    }
  </script>
</body>
</html>
