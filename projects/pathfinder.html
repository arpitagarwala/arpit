<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pathfinding Visualizer – Arpit Agarwala</title>
  <meta name="description" content="Interactive Pathfinding Visualizer. See algorithms like Dijkstra and A* in action." />

  <script src="https://cdn.tailwindcss.com"></script>
  
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">

  <style>
    .grid-board {
      display: grid;
      gap: 1px;
      /* Light mode grid gaps */
      background-color: rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0,0,0,0.1);
      touch-action: none;
      width: fit-content;
      margin: 0 auto;
    }
    .dark .grid-board {
      /* Dark mode grid gaps */
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .node {
      width: 25px;
      height: 25px;
      background-color: white;
    }
    .dark .node {
      background-color: #1e293b;
    }
    .node-wall {
      background-color: #0f172a !important;
      animation: wallAnim 0.2s ease-out forwards;
    }
    .dark .node-wall {
      background-color: #cbd5e1 !important;
    }
    .node-visited {
      animation: visitedAnim 1.5s ease-out forwards;
    }
    .node-path {
      animation: pathAnim 0.5s ease-out forwards;
    }
    .node-start {
      background-color: #10b981 !important;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"><path fill="%23fff" d="M12 2L22 20H2L12 2Z"/></svg>');
      background-repeat: no-repeat;
      background-position: center;
      transform: scale(1.1);
      border-radius: 4px;
      z-index: 10;
      position: relative;
    }
    .node-target {
      background-color: #ef4444 !important;
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="8" fill="%23fff"/></svg>');
      background-repeat: no-repeat;
      background-position: center;
      transform: scale(1.1);
      border-radius: 4px;
      z-index: 10;
      position: relative;
    }

    @media (max-width: 768px) {
      .node { width: 14px; height: 14px; }
      .node-start, .node-target { background-size: 8px; }
    }

    @keyframes wallAnim {
      0% { transform: scale(0.3); border-radius: 10px; }
      100% { transform: scale(1); border-radius: 0; }
    }
    @keyframes visitedAnim {
      0% { transform: scale(0.3); background-color: rgba(6, 182, 212, 0.75); border-radius: 100%; }
      50% { background-color: rgba(99, 102, 241, 0.75); }
      100% { transform: scale(1); background-color: rgba(6, 182, 212, 0.25); }
    }
    @keyframes pathAnim {
      0% { transform: scale(0.6); background-color: rgba(234, 179, 8, 0.8); border-radius: 10px; }
      100% { transform: scale(1); background-color: rgba(234, 179, 8, 1); }
    }
  </style>
</head>

<body class="min-h-screen transition-colors duration-300 pb-10 bg-slate-950 text-slate-100">
  <!-- Uniform Back Button -->
  <div class="fixed top-4 left-4 z-50 pointer-events-auto">
    <a id="back-link" href="../projects.html" class="w-10 h-10 flex items-center justify-center rounded-full backdrop-blur border transition-all shadow-lg hover:scale-105 active:scale-95 bg-slate-800/50 border-slate-700/50 hover:bg-slate-700/80 text-white">
      <i class="ri-arrow-left-line text-lg"></i>
    </a>
  </div>

  <!-- Uniform Theme Toggle -->

  <!-- BACK + THEME -->
  <div class="fixed top-4 left-4 z-[100]">
    
  </div>

  <!-- TOAST -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 opacity-0 translate-y-4 pointer-events-none transition-all duration-300">
    <div id="toast-msg" class="px-5 py-2.5 rounded-xl text-sm font-bold shadow-2xl flex items-center gap-2 bg-slate-800 text-slate-900"></div>
  </div>

  <div class="pt-20 px-4 max-w-[1200px] mx-auto flex flex-col items-center">
    
    <div class="text-center mb-8 fade-up">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30 mb-4">
        <i class="ri-route-line text-3xl text-white"></i>
      </div>
      <h1 class="text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-100">Pathfinder</h1>
      <p class="mt-2 text-sm max-w-lg mx-auto text-slate-400">
        Visualise algorithms hunting for the shortest path. Draw your own walls and see the logic unfold in real-time.
      </p>
    </div>

    <!-- CONTROLS -->
    <div class="w-full p-4 sm:p-5 rounded-3xl shadow-xl border mb-8 fade-up flex flex-wrap gap-4 items-center justify-between bg-slate-800 border-slate-700/50">
      
      <div class="flex items-center gap-3 w-full md:w-auto">
        <select id="algo-select" class="flex-1 w-full md:w-48 border text-sm font-semibold rounded-xl px-4 py-2.5 outline-none focus:ring-2 ring-indigo-500 cursor-pointer transition-all bg-slate-700 border-slate-600 text-slate-200">
          <option value="dijkstra">Dijkstra's Algorithm</option>
          <option value="astar">A* Search</option>
          <option value="bfs">Breadth-First Search</option>
          <option value="dfs">Depth-First Search</option>
        </select>
      </div>

      <div class="flex gap-2 w-full md:w-auto overflow-x-auto pb-1 md:pb-0">
        <button onclick="visualize()" id="btn-vis" class="flex-1 md:flex-none px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-bold rounded-xl shadow-lg shadow-indigo-500/30 transition-all active:scale-95 flex items-center justify-center gap-2 whitespace-nowrap">
          <i class="ri-play-fill text-lg"></i> Visualize
        </button>
        <button onclick="generateMaze()" id="btn-maze" class="flex-1 md:flex-none px-5 py-2.5 text-sm font-bold rounded-xl border transition-all active:scale-95 flex items-center justify-center gap-2 whitespace-nowrap bg-slate-700 hover:bg-slate-600 text-slate-200 border-slate-600">
          <i class="ri-grid-line"></i> Maze
        </button>
        <button onclick="clearPath()" id="btn-cpath" class="flex-1 md:flex-none px-5 py-2.5 text-sm font-bold rounded-xl border transition-all active:scale-95 flex items-center justify-center gap-2 whitespace-nowrap bg-slate-700 hover:bg-slate-600 text-slate-200 border-slate-600">
          Clear Path
        </button>
        <button onclick="clearBoard()" id="btn-cboard" class="flex-1 md:flex-none px-5 py-2.5 text-sm font-bold rounded-xl border transition-all active:scale-95 flex items-center justify-center gap-2 whitespace-nowrap bg-rose-500/10 text-rose-400 hover:bg-rose-500/20 border-rose-500/30">
          <i class="ri-delete-bin-line"></i> Reset
        </button>
      </div>

    </div>

    <!-- LEGEND -->
    <div class="flex flex-wrap items-center justify-center gap-5 sm:gap-8 mb-6 text-xs font-semibold fade-up text-slate-400">
      <div class="flex items-center gap-2"><div class="w-4 h-4 bg-emerald-500 rounded flex items-center justify-center"><i class="ri-arrow-up-line text-[10px] text-white font-bold"></i></div> Start Node</div>
      <div class="flex items-center gap-2"><div class="w-4 h-4 bg-red-500 rounded flex items-center justify-center"><div class="w-1.5 h-1.5 bg-white rounded-full"></div></div> Target Node</div>
      <div class="flex items-center gap-2"><div class="w-4 h-4 rounded bg-slate-300"></div> Wall Node</div>
      <div class="flex items-center gap-2"><div class="w-4 h-4 bg-cyan-200 shadow-[inset_0_0_0_2px_rgba(6,182,212,0.4)] rounded"></div> Visited Node</div>
      <div class="flex items-center gap-2"><div class="w-4 h-4 bg-yellow-400 rounded"></div> Shortest Path</div>
    </div>

    <!-- GRID -->
    <div class="p-2 sm:p-4 rounded-3xl shadow-2xl border fade-up overflow-x-auto w-full flex justify-center bg-slate-800 border-slate-700/50">
      <div id="grid" class="grid-board rounded-2xl overflow-hidden cursor-crosshair"></div>
    </div>

  </div>

  <script>
    // Theme Management


    function showToast(icon, msg) {
      const t = document.getElementById('toast'), m = document.getElementById('toast-msg');
      m.innerHTML = `<i class="${icon} text-lg"></i> ${msg}`;
      t.style.opacity = '1'; t.style.transform = 'translateY(0) translateX(-50%)';
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(16px) translateX(-50%)'; }, 3000);
    }

    // Grid config
    const isMobile = window.innerWidth <= 768;
    const ROWS = isMobile ? 25 : 21;
    const COLS = isMobile ? 20 : 45;
    
    let START_NODE_ROW = Math.floor(ROWS/2);
    let START_NODE_COL = Math.floor(COLS/5);
    let FINISH_NODE_ROW = Math.floor(ROWS/2);
    let FINISH_NODE_COL = Math.floor(COLS*4/5);

    let grid = [];
    let isDrawing = false;
    let isEraseMode = false;
    let isMovingStart = false;
    let isMovingFinish = false;
    let isAnimating = false;
    let hasVisualized = false;
    
    const gridEl = document.getElementById('grid');
    gridEl.style.gridTemplateColumns = `repeat(${COLS}, minmax(0, 1fr))`;

    class Node {
      constructor(row, col) {
        this.row = row;
        this.col = col;
        this.isStart = row === START_NODE_ROW && col === START_NODE_COL;
        this.isFinish = row === FINISH_NODE_ROW && col === FINISH_NODE_COL;
        this.distance = Infinity;
        this.distanceToFinish = 0;
        this.isVisited = false;
        this.isWall = false;
        this.previousNode = null;
      }
    }

    function createGrid() {
      grid = [];
      gridEl.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        let curRow = [];
        for (let c = 0; c < COLS; c++) {
          const n = new Node(r, c);
          curRow.push(n);
          
          const el = document.createElement('div');
          el.id = `node-${r}-${c}`;
          el.className = 'node';
          if (n.isStart) el.classList.add('node-start');
          if (n.isFinish) el.classList.add('node-target');
          
          // Mouse Events
          el.addEventListener('mousedown', () => handleMouseDown(r, c));
          el.addEventListener('mouseenter', () => handleMouseEnter(r, c));
          
          // Touch Events
          el.addEventListener('touchstart', (e) => { e.preventDefault(); handleMouseDown(r, c); });
          
          gridEl.appendChild(el);
        }
        grid.push(curRow);
      }
      
      // Global mouse/touch up
      window.addEventListener('mouseup', handleMouseUp);
      window.addEventListener('touchend', handleMouseUp);
      
      // Touch move handler locally on grid
      gridEl.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const touch = e.touches[0];
        const el = document.elementFromPoint(touch.clientX, touch.clientY);
        if (el && el.id && el.id.startsWith('node-')) {
          const parts = el.id.split('-');
          handleMouseEnter(parseInt(parts[1]), parseInt(parts[2]));
        }
      });
    }

    function handleMouseDown(r, c) {
      if (isAnimating) return;
      if (grid[r][c].isStart) {
        isMovingStart = true;
      } else if (grid[r][c].isFinish) {
        isMovingFinish = true;
      } else {
        isDrawing = true;
        isEraseMode = grid[r][c].isWall; // If clicking on a wall, erase. Else draw.
        toggleWall(r, c, !isEraseMode);
      }
    }

    function handleMouseEnter(r, c) {
      if (isAnimating) return;
      if (isMovingStart && !grid[r][c].isFinish && !grid[r][c].isWall) {
        changeStartNode(r, c);
        if (hasVisualized) instantVisualize();
      } else if (isMovingFinish && !grid[r][c].isStart && !grid[r][c].isWall) {
        changeFinishNode(r, c);
        if (hasVisualized) instantVisualize();
      } else if (isDrawing && !grid[r][c].isStart && !grid[r][c].isFinish) {
        toggleWall(r, c, !isEraseMode);
      }
    }

    function handleMouseUp() {
      isDrawing = false;
      isMovingStart = false;
      isMovingFinish = false;
      isEraseMode = false;
    }

    function changeStartNode(newRow, newCol) {
      const oldNode = grid[START_NODE_ROW][START_NODE_COL];
      oldNode.isStart = false;
      document.getElementById(`node-${START_NODE_ROW}-${START_NODE_COL}`).classList.remove('node-start');
      
      START_NODE_ROW = newRow;
      START_NODE_COL = newCol;
      grid[newRow][newCol].isStart = true;
      document.getElementById(`node-${newRow}-${newCol}`).classList.add('node-start');
    }

    function changeFinishNode(newRow, newCol) {
      const oldNode = grid[FINISH_NODE_ROW][FINISH_NODE_COL];
      oldNode.isFinish = false;
      document.getElementById(`node-${FINISH_NODE_ROW}-${FINISH_NODE_COL}`).classList.remove('node-target');
      
      FINISH_NODE_ROW = newRow;
      FINISH_NODE_COL = newCol;
      grid[newRow][newCol].isFinish = true;
      document.getElementById(`node-${newRow}-${newCol}`).classList.add('node-target');
    }

    function toggleWall(r, c, makeWall) {
      if (grid[r][c].isWall === makeWall) return;
      grid[r][c].isWall = makeWall;
      const el = document.getElementById(`node-${r}-${c}`);
      if (makeWall) el.classList.add('node-wall');
      else el.classList.remove('node-wall');
    }

    function clearBoard() {
      if (isAnimating) return;
      hasVisualized = false;
      createGrid();
    }

    function clearPath() {
      if (isAnimating) return;
      hasVisualized = false;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const n = grid[r][c];
          n.isVisited = false;
          n.distance = Infinity;
          n.previousNode = null;
          const el = document.getElementById(`node-${r}-${c}`);
          el.classList.remove('node-visited', 'node-path');
        }
      }
    }

    // ─── ALGORITHMS ───
    function getNeighbors(node, grid) {
      const ne = [];
      const {row: r, col: c} = node;
      if (r > 0) ne.push(grid[r-1][c]); // up
      if (r < ROWS - 1) ne.push(grid[r+1][c]); // down
      if (c > 0) ne.push(grid[r][c-1]); // left
      if (c < COLS - 1) ne.push(grid[r][c+1]); // right
      return ne.filter(n => !n.isVisited && !n.isWall);
    }

    // Dijkstra
    function dijkstra(grid, startNode, finishNode) {
      const visitedNodesInOrder = [];
      startNode.distance = 0;
      const unvisitedNodes = getAllNodes(grid);
      
      while (!!unvisitedNodes.length) {
        unvisitedNodes.sort((a,b) => a.distance - b.distance);
        const closestNode = unvisitedNodes.shift();
        
        if (closestNode.isWall) continue;
        if (closestNode.distance === Infinity) return visitedNodesInOrder;
        
        closestNode.isVisited = true;
        visitedNodesInOrder.push(closestNode);
        
        if (closestNode === finishNode) return visitedNodesInOrder;
        
        const neighbors = getNeighbors(closestNode, grid);
        for (const neighbor of neighbors) {
          neighbor.distance = closestNode.distance + 1;
          neighbor.previousNode = closestNode;
        }
      }
      return visitedNodesInOrder;
    }

    // BFS
    function bfs(grid, startNode, finishNode) {
      const visitedNodesInOrder = [];
      const queue = [startNode];
      startNode.isVisited = true;
      while (queue.length) {
        const curr = queue.shift();
        visitedNodesInOrder.push(curr);
        if (curr === finishNode) return visitedNodesInOrder;
        
        const neighbors = getNeighbors(curr, grid);
        for (const n of neighbors) {
          n.isVisited = true;
          n.previousNode = curr;
          queue.push(n);
        }
      }
      return visitedNodesInOrder;
    }

    // DFS
    function dfs(grid, startNode, finishNode) {
      const visitedNodesInOrder = [];
      const stack = [startNode];
      while (stack.length) {
        const curr = stack.pop();
        if (curr.isVisited) continue;
        curr.isVisited = true;
        visitedNodesInOrder.push(curr);
        if (curr === finishNode) return visitedNodesInOrder;
        
        const neighbors = getNeighbors(curr, grid);
        for (const n of neighbors) {
          n.previousNode = curr;
          stack.push(n);
        }
      }
      return visitedNodesInOrder;
    }

    // A* 
    function astar(grid, startNode, finishNode) {
      const visitedNodesInOrder = [];
      startNode.distance = 0;
      startNode.distanceToFinish = heuristic(startNode, finishNode);
      const openSet = [startNode];
      
      while(openSet.length) {
        openSet.sort((a,b) => (a.distance + a.distanceToFinish) - (b.distance + b.distanceToFinish));
        const curr = openSet.shift();
        
        if (curr.isWall) continue;
        curr.isVisited = true;
        visitedNodesInOrder.push(curr);
        if (curr === finishNode) return visitedNodesInOrder;
        
        const neighbors = getNeighbors(curr, grid);
        for (const neighbor of neighbors) {
          if (curr.distance + 1 < neighbor.distance) {
            neighbor.distance = curr.distance + 1;
            neighbor.distanceToFinish = heuristic(neighbor, finishNode);
            neighbor.previousNode = curr;
            if (!openSet.includes(neighbor)) openSet.push(neighbor);
          }
        }
      }
      return visitedNodesInOrder;
    }

    function heuristic(a, b) {
      return Math.abs(a.row - b.row) + Math.abs(a.col - b.col);
    }

    function getAllNodes(grid) {
      const nodes = [];
      for (const r of grid) for (const node of r) nodes.push(node);
      return nodes;
    }

    function getNodesInShortestPathOrder(finishNode) {
      const nodesInShortestPathOrder = [];
      let currentNode = finishNode;
      while (currentNode !== null) {
        nodesInShortestPathOrder.unshift(currentNode);
        currentNode = currentNode.previousNode;
      }
      return nodesInShortestPathOrder;
    }

    // ─── VISUALIZATION ───
    async function visualize() {
      if (isAnimating) return;
      clearPath();
      isAnimating = true;
      hasVisualized = true;

      const algoMap = { 'dijkstra': dijkstra, 'bfs': bfs, 'dfs': dfs, 'astar': astar };
      const selectedAlgo = document.getElementById('algo-select').value;
      const algoName = document.getElementById('algo-select').options[document.getElementById('algo-select').selectedIndex].text;
      
      const startNode = grid[START_NODE_ROW][START_NODE_COL];
      const finishNode = grid[FINISH_NODE_ROW][FINISH_NODE_COL];
      
      const visitedNodesInOrder = algoMap[selectedAlgo](grid, startNode, finishNode);
      const shortestPath = getNodesInShortestPathOrder(finishNode);
      
      // Animate Visited
      for (let i = 0; i <= visitedNodesInOrder.length; i++) {
        if (i === visitedNodesInOrder.length) {
          await new Promise(r => setTimeout(r, 60));
          if (shortestPath.length > 1 && shortestPath[shortestPath.length-1] === finishNode) {
            await animateShortestPath(shortestPath);
            showToast('ri-check-double-line text-emerald-400', `Found path using ${algoName}! (${shortestPath.length-1} steps)`);
          } else {
            showToast('ri-error-warning-line text-rose-400', `No path found using ${algoName}.`);
          }
          isAnimating = false;
          return;
        }
        const n = visitedNodesInOrder[i];
        if (!n.isStart && !n.isFinish) {
          document.getElementById(`node-${n.row}-${n.col}`).classList.add('node-visited');
        }
        if (i % (isMobile?2:4) === 0) await new Promise(r => setTimeout(r, 5));
      }
    }

    async function animateShortestPath(nodesInShortestPathOrder) {
      for (let i = 0; i < nodesInShortestPathOrder.length; i++) {
        const n = nodesInShortestPathOrder[i];
        if (!n.isStart && !n.isFinish) {
          document.getElementById(`node-${n.row}-${n.col}`).classList.add('node-path');
        }
        await new Promise(r => setTimeout(r, 20));
      }
    }

    // Instant visualize when dragging
    function instantVisualize() {
      clearPath();
      const algoMap = { 'dijkstra': dijkstra, 'bfs': bfs, 'dfs': dfs, 'astar': astar };
      const selectedAlgo = document.getElementById('algo-select').value;
      const startNode = grid[START_NODE_ROW][START_NODE_COL];
      const finishNode = grid[FINISH_NODE_ROW][FINISH_NODE_COL];
      
      const visitedNodesInOrder = algoMap[selectedAlgo](grid, startNode, finishNode);
      const shortestPath = getNodesInShortestPathOrder(finishNode);
      
      for (let i = 0; i < visitedNodesInOrder.length; i++) {
        const n = visitedNodesInOrder[i];
        if (!n.isStart && !n.isFinish) {
          const el = document.getElementById(`node-${n.row}-${n.col}`);
          el.style.animation = 'none'; // skip animation
          el.style.backgroundColor = document.documentElement.classList.contains('dark') ? 'rgba(6, 182, 212, 0.4)' : 'rgba(6, 182, 212, 0.25)';
        }
      }
      
      if (shortestPath.length > 1 && shortestPath[shortestPath.length-1] === finishNode) {
        for (let i = 0; i < shortestPath.length; i++) {
          const n = shortestPath[i];
          if (!n.isStart && !n.isFinish) {
            const el = document.getElementById(`node-${n.row}-${n.col}`);
            el.style.backgroundColor = 'rgba(234, 179, 8, 1)';
          }
        }
      }
    }

    // ─── MAZE GENERATION (Recursive Division) ───
    async function generateMaze() {
      if (isAnimating) return;
      isAnimating = true;
      clearBoard();
      
      // Surround boundaries
      for (let r=0; r<ROWS; r++) { toggleWall(r,0,true); toggleWall(r,COLS-1,true); }
      for (let c=0; c<COLS; c++) { toggleWall(0,c,true); toggleWall(ROWS-1,c,true); }
      
      await recursiveDivision(1, ROWS-2, 1, COLS-2, chooseOrientation(COLS-2, ROWS-2));
      isAnimating = false;
      showToast('ri-magic-line text-amber-400', 'Maze Generated!');
    }

    async function recursiveDivision(rowStart, rowEnd, colStart, colEnd, orientation) {
      if (rowEnd < rowStart || colEnd < colStart) return;
      
      let horizontal = orientation === 'H';
      
      // Where will the wall be drawn from?
      let possibleRows = [];
      for (let number = rowStart; number <= rowEnd; number += 2) possibleRows.push(number);
      let possibleCols = [];
      for (let number = colStart; number <= colEnd; number += 2) possibleCols.push(number);
      
      let randomRowIndex = Math.floor(Math.random() * possibleRows.length);
      let randomColIndex = Math.floor(Math.random() * possibleCols.length);
      
      let currentRow = possibleRows[randomRowIndex];
      let currentCol = possibleCols[randomColIndex];
      
      // Where will the passage be?
      let possibleRowPassages = [];
      for (let number = rowStart - 1; number <= rowEnd + 1; number += 2) possibleRowPassages.push(number);
      let possibleColPassages = [];
      for (let number = colStart - 1; number <= colEnd + 1; number += 2) possibleColPassages.push(number);
      
      let randomRowPassageIndex = Math.floor(Math.random() * possibleRowPassages.length);
      let randomColPassageIndex = Math.floor(Math.random() * possibleColPassages.length);
      
      let passageRow = possibleRowPassages[randomRowPassageIndex];
      let passageCol = possibleColPassages[randomColPassageIndex];
      
      if (horizontal) {
        for (let c = colStart - 1; c <= colEnd + 1; c++) {
          if (c !== passageCol && c >= 0 && c < COLS && currentRow >= 0 && currentRow < ROWS) {
            const n = grid[currentRow][c];
            if (!n.isStart && !n.isFinish) {
              toggleWall(currentRow, c, true);
              await new Promise(r => setTimeout(r, 8)); // delay mapped
            }
          }
        }
        await recursiveDivision(rowStart, currentRow - 2, colStart, colEnd, chooseOrientation(colEnd - colStart + 1, currentRow - 2 - rowStart + 1));
        await recursiveDivision(currentRow + 2, rowEnd, colStart, colEnd, chooseOrientation(colEnd - colStart + 1, rowEnd - (currentRow + 2) + 1));
      } else {
        for (let r = rowStart - 1; r <= rowEnd + 1; r++) {
          if (r !== passageRow && r >= 0 && r < ROWS && currentCol >= 0 && currentCol < COLS) {
            const n = grid[r][currentCol];
            if (!n.isStart && !n.isFinish) {
              toggleWall(r, currentCol, true);
              await new Promise(r => setTimeout(r, 8));
            }
          }
        }
        await recursiveDivision(rowStart, rowEnd, colStart, currentCol - 2, chooseOrientation(currentCol - 2 - colStart + 1, rowEnd - rowStart + 1));
        await recursiveDivision(rowStart, rowEnd, currentCol + 2, colEnd, chooseOrientation(colEnd - (currentCol + 2) + 1, rowEnd - rowStart + 1));
      }
    }

    function chooseOrientation(width, height) {
      if (width < height) return 'H';
      else if (height < width) return 'V';
      else return Math.random() < 0.5 ? 'H' : 'V';
    }

    // Run
    window.onload = createGrid;
  </script>
