<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Clock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-color: #0f172a;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body class="text-slate-100 flex items-center justify-center relative">

  <!-- DIGITAL CLOCK -->
  <div id="digital-wrap" class="text-center">
    <div id="live-clock" class="text-[8vw] font-bold leading-none tracking-widest">--:--</div>
    <div id="night-label" class="mt-4 text-sm text-indigo-300 hidden">🌙 It's Night now</div>
    <div id="timezone-label" class="mt-2 text-xs text-slate-400"></div>
  </div>

  <!-- ANALOG CLOCK -->
  <div id="analog-wrap" class="hidden w-72 h-72 border-4 border-slate-400 rounded-full relative">

    <!-- Clock Hands -->
    <div class="hour-hand absolute left-1/2 top-1/2 w-[6px] h-[50px] bg-slate-100 rounded origin-bottom transform -translate-x-1/2 -translate-y-full"></div>
    <div class="min-hand absolute left-1/2 top-1/2 w-[4px] h-[70px] bg-slate-300 rounded origin-bottom transform -translate-x-1/2 -translate-y-full"></div>
    <div class="sec-hand absolute left-1/2 top-1/2 w-[2px] h-[85px] bg-red-400 rounded origin-bottom transform -translate-x-1/2 -translate-y-full"></div>

    <!-- Tick marks (added later by JS) -->
  </div>

  <!-- SETTINGS BUTTON -->
  <button onclick="toggleSettings()" class="absolute top-6 right-6 p-2 bg-slate-700 hover:bg-slate-600 rounded-full shadow-lg">⚙️</button>

  <!-- SETTINGS PANEL -->
  <div id="settings-panel" class="hidden absolute top-20 right-6 bg-slate-800 border border-slate-600 rounded-lg p-4 w-72 text-sm shadow-xl z-50">
    <h2 class="text-lg font-semibold mb-3">Site Appearance & Settings</h2>

    <div class="mb-2">
      <p class="text-slate-300">📍 Location:</p>
      <p id="location" class="text-slate-400 text-xs">Detecting...</p>
    </div>

    <div class="mb-2 flex items-center justify-between">
      <label for="toggleAnalog">Analog Clock Format</label>
      <input type="checkbox" id="toggleAnalog" />
    </div>

    <div class="mb-2 flex items-center justify-between">
      <label for="toggle12h">12-hour Time format</label>
      <input type="checkbox" id="toggle12h" checked />
    </div>

    <div class="mb-2 flex items-center justify-between">
      <label for="toggleSeconds">Show Seconds</label>
      <input type="checkbox" id="toggleSeconds" />
    </div>

    <div class="mb-2 flex items-center justify-between">
      <label for="toggleNight">Show “It’s Night now”</label>
      <input type="checkbox" id="toggleNight" checked />
    </div>

    <div class="flex justify-end mt-3">
      <button onclick="toggleSettings()" class="text-xs px-3 py-1 rounded bg-slate-700 hover:bg-slate-600">Close</button>
    </div>
  </div>

  <!-- SCRIPT -->
  <script>
    const clockEl = document.getElementById("live-clock");
    const nightLabel = document.getElementById("night-label");
    const timezoneLabel = document.getElementById("timezone-label");

    const toggle12h = document.getElementById("toggle12h");
    const toggleSeconds = document.getElementById("toggleSeconds");
    const toggleNight = document.getElementById("toggleNight");
    const toggleAnalog = document.getElementById("toggleAnalog");

    const digitalWrap = document.getElementById("digital-wrap");
    const analogWrap = document.getElementById("analog-wrap");

    const hourHand = analogWrap.querySelector(".hour-hand");
    const minHand = analogWrap.querySelector(".min-hand");
    const secHand = analogWrap.querySelector(".sec-hand");

    function updateClock() {
      const now = new Date();

      // Toggle format
      if (toggleAnalog.checked) {
        analogWrap.classList.remove("hidden");
        digitalWrap.classList.add("hidden");
      } else {
        analogWrap.classList.add("hidden");
        digitalWrap.classList.remove("hidden");
      }

      // DIGITAL CLOCK
      let options = {
        hour: 'numeric',
        minute: 'numeric',
        hour12: toggle12h.checked
      };
      if (toggleSeconds.checked) options.second = 'numeric';
      clockEl.textContent = now.toLocaleTimeString([], options);

      // NIGHT LABEL
      const hour = now.getHours();
      nightLabel.style.display = (toggleNight.checked && (hour < 6 || hour >= 18)) ? "block" : "none";

      // ANALOG HANDS
      const secondDeg = now.getSeconds() * 6;
      const minuteDeg = now.getMinutes() * 6 + secondDeg / 60;
      const hourDeg = ((now.getHours() % 12) / 12) * 360 + (minuteDeg / 12);

      hourHand.style.transform = `translate(-50%, -100%) rotate(${hourDeg}deg)`;
      minHand.style.transform = `translate(-50%, -100%) rotate(${minuteDeg}deg)`;
      secHand.style.transform = `translate(-50%, -100%) rotate(${secondDeg}deg)`;
    }

    function detectTimezone() {
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
      timezoneLabel.textContent = `Timezone: ${tz}`;
      document.getElementById("location").textContent = tz.replace("_", " ");
    }

    function toggleSettings() {
      document.getElementById("settings-panel").classList.toggle("hidden");
    }

    // Draw 12 Perfectly Centered Hour Ticks
const tickContainer = document.createElement("div");
// ...
analogWrap.appendChild(tickContainer);

    // Init
    setInterval(updateClock, 1000);
    updateClock();
    detectTimezone();
  </script>
</body>
</html>
