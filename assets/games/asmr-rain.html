<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ASMR Relaxing Rain – Arpit Agarwala</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030a14; overflow: hidden; font-family: 'Inter', sans-serif; user-select: none; }
    canvas { display: block; position: fixed; inset: 0; }

    /* Ambient overlay */
    #overlay {
      position: fixed; inset: 0; pointer-events: none; z-index: 10;
      background: radial-gradient(ellipse at 50% 0%, rgba(30,60,100,0.25) 0%, transparent 70%);
    }

    /* Breathe text */
    #breathe {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: clamp(1.5rem, 4vw, 3rem); font-weight: 300; letter-spacing: 0.5em;
      color: rgba(147, 210, 255, 0.18); pointer-events: none; z-index: 11;
      animation: breatheAnim 8s ease-in-out infinite;
      text-transform: uppercase;
    }
    @keyframes breatheAnim {
      0%,100% { opacity: 0.08; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.22; transform: translate(-50%, -50%) scale(1.04); }
    }

    /* Controls panel */
    #controls {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; align-items: center; gap: 20px;
      background: rgba(10, 20, 35, 0.75); backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 180, 255, 0.15); border-radius: 60px;
      padding: 12px 24px; transition: opacity 0.5s;
    }
    #controls.hidden-ui { opacity: 0; pointer-events: none; }
    .ctrl-label { font-size: 11px; color: rgba(147,210,255,0.5); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; }
    .ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 80px; height: 3px; background: rgba(100,180,255,0.25); border-radius: 99px; outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #60c8f0; box-shadow: 0 0 8px rgba(96,200,240,0.6);
    }
    #timer-display {
      font-size: 13px; font-weight: 600; color: rgba(147,210,255,0.7);
      min-width: 44px; text-align: center; font-variant-numeric: tabular-nums;
    }
    .ctrl-btn {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(100,180,255,0.25);
      background: rgba(100,180,255,0.08); color: rgba(147,210,255,0.8);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 16px; transition: all 0.2s;
    }
    .ctrl-btn:hover { background: rgba(100,180,255,0.18); border-color: rgba(100,180,255,0.5); }

    /* Back button */
    #back-btn {
      position: fixed; top: 20px; left: 20px; z-index: 20;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(10, 20, 35, 0.75); backdrop-filter: blur(16px);
      border: 1px solid rgba(100,180,255,0.2); color: rgba(147,210,255,0.7);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none; font-size: 18px; transition: all 0.2s;
    }
    #back-btn:hover { background: rgba(100,180,255,0.15); border-color: rgba(100,180,255,0.5); color: #60c8f0; }

    /* Mode badge */
    #mode-badge {
      position: fixed; top: 20px; right: 20px; z-index: 20;
      background: rgba(10,20,35,0.75); backdrop-filter: blur(12px);
      border: 1px solid rgba(100,180,255,0.15); border-radius: 20px;
      padding: 6px 14px; color: rgba(147,210,255,0.6); font-size: 11px;
      letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* Hint to hide */
    #tap-hint {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: rgba(100,180,255,0.25); letter-spacing: 0.08em;
      z-index: 15; pointer-events: none;
      animation: fadeHint 4s ease 3s forwards;
    }
    @keyframes fadeHint { to { opacity: 0; } }
  </style>
</head>
<body>
  <canvas id="rain"></canvas>
  <canvas id="ripple"></canvas>
  <div id="overlay"></div>
  <div id="breathe">BREATHE</div>

  <a id="back-btn" href="../../games.html" title="Back">&#8592;</a>
  <div id="mode-badge" id="mode-badge">🌧 Rain</div>

  <div id="tap-hint">Click to hide controls</div>

  <div id="controls">
    <div class="ctrl-group">
      <div class="ctrl-label">Intensity</div>
      <input type="range" id="intensity" min="50" max="800" value="350">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Speed</div>
      <input type="range" id="speed" min="3" max="25" value="11">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Ambience</div>
      <input type="range" id="ambience" min="0" max="100" value="50">
    </div>
    <div class="ctrl-group">
      <div class="ctrl-label">Timer</div>
      <div id="timer-display">00:00</div>
    </div>
    <button class="ctrl-btn" id="play-btn" title="Play/Pause">⏸</button>
  </div>

  <script>
    // ── Canvas setup ──
    const rainCvs   = document.getElementById('rain');
    const rippleCvs = document.getElementById('ripple');
    const rc  = rainCvs.getContext('2d');
    const rpc = rippleCvs.getContext('2d');

    let W, H;
    function resize() {
      W = rainCvs.width  = rippleCvs.width  = window.innerWidth;
      H = rainCvs.height = rippleCvs.height = window.innerHeight;
      rainCvs.style.zIndex = '2';
      rippleCvs.style.zIndex = '3';
    }
    window.addEventListener('resize', resize);
    resize();

    // ── State ──
    let drops   = [];
    let ripples = [];
    let running = true;
    let elapsed = 0;
    let lastTime = null;

    // ── Sliders ──
    const intensitySlider = document.getElementById('intensity');
    const speedSlider     = document.getElementById('speed');
    const ambienceSlider  = document.getElementById('ambience');
    const timerDisplay    = document.getElementById('timer-display');
    const playBtn         = document.getElementById('play-btn');

    function getIntensity() { return parseInt(intensitySlider.value); }
    function getSpeed()     { return parseFloat(speedSlider.value); }
    function getAmbience()  { return parseInt(ambienceSlider.value) / 100; }

    // ── Drop factory ──
    function makeDrop() {
      const spd = getSpeed();
      return {
        x:  Math.random() * W,
        y: -Math.random() * H * 0.5,
        v:  spd * (0.6 + Math.random() * 0.8),
        len: spd * (1.2 + Math.random() * 1.4),
        alpha: 0.25 + Math.random() * 0.55,
        width: Math.random() < 0.3 ? 1.5 : 1
      };
    }

    function seedDrops(n) {
      drops = [];
      for (let i = 0; i < n; i++) {
        const d = makeDrop();
        d.y = Math.random() * H; // spread initial drops
        drops.push(d);
      }
    }
    seedDrops(getIntensity());

    // ── Ripple factory ──
    function makeRipple(x, y) {
      ripples.push({ x, y, r: 2, maxR: 12 + Math.random() * 14, a: 0.6, dr: 0.5 + Math.random() * 0.5 });
    }

    // ── Draw ──
    function drawRain(dt) {
      const spd = getSpeed();
      const ambi = getAmbience();
      const target = getIntensity();
      const bg = `rgba(3, 10, 20, ${0.25 - ambi * 0.1})`;

      rc.fillStyle = bg;
      rc.fillRect(0, 0, W, H);

      // Ambient mist gradient based on ambience slider
      if (ambi > 0.1) {
        const grad = rc.createRadialGradient(W/2, H*0.3, 0, W/2, H*0.3, W*0.6);
        grad.addColorStop(0, `rgba(20, 60, 120, ${ambi * 0.12})`);
        grad.addColorStop(1, 'transparent');
        rc.fillStyle = grad;
        rc.fillRect(0, 0, W, H);
      }

      // Manage drop count
      while (drops.length < target) drops.push(makeDrop());
      while (drops.length > target) drops.pop();

      rc.save();
      drops.forEach(d => {
        d.v = spd * (0.6 + (d.v / Math.max(spd * 0.6, 0.1) * 0.1)); // smoothly follow speed
        d.y += d.v;
        d.x += d.v * 0.12; // slight wind angle

        if (d.y > H + 10) {
          // Spawn ripple
          if (Math.random() < 0.25) makeRipple(d.x, H - 5);
          Object.assign(d, makeDrop());
        }

        const bright = 160 + Math.floor(ambi * 60);
        rc.strokeStyle = `rgba(${bright - 30}, ${bright}, ${bright + 30}, ${d.alpha})`;
        rc.lineWidth = d.width;
        rc.beginPath();
        rc.moveTo(d.x, d.y);
        rc.lineTo(d.x + d.len * 0.12, d.y + d.len);
        rc.stroke();
      });
      rc.restore();
    }

    function drawRipples() {
      rpc.clearRect(0, 0, W, H);
      rpc.save();
      ripples.forEach((r, i) => {
        r.r  += r.dr;
        r.a  -= 0.018;
        rpc.strokeStyle = `rgba(120, 200, 255, ${r.a})`;
        rpc.lineWidth = 1;
        rpc.beginPath();
        rpc.ellipse(r.x, r.y, r.r, r.r * 0.38, 0, 0, Math.PI * 2);
        rpc.stroke();
        // inner ripple
        if (r.r > r.maxR * 0.4) {
          rpc.globalAlpha = r.a * 0.4;
          rpc.beginPath();
          rpc.ellipse(r.x, r.y, r.r * 0.55, r.r * 0.2, 0, 0, Math.PI * 2);
          rpc.stroke();
          rpc.globalAlpha = 1;
        }
      });
      ripples = ripples.filter(r => r.a > 0 && r.r < r.maxR);
      rpc.restore();
    }

    // ── Timer ──
    function fmtTime(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      const ss = Math.floor(s % 60).toString().padStart(2, '0');
      return `${m}:${ss}`;
    }

    // ── Loop ──
    function loop(ts) {
      if (!lastTime) lastTime = ts;
      const dt = (ts - lastTime) / 1000;
      lastTime = ts;
      if (running) {
        elapsed += dt;
        timerDisplay.textContent = fmtTime(elapsed);
        drawRain(dt);
        drawRipples();
      }
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ── Controls ──
    playBtn.addEventListener('click', () => {
      running = !running;
      playBtn.textContent = running ? '⏸' : '▶';
      if (running) lastTime = null;
    });

    // Toggle controls visibility on click
    const controls = document.getElementById('controls');
    let ctrlVisible = true;
    document.addEventListener('click', e => {
      if (controls.contains(e.target) || document.getElementById('back-btn').contains(e.target)) return;
      ctrlVisible = !ctrlVisible;
      controls.classList.toggle('hidden-ui', !ctrlVisible);
    });

    // Back link theme sync
    const stored = localStorage.getItem('theme');
    const bk = document.getElementById('back-btn');
    bk.href = `../../games.html?theme=${stored === 'dark' ? 'dark' : 'light'}`;
  </script>
</body>
</html>
