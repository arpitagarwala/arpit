<!DOCTYPE html>
<html class="" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 – Arpit Agarwala</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0c0f1a;font-family:'Inter',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e2e8f0;user-select:none;padding:60px 16px 24px;}

    #back-link{position:fixed;top:16px;left:16px;z-index:50;width:38px;height:38px;border-radius:50%;background:rgba(5,15,30,0.85);backdrop-filter:blur(10px);border:1px solid rgba(251,191,36,0.25);color:rgba(251,191,36,0.8);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:18px;transition:all .2s;}
    #back-link:hover{border-color:rgba(251,191,36,0.6);color:#fbbf24;}

    .header{display:flex;align-items:center;justify-content:space-between;width:clamp(280px,min(90vw,90vh - 220px),440px);margin-bottom:16px;}
    h1{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#fbbf24,#f59e0b,#f97316);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .score-row{display:flex;gap:8px;}
    .score-box{background:rgba(30,25,10,0.8);border:1px solid rgba(251,191,36,0.15);border-radius:10px;padding:6px 16px;text-align:center;min-width:70px;}
    .score-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(251,191,36,0.45);margin-bottom:1px;}
    .score-val{font-size:1.1rem;font-weight:800;color:#fbbf24;font-variant-numeric:tabular-nums;}

    .btn-row{display:flex;gap:8px;margin-bottom:14px;}
    .action-btn{padding:8px 18px;border-radius:20px;border:1px solid rgba(251,191,36,0.2);background:rgba(30,25,10,0.6);color:rgba(251,191,36,0.75);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .18s;letter-spacing:.06em;}
    .action-btn:hover{border-color:rgba(251,191,36,0.6);color:#fbbf24;background:rgba(251,191,36,0.08);}

    /* Board */
    #board{
      display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
      background:rgba(20,16,5,0.85);border:1px solid rgba(251,191,36,0.12);
      border-radius:16px;padding:10px;
      width:clamp(280px,min(90vw,90vh - 220px),440px);
      box-shadow:0 0 40px rgba(251,191,36,0.06);
    }
    .tile{
      aspect-ratio:1;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;transition:transform .08s;
      font-variant-numeric:tabular-nums;
    }
    .tile-empty{background:rgba(255,255,255,0.04);}

    .tile-2    {background:#3d2f0a;color:#fde68a;font-size:clamp(22px,5vw,36px);}
    .tile-4    {background:#4d380c;color:#fcd34d;font-size:clamp(22px,5vw,36px);}
    .tile-8    {background:#92400e;color:#fff;font-size:clamp(22px,5vw,36px);}
    .tile-16   {background:#b45309;color:#fff;font-size:clamp(18px,4vw,30px);}
    .tile-32   {background:#d97706;color:#fff;font-size:clamp(18px,4vw,30px);}
    .tile-64   {background:#f59e0b;color:#fff;font-size:clamp(18px,4vw,30px);}
    .tile-128  {background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-size:clamp(15px,3.5vw,26px);}
    .tile-256  {background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;font-size:clamp(15px,3.5vw,26px);}
    .tile-512  {background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;font-size:clamp(14px,3vw,24px);}
    .tile-1024 {background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;font-size:clamp(12px,2.5vw,20px);}
    .tile-2048 {background:linear-gradient(135deg,#fbbf24,#f59e0b,#ef4444);color:#fff;font-size:clamp(11px,2.2vw,18px);box-shadow:0 0 30px rgba(251,191,36,0.5);}
    .tile-high {background:linear-gradient(135deg,#7c3aed,#0ea5e9);color:#fff;font-size:clamp(10px,2vw,16px);}

    .tile-new{animation:popIn .12s ease;}
    @keyframes popIn{0%{transform:scale(0.5);}60%{transform:scale(1.1);}100%{transform:scale(1);}}

    /* Game over overlay */
    #over{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:rgba(12,15,26,0.85);backdrop-filter:blur(6px);}
    #over.show{display:flex;}
    .over-box{background:rgba(20,16,5,0.97);border:1px solid rgba(251,191,36,0.25);border-radius:22px;padding:36px 44px;text-align:center;max-width:320px;width:90%;}
    .over-title{font-size:1.8rem;font-weight:900;color:#fbbf24;margin-bottom:8px;}
    .over-score{font-size:3rem;font-weight:900;color:#fff;margin:8px 0;}
    .over-sub{color:rgba(148,163,184,0.6);font-size:.82rem;margin-bottom:20px;}
    .over-btn{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#f59e0b,#f97316);border-radius:12px;color:#fff;font-weight:800;cursor:pointer;border:none;font-size:.95rem;margin-top:4px;transition:all .18s;}
    .over-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(251,191,36,0.3);}

    /* 2048 win banner */
    #win-banner{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:40;background:linear-gradient(135deg,#fbbf24,#f97316);color:#fff;font-weight:900;font-size:1rem;padding:10px 28px;border-radius:20px;display:none;animation:slideDown .4s ease;}
    #win-banner.show{display:block;}
    @keyframes slideDown{from{transform:translateX(-50%) translateY(-30px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}

    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(20,16,5,0.95);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:10px 22px;color:#fbbf24;font-weight:700;font-size:.85rem;z-index:100;opacity:0;transition:opacity .25s;pointer-events:none;}
    #toast.show{opacity:1;}

    .hint{color:rgba(148,163,184,0.35);font-size:.72rem;margin-top:10px;letter-spacing:.06em;}
  </style>
</head>
<body>
  <!-- Uniform Back Button -->
<div style="position: fixed; top: 16px; left: 16px; z-index: 50; pointer-events: auto;">
  <a id="back-link" href="../games.html" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: all 0.2s; text-decoration: none;" onmouseover="this.style.background='rgba(255,255,255,0.2)'; this.style.transform='scale(1.05)';" onmouseout="this.style.background='rgba(255,255,255,0.1)'; this.style.transform='scale(1)';">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414z"/></svg>
  </a>
</div>

  <div id="win-banner">🎉 You reached 2048! Keep going!</div>

  <div class="header">
    <h1>2048</h1>
    <div class="score-row">
      <div class="score-box"><div class="score-label">Score</div><div class="score-val" id="score-val">0</div></div>
      <div class="score-box"><div class="score-label">Best</div><div class="score-val" id="best-val">0</div></div>
    </div>
  </div>

  <div class="btn-row">
    <button class="action-btn" onclick="newGame()">New Game</button>
    <button class="action-btn" onclick="undoMove()">Undo</button>
  </div>

  <div id="board"></div>
  <div class="hint">Arrow Keys / WASD / Swipe to slide tiles</div>

  <div id="over">
    <div class="over-box">
      <div class="over-title">💀 Game Over</div>
      <div class="over-sub">No more moves available</div>
      <div style="font-size:.7rem;color:rgba(251,191,36,0.45);text-transform:uppercase;letter-spacing:.1em">Score</div>
      <div class="over-score" id="over-score">0</div>
      <button class="over-btn" onclick="newGame();document.getElementById('over').classList.remove('show')">Play Again</button>
    </div>
  </div>
  <div id="toast"></div>

  <script>
  const STORAGE_KEY = '2048-save';
  let board, score, best, history, won;

  function load() {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    best = parseInt(localStorage.getItem('2048-best') || '0');
    document.getElementById('best-val').textContent = best;
    if (saved && saved.board && saved.board.some(r => r.some(v => v > 0))) {
      if (confirm('Continue your saved game?')) {
        board = saved.board; score = saved.score; won = saved.won || false;
        history = [];
        render(); updateHUD();
        return;
      }
    }
    newGame();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ board, score, won }));
    if (score > best) { best = score; localStorage.setItem('2048-best', best); }
  }

  function newGame() {
    board = Array.from({length:4}, () => Array(4).fill(0));
    score = 0; won = false; history = [];
    addTile(); addTile();
    render(); updateHUD(); save();
    document.getElementById('over').classList.remove('show');
    document.getElementById('win-banner').classList.remove('show');
  }

  function addTile() {
    const empties = [];
    board.forEach((row, r) => row.forEach((v, c) => { if (!v) empties.push([r, c]); }));
    if (!empties.length) return false;
    const [r, c] = empties[Math.floor(Math.random() * empties.length)];
    board[r][c] = Math.random() < 0.9 ? 2 : 4;
    return [r, c];
  }

  // ── Core slide logic ──
  function slideRow(row) {
    let arr = row.filter(v => v); // remove zeros
    let merged = Array(arr.length).fill(false);
    for (let i = 0; i < arr.length - 1; i++) {
      if (arr[i] === arr[i+1] && !merged[i] && !merged[i+1]) {
        arr[i] *= 2; score += arr[i]; arr.splice(i+1, 1); merged.splice(i+1, 1); merged[i] = true;
        if (arr[i] === 2048 && !won) { won = true; setTimeout(showWin, 200); }
      }
    }
    while (arr.length < 4) arr.push(0);
    return arr;
  }

  function rotateBoard(b) { // rotate 90° clockwise
    return b[0].map((_, i) => b.map(r => r[i]).reverse());
  }

  function move(dir) {
    // 0=left, 1=right, 2=up, 3=down
    history.push(board.map(r => [...r]));
    if (history.length > 5) history.shift();

    let b = board.map(r => [...r]);
    let rotations = [0, 0, 3, 1][dir];
    for (let i = 0; i < rotations; i++) b = rotateBoard(b);

    // For right, mirror left
    if (dir === 1) b = b.map(r => slideRow([...r].reverse()).reverse());
    else           b = b.map(r => slideRow(r));

    for (let i = 0; i < rotations; i++) b = rotateBoard(rotateBoard(rotateBoard(b)));  // rotate back (3× CW = 1× CCW)

    const changed = JSON.stringify(b) !== JSON.stringify(board);
    if (changed) {
      board = b;
      const newPos = addTile();
      render(newPos); updateHUD(); save();
      if (isGameOver()) setTimeout(() => {
        document.getElementById('over-score').textContent = score;
        document.getElementById('over').classList.add('show');
      }, 300);
    }
  }

  function undoMove() {
    if (!history.length) { showToast('Nothing to undo!'); return; }
    board = history.pop();
    render(); updateHUD(); save();
  }

  function isGameOver() {
    for (let r = 0; r < 4; r++) for (let c = 0; c < 4; c++) {
      if (!board[r][c]) return false;
      if (c < 3 && board[r][c] === board[r][c+1]) return false;
      if (r < 3 && board[r][c] === board[r+1][c]) return false;
    }
    return true;
  }

  // ── Render ──
  const colorClass = v => {
    if (!v) return 'tile-empty';
    if (v <= 2048) return `tile-${v}`;
    return 'tile-high';
  };

  let prevBoard = null;
  function render(newPos) {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((row, r) => row.forEach((v, c) => {
      const tile = document.createElement('div');
      tile.className = `tile ${colorClass(v)}`;
      if (newPos && newPos[0] === r && newPos[1] === c) tile.classList.add('tile-new');
      tile.textContent = v || '';
      el.appendChild(tile);
    }));
    prevBoard = board.map(r => [...r]);
  }

  function updateHUD() {
    document.getElementById('score-val').textContent = score;
    document.getElementById('best-val').textContent  = Math.max(score, best);
  }

  function showWin() {
    const b = document.getElementById('win-banner');
    b.classList.add('show');
    setTimeout(() => b.classList.remove('show'), 4000);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Input ──
  document.addEventListener('keydown', e => {
    const dir = { ArrowLeft:0, a:0, ArrowRight:1, d:1, ArrowUp:2, w:2, ArrowDown:3, s:3 };
    const d = dir[e.key];
    if (d !== undefined) { e.preventDefault(); move(d); }
  });

  let tx, ty;
  document.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
  document.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - tx, dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 1 : 0);
    else move(dy > 0 ? 3 : 2);
  }, {passive:true});

  // Back link
  const stored = localStorage.getItem('theme');
  document.getElementById('back-link').href = `../games.html?theme=${stored==='dark'?'dark':'light'}`;

  load();
  </script>
</body>
</html>
