<!DOCTYPE html>
<html class="" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon City Grid – Arpit Agarwala</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0f1e;font-family:'Inter',sans-serif;overflow:hidden;color:#e2e8f0;user-select:none;}
    canvas{display:block;position:fixed;inset:0;cursor:crosshair;}

    /* HUD top */
    #hud{position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;
      display:flex;align-items:center;gap:10px;padding:12px 16px;
      background:linear-gradient(180deg,rgba(10,15,30,0.95) 0%,transparent 100%);}
    .hud-pill{background:rgba(15,25,50,0.8);border:1px solid rgba(34,211,238,0.12);border-radius:10px;padding:6px 14px;text-align:center;}
    .hud-label{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,0.4);margin-bottom:1px;}
    .hud-val{font-size:.95rem;font-weight:800;color:#22d3ee;font-variant-numeric:tabular-nums;}
    .hud-ticker{font-size:.7rem;color:rgba(52,211,153,0.7);font-weight:600;margin-left:auto;pointer-events:none;}

    #back-link{position:fixed;top:12px;left:16px;z-index:50;width:34px;height:34px;border-radius:50%;background:rgba(5,15,30,0.9);border:1px solid rgba(34,211,238,0.2);color:rgba(147,210,255,0.7);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:16px;transition:all .2s;pointer-events:all;}
    #back-link:hover{border-color:rgba(34,211,238,0.5);color:#22d3ee;}

    /* Toolbar */
    #toolbar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;
      display:flex;align-items:center;gap:8px;
      background:rgba(10,20,45,0.92);backdrop-filter:blur(16px);
      border:1px solid rgba(34,211,238,0.15);border-radius:60px;padding:10px 18px;}
    .tool-btn{width:44px;height:44px;border-radius:50%;border:1px solid rgba(34,211,238,0.15);background:transparent;color:rgba(200,220,255,0.65);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-direction:column;gap:1px;}
    .tool-btn span{font-size:.45rem;letter-spacing:.06em;text-transform:uppercase;color:rgba(148,163,184,0.4);}
    .tool-btn:hover,.tool-btn.active{background:rgba(34,211,238,0.12);border-color:rgba(34,211,238,0.5);color:#22d3ee;}
    .tool-btn.active{box-shadow:0 0 12px rgba(34,211,238,0.2);}
    .tool-sep{width:1px;height:28px;background:rgba(34,211,238,0.1);margin:0 4px;}

    /* Speed controls */
    .speed-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(34,211,238,0.1);background:transparent;color:rgba(148,163,184,0.5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .speed-btn:hover,.speed-btn.active{background:rgba(34,211,238,0.1);border-color:rgba(34,211,238,0.4);color:#22d3ee;}

    /* Info panel */
    #info-panel{position:fixed;right:16px;top:70px;z-index:20;width:180px;
      background:rgba(10,20,45,0.9);backdrop-filter:blur(12px);
      border:1px solid rgba(34,211,238,0.12);border-radius:14px;padding:14px;font-size:.78rem;}
    .info-title{font-size:.65rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,0.4);margin-bottom:10px;}
    .info-row{display:flex;justify-content:space-between;margin-bottom:6px;align-items:center;}
    .info-key{color:rgba(148,163,184,0.5);}
    .info-val{font-weight:700;color:#e2e8f0;}

    /* Event log */
    #event-log{position:fixed;left:16px;bottom:90px;z-index:20;max-width:220px;}
    .event-item{background:rgba(10,20,45,0.85);border-left:3px solid #22d3ee;border-radius:0 8px 8px 0;
      padding:6px 10px;margin-bottom:4px;font-size:.7rem;color:rgba(200,220,255,0.8);
      animation:slideIn .3s ease;opacity:1;transition:opacity .5s;}
    .event-item.fade{opacity:0;}
    @keyframes slideIn{from{transform:translateX(-20px);opacity:0;}to{transform:translateX(0);opacity:1;}}

    /* Toast */
    #toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);
      background:rgba(10,20,45,0.95);border:1px solid rgba(248,113,113,0.4);border-radius:10px;
      padding:8px 18px;color:#f87171;font-weight:700;font-size:.8rem;z-index:100;
      opacity:0;transition:opacity .25s;pointer-events:none;}
    #toast.show{opacity:1;}

    /* Legend */
    .legend{display:flex;gap:10px;align-items:center;margin-left:auto;}
    .lg{display:flex;align-items:center;gap:4px;font-size:.65rem;color:rgba(148,163,184,0.5);}
    .lg-dot{width:8px;height:8px;border-radius:2px;}
  </style>
</head>
<body>
  <!-- Uniform Back Button -->
<div style="position: fixed; top: 16px; left: 16px; z-index: 50; pointer-events: auto;">
  <a id="back-link" href="../games.html" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: all 0.2s; text-decoration: none;" onmouseover="this.style.background='rgba(255,255,255,0.2)'; this.style.transform='scale(1.05)';" onmouseout="this.style.background='rgba(255,255,255,0.1)'; this.style.transform='scale(1)';">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414z"/></svg>
  </a>
</div>

  <div id="hud">
    <div style="width:34px;flex-shrink:0;"></div><!-- spacer for back btn -->
    <div class="hud-pill"><div class="hud-label">Funds</div><div class="hud-val">$<span id="funds-val">10,000</span></div></div>
    <div class="hud-pill"><div class="hud-label">Population</div><div class="hud-val"><span id="pop-val">0</span></div></div>
    <div class="hud-pill"><div class="hud-label">Income/s</div><div class="hud-val">$<span id="income-val">0</span></div></div>
    <div class="hud-pill"><div class="hud-label">Day</div><div class="hud-val"><span id="day-val">1</span></div></div>
    <div class="legend">
      <div class="lg"><div class="lg-dot" style="background:#475569"></div>Road</div>
      <div class="lg"><div class="lg-dot" style="background:#10b981"></div>Home</div>
      <div class="lg"><div class="lg-dot" style="background:#3b82f6"></div>Office</div>
      <div class="lg"><div class="lg-dot" style="background:#f59e0b"></div>Shop</div>
      <div class="lg"><div class="lg-dot" style="background:#8b5cf6"></div>Park</div>
      <div class="lg"><div class="lg-dot" style="background:#ef4444"></div>Power</div>
    </div>
  </div>

  <div id="info-panel">
    <div class="info-title">City Stats</div>
    <div class="info-row"><span class="info-key">Happiness</span><span class="info-val" id="stat-happy">—</span></div>
    <div class="info-row"><span class="info-key">Power Grid</span><span class="info-val" id="stat-power">—</span></div>
    <div class="info-row"><span class="info-key">Green Space</span><span class="info-val" id="stat-green">—</span></div>
    <div class="info-row"><span class="info-key">Buildings</span><span class="info-val" id="stat-bld">0</span></div>
    <div class="info-row" style="margin-top:10px;border-top:1px solid rgba(34,211,238,0.08);padding-top:10px;">
      <span class="info-key">Save</span>
      <button onclick="saveCity()" style="padding:4px 10px;border-radius:8px;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.25);color:#22d3ee;font-size:.7rem;font-weight:700;cursor:pointer;">💾 Save</button>
    </div>
  </div>

  <canvas id="game"></canvas>

  <div id="toolbar">
    <button class="tool-btn active" id="btn-road" onclick="setTool('road',this)" title="Road – $50">
      <i class="ri-road-map-line"></i><span>Road $50</span>
    </button>
    <button class="tool-btn" id="btn-res" onclick="setTool('res',this)" title="Residential – $200">
      <i class="ri-home-8-line"></i><span>Home $200</span>
    </button>
    <button class="tool-btn" id="btn-com" onclick="setTool('com',this)" title="Commercial – $500">
      <i class="ri-building-line"></i><span>Office $500</span>
    </button>
    <button class="tool-btn" id="btn-shop" onclick="setTool('shop',this)" title="Shop – $350">
      <i class="ri-store-2-line"></i><span>Shop $350</span>
    </button>
    <button class="tool-btn" id="btn-park" onclick="setTool('park',this)" title="Park – $150">
      <i class="ri-plant-line"></i><span>Park $150</span>
    </button>
    <button class="tool-btn" id="btn-power" onclick="setTool('power',this)" title="Power Plant – $1000 (powers 20 buildings)">
      <i class="ri-flashlight-line"></i><span>Power $1K</span>
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn" id="btn-del" onclick="setTool('del',this)" title="Demolish">
      <i class="ri-eraser-line"></i><span>Demo</span>
    </button>
    <div class="tool-sep"></div>
    <button class="speed-btn active" id="spd-1" onclick="setSpeed(1,this)" title="Normal speed">1×</button>
    <button class="speed-btn" id="spd-2" onclick="setSpeed(2,this)" title="Fast">2×</button>
    <button class="speed-btn" id="spd-4" onclick="setSpeed(4,this)" title="Very fast">4×</button>
  </div>

  <div id="event-log"></div>
  <div id="toast"></div>

  <script>
  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d');
  const SAVE_KEY = 'city-builder-save';

  const CELL = 32;
  let W, H, COLS, ROWS;
  let tool = 'road', speed = 1;
  let funds, pop, day, happiness, powered;
  let map; // [col][row] = { type: 'empty'|'road'|'res'|'com'|'shop'|'park'|'power', lvl, age }

  const COSTS = { road:50, res:200, com:500, shop:350, park:150, power:1000 };
  const COLORS = {
    empty:'rgba(255,255,255,0)',
    road:'#334155', res:'#10b981', com:'#3b82f6',
    shop:'#f59e0b', park:'#22c55e', power:'#ef4444'
  };

  function resize() {
    W = cvs.width = window.innerWidth;
    H = cvs.height = window.innerHeight;
    COLS = Math.ceil(W/CELL)+1; ROWS = Math.ceil(H/CELL)+1;
  }
  window.addEventListener('resize', resize); resize();

  // ── Init or Load ──
  function tryLoad() {
    const saved = JSON.parse(localStorage.getItem(SAVE_KEY) || 'null');
    if (saved && saved.map) {
      if (confirm('Continue your saved city?')) {
        funds = saved.funds; pop = saved.pop; day = saved.day || 1;
        map = saved.map;
        updateHUD(); return;
      }
    }
    newCity();
  }

  function newCity() {
    funds = 10000; pop = 0; day = 1; happiness = 80;
    map = [];
    for (let x = 0; x < COLS; x++) { map[x] = []; for (let y = 0; y < ROWS; y++) map[x][y] = { type:'empty', lvl:1, age:0 }; }
    updateHUD();
  }

  function saveCity() {
    // Trim map to a safe size
    const trimmed = map.map(col => col.map(cell => ({type:cell.type, lvl:cell.lvl, age:cell.age})));
    localStorage.setItem(SAVE_KEY, JSON.stringify({ funds, pop, day, map:trimmed }));
    showToast('💾 City saved!', 'good');
  }

  // ── Tool & Speed ──
  function setTool(t, btn) {
    tool = t;
    document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function setSpeed(s, btn) {
    speed = s;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    clearInterval(tickInterval);
    tickInterval = setInterval(tick, Math.floor(2000 / speed));
  }

  // ── Interaction ──
  let isDown = false;
  cvs.addEventListener('mousedown', e => { isDown = true; interact(e); });
  cvs.addEventListener('mousemove', e => { if (isDown) interact(e); });
  window.addEventListener('mouseup', () => isDown = false);
  cvs.addEventListener('touchstart', e => { e.preventDefault(); isDown = true; interact(e.touches[0]); }, {passive:false});
  cvs.addEventListener('touchmove',  e => { e.preventDefault(); interact(e.touches[0]); }, {passive:false});
  window.addEventListener('touchend', () => isDown = false);

  function interact(e) {
    const cx = Math.floor(e.clientX / CELL);
    const cy = Math.floor(e.clientY / CELL);
    if (!map[cx] || !map[cx][cy]) return;
    const cell = map[cx][cy];

    if (tool === 'del') {
      if (cell.type !== 'empty') { cell.type = 'empty'; cell.lvl = 1; cell.age = 0; }
      return;
    }
    if (cell.type !== 'empty') return;
    const cost = COSTS[tool];
    if (!cost) return;
    if (funds < cost) { showToast(`Not enough funds! (Need $${cost})`); return; }
    funds -= cost;
    cell.type = tool; cell.lvl = 1; cell.age = 0;
    updateHUD();
  }

  // ── Helpers ──
  function neighbors(x, y) {
    return [[x-1,y],[x+1,y],[x,y-1],[x,y+1]]
      .filter(([a,b]) => map[a] && map[a][b])
      .map(([a,b]) => map[a][b]);
  }

  function countType(type) {
    let n = 0;
    for (let x=0;x<COLS;x++) for (let y=0;y<ROWS;y++) if (map[x][y].type===type) n++;
    return n;
  }

  function isNearRoad(x, y) {
    return neighbors(x, y).some(c => c.type === 'road');
  }

  function isPowered(x, y) {
    // BFS from any power plant within 8 cells
    const visited = new Set();
    const q = [];
    for (let dx=-8;dx<=8;dx++) for (let dy=-8;dy<=8;dy++) {
      const nx=x+dx, ny=y+dy;
      if (map[nx]?.[ny]?.type==='power') q.push([nx,ny,0]);
    }
    if (q.length > 0) return true;
    return false;
  }

  // ── Simulation tick ──
  let tickInterval;
  function tick() {
    day++;
    let income = 0;
    pop = 0;
    let parks=countType('park'), power=countType('power'), buildings=0;
    happiness = 50 + parks*5 + (power > 0 ? 10 : -20);
    happiness = Math.min(100, Math.max(0, happiness));

    for (let x=0;x<COLS;x++) {
      for (let y=0;y<ROWS;y++) {
        const cell = map[x]?.[y];
        if (!cell || cell.type==='empty'||cell.type==='road') continue;
        cell.age++;
        buildings++;
        const nearRoad = isNearRoad(x, y);
        const pw = power > 0;
        if (cell.type==='res') {
          const growth = nearRoad ? 0.01 : 0.002;
          if (Math.random() < growth * happiness/100) cell.lvl = Math.min(cell.lvl + 0.1, 8);
          pop += Math.floor(cell.lvl * 4 * (happiness/100));
          income += cell.lvl * 2;
        }
        if (cell.type==='com') {
          income += cell.lvl * 20 * (pop>0?1:0.2) * (nearRoad?1:0.3);
          if (Math.random()<0.005) cell.lvl=Math.min(cell.lvl+0.1,5);
        }
        if (cell.type==='shop') {
          income += cell.lvl * 10 * (nearRoad?1:0.4);
          if (Math.random()<0.008) cell.lvl=Math.min(cell.lvl+0.1,5);
        }
      }
    }

    funds += Math.floor(income / 10);
    document.getElementById('income-val').textContent = Math.floor(income/10);
    document.getElementById('stat-bld').textContent = buildings;
    document.getElementById('stat-happy').textContent = happiness.toFixed(0)+'%';
    document.getElementById('stat-power').textContent = power > 0 ? `${power} plant${power>1?'s':''}` : '⚠ None';
    document.getElementById('stat-green').textContent = parks > 0 ? `${parks} park${parks>1?'s':''}` : 'Low';
    updateHUD();

    // Random events
    if (day % 10 === 0 && Math.random() < 0.3) {
      const events = ['🏗 Construction boom! +$500', '🌧 Flood warning! -$200', '🎉 Festival! +pop boost', '📈 Tax revenue! +$300'];
      const ev = events[Math.floor(Math.random()*events.length)];
      if (ev.includes('+$500')) funds += 500;
      if (ev.includes('-$200')) funds -= 200;
      if (ev.includes('+$300')) funds += 300;
      addEvent(ev);
    }
  }

  function updateHUD() {
    document.getElementById('funds-val').textContent = Math.floor(funds).toLocaleString();
    document.getElementById('pop-val').textContent   = Math.floor(pop).toLocaleString();
    document.getElementById('day-val').textContent   = day;
  }

  // ── Event log ──
  function addEvent(text) {
    const log = document.getElementById('event-log');
    const item = document.createElement('div');
    item.className = 'event-item';
    item.textContent = text;
    log.insertBefore(item, log.firstChild);
    setTimeout(() => item.classList.add('fade'), 4000);
    setTimeout(() => item.remove(), 4500);
    while (log.children.length > 4) log.lastChild.remove();
  }

  // ── Toast ──
  function showToast(msg, type='bad') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = type==='good' ? 'rgba(52,211,153,0.4)' : 'rgba(248,113,113,0.4)';
    t.style.color = type==='good' ? '#34d399' : '#f87171';
    t.classList.add('show');
    clearTimeout(t._to); t._to = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ── Render ──
  const ICONS = { res:'🏠', com:'🏢', shop:'🏪', park:'🌳', power:'⚡', road:'' };
  function draw() {
    ctx.fillStyle = '#0a0f1e';
    ctx.fillRect(0, 0, W, H);

    // Grid bg
    ctx.strokeStyle = 'rgba(34,211,238,0.04)';
    ctx.lineWidth = 0.5;
    for (let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
    for (let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }

    for (let x=0;x<COLS;x++) {
      for (let y=0;y<ROWS;y++) {
        const cell = map[x]?.[y];
        if (!cell || cell.type==='empty') continue;
        const px=x*CELL, py=y*CELL;

        if (cell.type==='road') {
          // Road with connecting lines
          ctx.fillStyle = '#1e293b';
          ctx.fillRect(px+1, py+1, CELL-2, CELL-2);
          ctx.fillStyle = '#334155';
          ctx.fillRect(px+6, py+6, CELL-12, CELL-12);
        } else {
          const lvl = Math.min(cell.lvl, 8);
          const h = Math.min(CELL - 6, 4 + lvl * 3.2);
          ctx.shadowBlur = cell.type==='power' ? 12 : 6;
          ctx.shadowColor = COLORS[cell.type];
          ctx.fillStyle = COLORS[cell.type];
          ctx.globalAlpha = 0.8 + lvl * 0.025;
          ctx.fillRect(px + 4, py + CELL - h - 2, CELL - 8, h);
          ctx.globalAlpha = 1; ctx.shadowBlur = 0;

          // Icon
          ctx.font = `${Math.min(14, 8 + lvl)}px serif`;
          ctx.textAlign = 'center';
          ctx.fillStyle = '#fff';
          ctx.fillText(ICONS[cell.type], px + CELL/2, py + CELL - h - 4);
          ctx.textAlign = 'left';
        }
      }
    }
    requestAnimationFrame(draw);
  }

  // Back link
  const stored = localStorage.getItem('theme');
  document.getElementById('back-link').href = `../games.html?theme=${stored==='dark'?'dark':'light'}`;

  tickInterval = setInterval(tick, 2000);
  tryLoad();
  draw();
  </script>
</body>
</html>
