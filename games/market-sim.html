<!DOCTYPE html>
<html class="" lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Virtual Trading Terminal – Arpit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #060b14;
      --panel: #0d1525;
      --border: rgba(34, 211, 238, 0.1);
      --cyan: #22d3ee;
      --green: #10b981;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: rgba(148, 163, 184, 0.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 48px 1fr;
      grid-template-columns: 220px 1fr 240px;
    }

    /* TOP BAR */
    #topbar {
      grid-column: 1/-1;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      z-index: 30;
    }

    #back-link {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(34, 211, 238, 0.08);
      border: 1px solid var(--border);
      color: rgba(147, 210, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 16px;
      flex-shrink: 0;
    }

    #back-link:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .brand {
      font-weight: 800;
      font-size: .95rem;
      background: linear-gradient(135deg, #22d3ee, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-right: 6px;
    }

    #asset-search {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 5px 10px;
      font-size: .78rem;
      width: 160px;
      font-family: 'Inter', sans-serif;
    }

    #asset-search:focus {
      outline: none;
      border-color: rgba(34, 211, 238, 0.4);
    }

    .asset-chip {
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }

    .asset-chip.active,
    .asset-chip:hover {
      background: rgba(34, 211, 238, 0.1);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .asset-chips {
      display: flex;
      gap: 5px;
      overflow-x: auto;
      flex: 1;
    }

    .asset-chips::-webkit-scrollbar {
      height: 2px;
    }

    .asset-chips::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    #price-display {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      margin-left: auto;
      white-space: nowrap;
    }

    #chg-display {
      font-size: .75rem;
      font-weight: 600;
      margin-left: 6px;
    }

    /* LEFT PANEL */
    #left-panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-title {
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 12px 6px;
      border-bottom: 1px solid var(--border);
    }

    #tf-bar {
      display: flex;
      gap: 4px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .tf-btn {
      padding: 4px 9px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .12s;
    }

    .tf-btn.active,
    .tf-btn:hover {
      background: rgba(34, 211, 238, 0.1);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    #ind-bar {
      display: flex;
      gap: 4px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .ind-btn {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .68rem;
      cursor: pointer;
      transition: all .12s;
    }

    .ind-btn.on {
      background: rgba(129, 140, 248, 0.15);
      border-color: rgba(129, 140, 248, 0.5);
      color: #a5b4fc;
    }

    .draw-title {
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 12px 4px;
    }

    #draw-bar {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0 10px 8px;
    }

    .draw-btn {
      padding: 5px 10px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all .12s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .draw-btn.active,
    .draw-btn:hover {
      background: rgba(34, 211, 238, 0.08);
      border-color: rgba(34, 211, 238, 0.3);
      color: var(--cyan);
    }

    .draw-btn.entry-btn.active {
      background: rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.4);
      color: #10b981;
    }

    .draw-btn.sl-btn.active {
      background: rgba(239, 68, 68, 0.1);
      border-color: rgba(239, 68, 68, 0.4);
      color: #ef4444;
    }

    .draw-btn.tp-btn.active {
      background: rgba(251, 191, 36, 0.1);
      border-color: rgba(251, 191, 36, 0.4);
      color: #fbbf24;
    }

    .draw-btn.long-btn.active {
      background: rgba(16, 185, 129, 0.12);
      border-color: rgba(16, 185, 129, 0.5);
      color: #10b981;
    }

    .draw-btn.short-btn.active {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.5);
      color: #ef4444;
    }

    /* Modal overlay */
    #modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    .modal-box {
      background: #0d1525;
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 14px;
      padding: 24px 28px;
      min-width: 300px;
      font-family: 'Inter', sans-serif;
    }
    .modal-box h3 { font-size: .95rem; margin-bottom: 14px; color: var(--text); }
    .modal-box p  { font-size: .78rem; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
    .modal-row { display: flex; gap: 8px; margin-top: 8px; }
    .modal-btn {
      flex: 1; padding: 8px; border-radius: 8px; border: none; font-weight: 700;
      font-size: .8rem; cursor: pointer; transition: opacity .15s;
    }
    .modal-btn:hover { opacity: .85; }
    .modal-btn.confirm { background: linear-gradient(135deg,#22d3ee,#6366f1); color: #fff; }
    .modal-btn.danger  { background: linear-gradient(135deg,#ef4444,#dc2626); color: #fff; }
    .modal-btn.cancel  { background: rgba(255,255,255,0.06); color: var(--muted); }
    .modal-input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(34,211,238,0.2);
      border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: .9rem;
      font-family: 'JetBrains Mono',monospace;
    }
    #margin-info {
      font-size: .65rem; color: var(--muted); padding: 5px 0 2px;
      font-family: 'JetBrains Mono', monospace;
    }
    #margin-info.ok  { color: #10b981; }
    #margin-info.err { color: #ef4444; }

    #plan-box {
      margin: 8px 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px;
      font-size: .72rem;
    }

    .plan-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      align-items: center;
    }

    .plan-label {
      color: var(--muted);
    }

    .plan-val {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }

    #pnl-preview {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-weight: 700;
      font-size: .85rem;
    }

    /* CHART */
    #chart-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    #main-canvas {
      flex: 1;
      display: block;
    }

    #rsi-canvas {
      display: block;
      height: 80px;
      border-top: 1px solid var(--border);
    }

    #overlay-canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: all;
      cursor: crosshair;
    }

    .chart-label {
      position: absolute;
      font-size: .65rem;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(6, 11, 20, 0.9);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }

    #crosshair-price {
      right: 1px;
      color: var(--cyan);
    }

    #crosshair-time {
      bottom: 82px;
      transform: translateX(-50%);
      color: rgba(148, 163, 184, 0.7);
    }

    /* Axis cursor hints */
    #y-axis-overlay {
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      cursor: ns-resize;
      pointer-events: all;
    }

    #x-axis-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 80px;
      height: 28px;
      cursor: ew-resize;
      pointer-events: all;
    }

    /* RIGHT PANEL */
    #right-panel {
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #right-panel::-webkit-scrollbar {
      width: 3px;
    }

    #right-panel::-webkit-scrollbar-thumb {
      background: var(--border);
    }

    .r-title {
      font-size: .6rem;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 12px 6px;
      border-bottom: 1px solid var(--border);
    }

    #order-form {
      padding: 10px;
    }

    .order-tabs {
      display: flex;
      margin-bottom: 10px;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .o-tab {
      flex: 1;
      padding: 6px;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
    }

    .o-tab.active-buy {
      background: rgba(16, 185, 129, 0.15);
      color: #10b981;
    }

    .o-tab.active-sell {
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
    }

    .form-label {
      font-size: .65rem;
      color: var(--muted);
      margin-bottom: 3px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      padding: 6px 9px;
      font-size: .8rem;
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(34, 211, 238, 0.4);
    }

    #wallet-disp {
      display: flex;
      justify-content: space-between;
      font-size: .72rem;
      margin-bottom: 10px;
    }

    .w-label {
      color: var(--muted);
    }

    .w-val {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--cyan);
    }

    #exec-btn {
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: none;
      font-weight: 700;
      font-size: .85rem;
      cursor: pointer;
      transition: all .2s;
    }

    #exec-btn.buy {
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
    }

    #exec-btn.sell {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
    }

    #exec-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
    }

    #positions-wrap,
    .history-wrap {
      padding: 8px 10px;
    }

    .pos-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: .72rem;
    }

    .pos-header {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .pos-row {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
    }

    .pos-pnl {
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }

    .close-pos {
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid rgba(239, 68, 68, 0.3);
      background: transparent;
      color: #ef4444;
      font-size: .65rem;
      cursor: pointer;
    }

    .close-pos:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .hist-row {
      display: flex;
      justify-content: space-between;
      font-size: .68rem;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
    }

    .hist-row span:last-child {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
    }

    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(6, 11, 20, 0.97);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 20px;
      font-size: .82rem;
      font-weight: 700;
      z-index: 99;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
    }

    /* Axis reset hint tooltip */
    .axis-hint {
      position: absolute;
      font-size: .58rem;
      color: rgba(34, 211, 238, 0.4);
      pointer-events: none;
      font-family: 'Inter', sans-serif;
    }

    #y-axis-hint {
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
    }

    #x-axis-hint {
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div id="topbar">
    
    <span class="brand">VirtualTrade</span>
    <input id="asset-search" placeholder="Search symbol..." oninput="filterAssets(this.value)" />
    <div class="asset-chips" id="asset-chips"></div>
    <!-- FIX: Replaced scrip price with Balance + P&L display -->
    <span id="price-display"
      style="font-size:.72rem;color:var(--muted);margin-left:auto;white-space:nowrap;display:flex;align-items:center;gap:14px;">
      <span style="display:flex;align-items:center;gap:4px;">
        <span style="color:var(--muted);font-size:.65rem;font-weight:500;">BAL</span>
        <span id="topbar-bal" style="font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--cyan);">—</span>
      </span>
      <span style="display:flex;align-items:center;gap:4px;">
        <span style="color:var(--muted);font-size:.65rem;font-weight:500;">P&amp;L</span>
        <span id="topbar-pnl" style="font-family:'JetBrains Mono',monospace;font-weight:700;">—</span>
      </span>
      <span style="display:flex;align-items:center;gap:4px;">
        <span id="topbar-sym" style="color:var(--muted);font-size:.65rem;font-weight:500;">BTC</span>
        <span id="chg-display" style="font-size:.72rem;font-weight:600;">—</span>
      </span>
    </span>
  </div>

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div class="panel-title">Timeframe</div>
    <div id="tf-bar">
      <button class="tf-btn" onclick="setTF('1m',this)">1m</button>
      <button class="tf-btn" onclick="setTF('5m',this)">5m</button>
      <button class="tf-btn active" onclick="setTF('15m',this)">15m</button>
      <button class="tf-btn" onclick="setTF('1h',this)">1H</button>
      <button class="tf-btn" onclick="setTF('4h',this)">4H</button>
      <button class="tf-btn" onclick="setTF('1d',this)">1D</button>
    </div>
    <div class="panel-title">Indicators</div>
    <div id="ind-bar">
      <button class="ind-btn on" id="ind-ema9" onclick="toggleInd('ema9',this)">EMA 9</button>
      <button class="ind-btn on" id="ind-ema21" onclick="toggleInd('ema21',this)">EMA 21</button>
      <button class="ind-btn" id="ind-ema50" onclick="toggleInd('ema50',this)">EMA 50</button>
      <button class="ind-btn on" id="ind-vol" onclick="toggleInd('vol',this)">Volume</button>
      <button class="ind-btn on" id="ind-rsi" onclick="toggleInd('rsi',this)">RSI</button>
    </div>
    <div class="draw-title">Drawing Tools</div>
    <div id="draw-bar">
      <button class="draw-btn active" id="dt-none" onclick="setDraw('none',this)">&#128372; Select</button>
      <button class="draw-btn" id="dt-trendline" onclick="setDraw('trendline',this)">&#128200; Trend Line</button>
      <button class="draw-btn" id="dt-hline" onclick="setDraw('hline',this)">&#10134; Horizontal</button>
      <button class="draw-btn entry-btn" id="dt-entry" onclick="setDraw('entry',this)">&#129001; Entry</button>
      <button class="draw-btn sl-btn" id="dt-sl" onclick="setDraw('sl',this)">&#128308; Stop Loss</button>
      <button class="draw-btn tp-btn" id="dt-tp" onclick="setDraw('tp',this)">&#128993; Target (TP)</button>
      <button class="draw-btn long-btn" id="dt-long" onclick="setDraw('long',this)">&#128200; Long Setup</button>
      <button class="draw-btn short-btn" id="dt-short" onclick="setDraw('short',this)">&#128201; Short Setup</button>
      <button class="draw-btn" onclick="clearDrawings()">&#128465; Clear All</button>
    </div>
    <div id="plan-box">
      <div class="plan-row"><span class="plan-label">Entry</span><span class="plan-val" id="pl-entry">—</span></div>
      <div class="plan-row"><span class="plan-label">Stop Loss</span><span class="plan-val" style="color:#ef4444"
          id="pl-sl">—</span></div>
      <div class="plan-row"><span class="plan-label">Target</span><span class="plan-val" style="color:#fbbf24"
          id="pl-tp">—</span></div>
      <div id="pnl-preview">Set levels to plan</div>
      <button id="plan-trigger-btn" onclick="placePendingOCO()"
        style="display:none;width:100%;margin-top:8px;padding:7px;border-radius:7px;border:none;background:linear-gradient(135deg,#818cf8,#6366f1);color:#fff;font-weight:700;font-size:.78rem;cursor:pointer;">&#9889;
        Place OCO Pending Order</button>
    </div>
  </div>

  <!-- CHART -->
  <div id="chart-wrap">
    <canvas id="main-canvas"></canvas>
    <canvas id="rsi-canvas"></canvas>
    <canvas id="overlay-canvas"></canvas>
    <!-- Invisible axis interaction zones -->
    <div id="y-axis-overlay"></div>
    <div id="x-axis-overlay"></div>
    <div class="chart-label" id="crosshair-price"></div>
    <div class="chart-label" id="crosshair-time"></div>
  </div>

  <!-- RIGHT PANEL -->
  <div id="right-panel">
    <div class="r-title">Place Order</div>
    <div id="order-form">
      <div class="order-tabs">
        <button class="o-tab active-buy" id="tab-buy" onclick="setOrderSide('buy')">BUY</button>
        <button class="o-tab" id="tab-sell" onclick="setOrderSide('sell')">SELL / SHORT</button>
      </div>
      <!-- hidden wallet-val so renderWallet() still works -->
      <span id="wallet-val" style="display:none"></span>
      <label class="form-label">Quantity (units)</label>
      <input class="form-input" id="qty-input" type="number" value="1" min="0.01" step="0.01" oninput="updateMarginInfo()" />
      <div id="margin-info">Enter quantity to see margin required</div>
      <label class="form-label">Order Type</label>
      <select class="form-input" id="order-type">
        <option value="market">Market</option>
        <option value="limit">Limit</option>
      </select>
      <div id="limit-price-wrap" style="display:none">
        <label class="form-label">Limit Price</label>
        <input class="form-input" id="limit-price" type="number" step="0.01" oninput="updateMarginInfo()" />
      </div>
      <button id="exec-btn" class="buy" onclick="executeOrder()">BUY NOW</button>
      <div style="display:flex;gap:6px;margin-top:8px;">
        <button onclick="openDeposit()" style="flex:1;padding:6px;border-radius:7px;border:1px solid rgba(34,211,238,0.25);background:transparent;color:var(--cyan);font-size:.7rem;font-weight:600;cursor:pointer;">&#43; Deposit</button>
        <button onclick="openReset()" style="flex:1;padding:6px;border-radius:7px;border:1px solid rgba(239,68,68,0.25);background:transparent;color:#ef4444;font-size:.7rem;font-weight:600;cursor:pointer;">&#9888; Reset</button>
      </div>
    </div>

    <div class="r-title">Pending Orders</div>
    <div id="pending-wrap">
      <div style="color:var(--muted);font-size:.72rem;padding:6px">No pending orders</div>
    </div>

    <div class="r-title">Open Positions</div>
    <div id="positions-wrap">
      <div style="color:var(--muted);font-size:.72rem;padding:6px">No open positions</div>
    </div>

    <div class="r-title">Trade History</div>
    <div class="history-wrap" id="history-wrap">
      <div style="color:var(--muted);font-size:.72rem;padding:6px">No trades yet</div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- Modal -->
  <div id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <h3 id="modal-title">Title</h3>
      <p id="modal-desc"></p>
      <div id="modal-content"></div>
      <div class="modal-row" id="modal-btns"></div>
    </div>
  </div>

  <script>
    // ═══ ASSETS ═══
    const ASSETS = {
      'BTC': { name: 'Bitcoin', cat: 'Crypto', base: 65000, vol: 0.028, currency: '$' },
      'ETH': { name: 'Ethereum', cat: 'Crypto', base: 3200, vol: 0.030, currency: '$' },
      'SOL': { name: 'Solana', cat: 'Crypto', base: 140, vol: 0.040, currency: '$' },
      'BNB': { name: 'BNB', cat: 'Crypto', base: 580, vol: 0.025, currency: '$' },
      'DOGE': { name: 'Dogecoin', cat: 'Crypto', base: 0.15, vol: 0.055, currency: '$' },
      'XRP': { name: 'XRP', cat: 'Crypto', base: 0.60, vol: 0.038, currency: '$' },
      'AAPL': { name: 'Apple', cat: 'Stock', base: 185, vol: 0.012, currency: '$' },
      'TSLA': { name: 'Tesla', cat: 'Stock', base: 175, vol: 0.032, currency: '$' },
      'NVDA': { name: 'Nvidia', cat: 'Stock', base: 870, vol: 0.028, currency: '$' },
      'GOOGL': { name: 'Google', cat: 'Stock', base: 165, vol: 0.015, currency: '$' },
      'MSFT': { name: 'Microsoft', cat: 'Stock', base: 420, vol: 0.013, currency: '$' },
      'REL': { name: 'Reliance', cat: 'Stock', base: 2850, vol: 0.014, currency: '₹' },
      'TCS': { name: 'TCS', cat: 'Stock', base: 3900, vol: 0.012, currency: '₹' },
      'GOLD': { name: 'Gold', cat: 'Commodity', base: 2350, vol: 0.008, currency: '$' },
      'SILVER': { name: 'Silver', cat: 'Commodity', base: 28, vol: 0.018, currency: '$' },
      'OIL': { name: 'Crude Oil', cat: 'Commodity', base: 78, vol: 0.022, currency: '$' },
      'EURUSD': { name: 'EUR/USD', cat: 'Forex', base: 1.085, vol: 0.005, currency: '' },
      'GBPUSD': { name: 'GBP/USD', cat: 'Forex', base: 1.265, vol: 0.006, currency: '' },
      'USDJPY': { name: 'USD/JPY', cat: 'Forex', base: 149, vol: 0.005, currency: '' },
    };

    // ═══ STATE ═══
    let sym = 'BTC', tf = '15m', drawTool = 'none', orderSide = 'buy';
    let baseData = {};
    // FIX #3: tfCache is only cleared when the live 1m candle actually closes (not every tick)
    let tfCache = {};
    let drawings = [], planEntry = null, planSL = null, planTP = null;
    let panStart = null, isPanning = false, drawStart = null, isDragging = false;
    let wallet = parseFloat(localStorage.getItem('trade-wallet') || '100000');
    let positions = JSON.parse(localStorage.getItem('trade-pos') || '[]');
    let history = JSON.parse(localStorage.getItem('trade-hist') || '[]');
    let pendingOrders = JSON.parse(localStorage.getItem('trade-pending') || '[]');
    let indicators = { ema9: true, ema21: true, ema50: false, vol: true, rsi: true };

    // FIX #2: offset/barsToShow properly reset on TF/asset switch
    let offset = 0, barsToShow = 80;
    let liveInterval = null;
    let crossPrice = null, crossX = 0, crossY = 0;

    // FIX (free Y-axis): Manual Y-axis pan state — null means "auto-fit"
    let yOffset = null;   // null = auto
    let yScale = null;   // null = auto

    // FIX #8: simClock starts near now so countdown feels correct
    const SIM_TICK_MS = 800;
    let simClock = Date.now();

    // RAF dedup flag
    let _rafPending = false;

    const TF_CFG = {
      '1m': { ms: 60e3, src: 'm1', period: 1 },
      '5m': { ms: 5 * 60e3, src: 'm1', period: 5 },
      '15m': { ms: 15 * 60e3, src: 'm1', period: 15 },
      '1h': { ms: 3600e3, src: 'h1', period: 1 },
      '4h': { ms: 4 * 3600e3, src: 'h1', period: 4 },
      '1d': { ms: 864e5, src: 'h1', period: 24 },
    };
    const TF = { '1m': { ms: 60e3 }, '5m': { ms: 5 * 60e3 }, '15m': { ms: 15 * 60e3 }, '1h': { ms: 3600e3 }, '4h': { ms: 4 * 3600e3 }, '1d': { ms: 864e5 } };

    // ═══ PRICE GENERATION ═══
    function gaussRand() { let u = 0, v = 0; while (!u) u = Math.random(); while (!v) v = Math.random(); return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v); }

    // FIX: Align candle timestamps to real wall-clock boundaries (5m snaps to :00,:05,:10 etc.)
    function genBase(sym, n, msPerCandle) {
      const a = ASSETS[sym]; let price = a.base;
      // Snap last candle open to current period boundary (e.g. 8:07 → 8:05 for 5m)
      const now = Math.floor(Date.now() / msPerCandle) * msPerCandle;
      const arr = [];
      for (let i = n; i >= 0; i--) {
        const t = now - i * msPerCandle;
        const sigma = a.vol * Math.sqrt(msPerCandle / 864e5);
        const o = price;
        const c = o * Math.exp(0.00005 + sigma * gaussRand());
        const wick = Math.abs(c - o) * (0.3 + Math.random());
        const h = Math.max(o, c) + Math.random() * wick;
        const l = Math.min(o, c) - Math.random() * wick;
        const vol = (Math.random() * 900 + 100) * (1 + Math.abs((c - o) / o) * 50);
        arr.push({ t, o, h, l, c, vol }); price = c;
      }
      return arr;
    }

    function aggregate(base, period) {
      const out = [];
      for (let i = 0; i + period <= base.length; i += period) {
        const grp = base.slice(i, i + period);
        out.push({ t: grp[0].t, o: grp[0].o, h: Math.max(...grp.map(c => c.h)), l: Math.min(...grp.map(c => c.l)), c: grp[grp.length - 1].c, vol: grp.reduce((s, c) => s + c.vol, 0) });
      }
      const leftover = base.length % period;
      if (leftover > 0) {
        const grp = base.slice(base.length - leftover);
        out.push({ t: grp[0].t, o: grp[0].o, h: Math.max(...grp.map(c => c.h)), l: Math.min(...grp.map(c => c.l)), c: grp[grp.length - 1].c, vol: grp.reduce((s, c) => s + c.vol, 0) });
      }
      return out;
    }

    function ensureBase(s) {
      if (!baseData[s]) {
        // FIX #4: Generate MORE candles so 1D/4H have enough bars
        const m1 = genBase(s, 4500, 60e3);   // ~75h of 1m data
        const h1 = genBase(s, 720, 3600e3);  // 720 hours = 30 days of 1h
        const scale = m1[m1.length - 1].c / h1[h1.length - 1].c;
        h1.forEach(c => { c.o *= scale; c.h *= scale; c.l *= scale; c.c *= scale; });
        baseData[s] = { m1, h1 };
        // FIX #8: align simClock so the last candle is nearly complete (~5s left)
        simClock = m1[m1.length - 1].t + 55000;
      }
    }

    function getCandles() {
      ensureBase(sym);
      const key = sym + tf;
      if (!tfCache[key]) {
        const cfg = TF_CFG[tf];
        const base = baseData[sym][cfg.src];
        tfCache[key] = cfg.period === 1 ? [...base] : aggregate(base, cfg.period);
      }
      return tfCache[key];
    }

    // ═══ SHARED VIEWPORT CALCULATOR — FIX #1 ═══
    function calcViewport(vis, ch) {
      const autoHi = Math.max(...vis.map(c => c.h));
      const autoLo = Math.min(...vis.map(c => c.l));
      const autoMargin = (autoHi - autoLo) * 0.05 || autoHi * 0.01;

      if (yOffset === null && yScale === null) {
        const hiP = autoHi + autoMargin;
        const loP = autoLo - autoMargin;
        return { loP, priceRange: hiP - loP || 1 };
      } else {
        const baseRange = (autoHi + autoMargin) - (autoLo - autoMargin) || 1;
        const scale = yScale !== null ? yScale : 1.0;
        const off = yOffset !== null ? yOffset : 0;
        const centrePrice = (autoHi + autoLo) / 2 + off;
        const halfRange = (baseRange / 2) * scale;
        return { loP: centrePrice - halfRange, priceRange: halfRange * 2 || 1 };
      }
    }

    function tickLive() {
      ensureBase(sym);
      simClock += SIM_TICK_MS;

      const m1 = baseData[sym].m1;
      const last1m = m1[m1.length - 1];
      const a = ASSETS[sym];
      const sigma = a.vol * Math.sqrt(60e3 / 864e5) * 0.4;
      last1m.c *= Math.exp(gaussRand() * sigma);
      last1m.h = Math.max(last1m.h, last1m.c);
      last1m.l = Math.min(last1m.l, last1m.c);
      last1m.vol += Math.random() * 10 + 5;

      const h1 = baseData[sym].h1;
      const lastH = h1[h1.length - 1];
      lastH.c = last1m.c;
      lastH.h = Math.max(lastH.h, last1m.c);
      lastH.l = Math.min(lastH.l, last1m.c);

      // FIX #3: Only invalidate cache when a candle actually CLOSES, not every tick
      let invalidate = false;
      if (simClock - last1m.t >= 60e3) {
        const newT = last1m.t + 60e3;
        m1.push({ t: newT, o: last1m.c, h: last1m.c, l: last1m.c, c: last1m.c, vol: 0 });
        if (m1.length > 5000) m1.shift();
        lastH.vol += last1m.vol;
        if (simClock - lastH.t >= 3600e3) {
          const newHT = lastH.t + 3600e3;
          h1.push({ t: newHT, o: lastH.c, h: lastH.c, l: lastH.c, c: lastH.c, vol: 0 });
          if (h1.length > 1200) h1.shift();
        }
        invalidate = true;
      }

      if (invalidate) {
        Object.keys(tfCache).filter(k => k.startsWith(sym)).forEach(k => delete tfCache[k]);
      } else {
        const key = sym + tf;
        delete tfCache[key];
      }

      checkPendingOrders(last1m.c);
      updateLivePriceBar();
      // FIX #9: batch render under single rAF
      scheduleRender();
      updatePositionsPnL();
    }

    function scheduleRender() {
      if (!_rafPending) {
        _rafPending = true;
        requestAnimationFrame(() => { _rafPending = false; renderAll(); });
      }
    }

    function candleCountdown() {
      const arr = getCandles(); if (!arr.length) return '';
      const last = arr[arr.length - 1];
      const tfMs = TF_CFG[tf].ms;
      const rem = Math.max(0, tfMs - (simClock - last.t));
      const h = Math.floor(rem / 3600000);
      const m = Math.floor((rem % 3600000) / 60000);
      const s = Math.floor((rem % 60000) / 1000);
      if (h > 0) return `${h}h ${m}m`;
      return (m > 0 ? `${m}m ` : '') + `${s}s`;
    }

    // ═══ CANVAS SETUP ═══
    const main = document.getElementById('main-canvas');
    const mctx = main.getContext('2d');
    const rsi = document.getElementById('rsi-canvas');
    const rctx = rsi.getContext('2d');
    const ov = document.getElementById('overlay-canvas');
    const octx = ov.getContext('2d');
    const wrap = document.getElementById('chart-wrap');

    function resizeCanvases() {
      const r = wrap.getBoundingClientRect();
      const rsiH = indicators.rsi ? 80 : 0;
      rsi.style.display = indicators.rsi ? 'block' : 'none';
      main.width = ov.width = r.width;
      main.height = r.height - rsiH;
      rsi.width = r.width; rsi.height = rsiH;
      ov.style.height = (r.height - rsiH) + 'px';
      ov.height = r.height - rsiH;

      const yOv = document.getElementById('y-axis-overlay');
      const xOv = document.getElementById('x-axis-overlay');
      yOv.style.height = (r.height - rsiH) + 'px';
      yOv.style.width = '80px';
      xOv.style.height = '28px';
      xOv.style.bottom = rsiH + 'px';

      renderAll();
    }
    window.addEventListener('resize', resizeCanvases);

    // ═══ CHART RENDERING ═══
    const PAD = { t: 24, r: 80, b: 28, l: 8 };

    function calcEMA(data, k) {
      const mult = 2 / (k + 1); let ema = data[0];
      return data.map(v => { ema = v * mult + ema * (1 - mult); return ema; });
    }

    function calcRSI(closes, period = 14) {
      let gains = 0, losses = 0;
      for (let i = 1; i <= period; i++) { const d = closes[i] - closes[i - 1]; if (d > 0) gains += d; else losses -= d; }
      let ag = gains / period, al = losses / period;
      const rsiArr = [50];
      for (let i = period + 1; i < closes.length; i++) {
        const d = closes[i] - closes[i - 1];
        ag = (ag * (period - 1) + (d > 0 ? d : 0)) / period;
        al = (al * (period - 1) + (d < 0 ? -d : 0)) / period;
        rsiArr.push(al === 0 ? 100 : 100 - 100 / (1 + ag / al));
      }
      return rsiArr;
    }

    function renderAll() {
      const arr = getCandles();
      if (!arr.length) return;
      const cw = main.width, ch = main.height;
      if (!cw || !ch) return;

      const cW = cw - PAD.l - PAD.r;
      const visible = Math.max(10, Math.min(barsToShow, arr.length));
      const startIdx = Math.max(0, arr.length - visible - Math.floor(offset));
      const vis = arr.slice(startIdx, startIdx + visible);
      if (!vis.length) return;

      // FIX #1: single authoritative viewport
      const { loP, priceRange } = calcViewport(vis, ch);

      const px = (p) => PAD.t + (1 - (p - loP) / priceRange) * (ch - PAD.t - PAD.b);
      const bw = Math.max(1, cW / visible - 1.5);

      mctx.fillStyle = '#060b14'; mctx.fillRect(0, 0, cw, ch);

      // Grid
      const GRID_LINES = 8;
      mctx.strokeStyle = 'rgba(34,211,238,0.06)'; mctx.lineWidth = 0.5;
      for (let i = 0; i <= GRID_LINES; i++) {
        const y = PAD.t + i * (ch - PAD.t - PAD.b) / GRID_LINES;
        mctx.beginPath(); mctx.moveTo(PAD.l, y); mctx.lineTo(cw - PAD.r, y); mctx.stroke();
        const price = loP + (1 - i / GRID_LINES) * priceRange;
        mctx.fillStyle = 'rgba(203,213,225,0.65)';
        mctx.font = 'bold 11px JetBrains Mono'; mctx.textAlign = 'right';
        mctx.fillText(fmtP(price), cw - 4, y + 4);
      }

      // Volume bars
      if (indicators.vol) {
        const maxVol = Math.max(...vis.map(c => c.vol));
        const volH = (ch - PAD.t - PAD.b) * 0.15;
        vis.forEach((c, i) => {
          const x = PAD.l + i * (cW / visible) + (cW / visible - bw) / 2;
          const h = (c.vol / maxVol) * volH;
          mctx.fillStyle = c.c >= c.o ? 'rgba(16,185,129,0.18)' : 'rgba(239,68,68,0.18)';
          mctx.fillRect(x, ch - PAD.b - h, bw, h);
        });
      }

      // Candles
      vis.forEach((c, i) => {
        const x = PAD.l + i * (cW / visible) + (cW / visible - bw) / 2;
        const bull = c.c >= c.o;
        const col = bull ? '#10b981' : '#ef4444';
        const cy = px(c.c), oy = px(c.o);
        mctx.strokeStyle = col; mctx.lineWidth = Math.max(1, bw * 0.15);
        mctx.beginPath(); mctx.moveTo(x + bw / 2, px(c.h)); mctx.lineTo(x + bw / 2, px(c.l)); mctx.stroke();
        mctx.fillStyle = bull ? 'rgba(16,185,129,0.9)' : 'rgba(239,68,68,0.9)';
        const top = Math.min(cy, oy), h = Math.max(Math.abs(cy - oy), 1);
        mctx.fillRect(x, top, Math.max(bw, 1), h);
      });

      // EMAs
      const closes = arr.map(c => c.c);
      if (indicators.ema9) drawEMA(closes, 9, '#a5b4fc', vis, startIdx, cW, visible, ch, loP, priceRange, bw, cw);
      if (indicators.ema21) drawEMA(closes, 21, '#fbbf24', vis, startIdx, cW, visible, ch, loP, priceRange, bw, cw);
      if (indicators.ema50) drawEMA(closes, 50, '#f472b6', vis, startIdx, cW, visible, ch, loP, priceRange, bw, cw);

      // Drawings — pass the SAME viewport
      octx.clearRect(0, 0, ov.width, ov.height);
      renderDrawings(vis, startIdx, cW, visible, ch, loP, priceRange, bw);

      if (indicators.rsi && rsi.width > 0) renderRSI(closes);

      // Last price tag
      const lastC = arr[arr.length - 1].c;
      const ly = px(lastC);
      mctx.fillStyle = '#22d3ee'; mctx.fillRect(cw - PAD.r, ly - 10, PAD.r - 2, 20);
      mctx.fillStyle = '#060b14'; mctx.font = 'bold 11px JetBrains Mono'; mctx.textAlign = 'center';
      mctx.fillText(fmtP(lastC), cw - PAD.r / 2 - 1, ly + 4);

      mctx.fillStyle = 'rgba(34,211,238,0.6)';
      mctx.font = 'bold 11px JetBrains Mono'; mctx.textAlign = 'right';
      mctx.fillText('\u23F1 ' + candleCountdown(), cw - PAD.r - 6, PAD.t - 6);

      // Y-axis hint
      const isYManual = yOffset !== null || yScale !== null;
      mctx.fillStyle = isYManual ? 'rgba(34,211,238,0.35)' : 'rgba(148,163,184,0.15)';
      mctx.font = '9px Inter'; mctx.textAlign = 'right';
      mctx.fillText(isYManual ? '\u2195 dbl-click Y to reset' : '\u2195 drag Y axis', cw - 4, ch - PAD.b - 4);

      // FIX: Time axis labels use aligned timestamps
      const timeStep = Math.max(1, Math.floor(vis.length / 7));
      mctx.fillStyle = 'rgba(203,213,225,0.55)'; mctx.font = 'bold 11px Inter'; mctx.textAlign = 'center';
      vis.forEach((c, i) => {
        if (i % timeStep !== 0) return;
        const x = PAD.l + i * (cW / visible) + (cW / visible) / 2;
        mctx.fillText(fmtT(c.t), x, ch - 6);
      });
    }

    function drawEMA(closes, period, color, vis, startIdx, cW, visible, ch, lo, priceRange, bw, cw) {
      const ema = calcEMA(closes, period);
      const visEma = ema.slice(startIdx, startIdx + visible);
      mctx.strokeStyle = color; mctx.lineWidth = 1.2; mctx.setLineDash([]);
      mctx.beginPath();
      visEma.forEach((v, i) => {
        const x = PAD.l + i * (cW / visible) + (cW / visible) / 2;
        const y = PAD.t + (1 - (v - lo) / priceRange) * (ch - PAD.t - PAD.b);
        i === 0 ? mctx.moveTo(x, y) : mctx.lineTo(x, y);
      });
      mctx.stroke();
    }

    function renderRSI(closes) {
      const rw = rsi.width, rh = rsi.height;
      rctx.fillStyle = '#060b14'; rctx.fillRect(0, 0, rw, rh);
      rctx.strokeStyle = 'rgba(34,211,238,0.06)'; rctx.lineWidth = 0.5;
      [30, 50, 70].forEach(v => {
        const y = rh - (v / 100) * rh;
        rctx.beginPath(); rctx.moveTo(0, y); rctx.lineTo(rw - PAD.r, y); rctx.stroke();
        rctx.fillStyle = 'rgba(148,163,184,0.3)'; rctx.font = '9px JetBrains Mono'; rctx.textAlign = 'right';
        rctx.fillText(v, rw - 2, y + 3);
      });
      const rsiArr = calcRSI(closes);
      const visible = Math.min(barsToShow, rsiArr.length);
      const startIdx = Math.max(0, rsiArr.length - visible - Math.floor(offset));
      const vis = rsiArr.slice(startIdx, startIdx + visible);
      const cW = rw - PAD.l - PAD.r;
      rctx.strokeStyle = '#818cf8'; rctx.lineWidth = 1.5; rctx.beginPath();
      vis.forEach((v, i) => {
        const x = PAD.l + i * (cW / visible) + (cW / visible) / 2;
        const y = rh - (v / 100) * rh;
        i === 0 ? rctx.moveTo(x, y) : rctx.lineTo(x, y);
      });
      rctx.stroke();
      rctx.fillStyle = 'rgba(239,68,68,0.07)'; rctx.fillRect(0, 0, rw - PAD.r, rh * (1 - 70 / 100));
      rctx.fillStyle = 'rgba(16,185,129,0.07)'; rctx.fillRect(0, rh * (1 - 30 / 100), rw - PAD.r, rh * 30 / 100);
      rctx.fillStyle = 'rgba(129,140,248,0.6)'; rctx.font = 'bold 9px Inter'; rctx.textAlign = 'left';
      rctx.fillText('RSI 14', 10, 10);
    }

    // FIX: Drawings use price/time coordinates so they stay in place across TF + zoom changes
    function renderDrawings(vis, startIdx, cW, visible, ch, lo, priceRange, bw) {
      const arr = getCandles();
      const px = (p) => PAD.t + (1 - (p - lo) / priceRange) * (ch - PAD.t - PAD.b);
      // Map timestamp → canvas-x by finding nearest candle
      const tx = (t) => {
        let best = startIdx, bestDiff = Infinity;
        for (let i = startIdx; i < startIdx + visible && i < arr.length; i++) {
          const d = Math.abs(arr[i].t - t);
          if (d < bestDiff) { bestDiff = d; best = i; }
        }
        return PAD.l + (best - startIdx) * (cW / visible) + (cW / visible) / 2;
      };

      drawings.forEach(d => {
        octx.save();
        // Horizontal price lines
        if (['hline', 'entry', 'sl', 'tp'].includes(d.type)) {
          const y = px(d.price);
          if (y < PAD.t - 10 || y > ch + 10) { octx.restore(); return; }
          const col = d.type === 'sl' ? '#ef4444' : d.type === 'tp' ? '#fbbf24' : d.type === 'entry' ? '#10b981' : '#94a3b8';
          octx.strokeStyle = col; octx.lineWidth = 1.5;
          octx.setLineDash(d.type === 'hline' ? [5, 5] : []);
          octx.beginPath(); octx.moveTo(0, y); octx.lineTo(ov.width - PAD.r, y); octx.stroke();
          octx.fillStyle = col; octx.font = 'bold 9px Inter'; octx.textAlign = 'left';
          octx.fillText(d.type.toUpperCase() + ' ' + fmtP(d.price), 4, y - 3);
          octx.setLineDash([]);
        }
        // Trendline — stored by price + timestamp
        if (d.type === 'trendline') {
          const y1 = px(d.p1), y2 = px(d.p2);
          const x1 = d.t1 !== undefined ? tx(d.t1) : (PAD.l + (d.x1 - startIdx) * (cW / visible) + (cW / visible) / 2);
          const x2 = d.t2 !== undefined ? tx(d.t2) : (PAD.l + (d.x2 - startIdx) * (cW / visible) + (cW / visible) / 2);
          octx.strokeStyle = '#22d3ee'; octx.lineWidth = 1.5; octx.setLineDash([]);
          octx.beginPath(); octx.moveTo(x1, y1); octx.lineTo(x2, y2); octx.stroke();
          octx.fillStyle = '#22d3ee';
          octx.beginPath(); octx.arc(x1, y1, 3, 0, Math.PI * 2); octx.fill();
          octx.beginPath(); octx.arc(x2, y2, 3, 0, Math.PI * 2); octx.fill();
        }
        // Long/Short visual R:R setup box
        if (d.type === 'longsetup' || d.type === 'shortsetup') {
          const isLong = d.type === 'longsetup';
          const ye = px(d.entry), ys = px(d.sl), yt = px(d.tp);
          const x0 = d.t !== undefined ? tx(d.t) : PAD.l;
          const x1 = ov.width - PAD.r;
          // SL zone (red)
          const slTop = Math.min(ye, ys), slBot = Math.max(ye, ys);
          octx.fillStyle = 'rgba(239,68,68,0.12)';
          octx.fillRect(x0, px(slTop < ys ? ys : slTop), x1 - x0, Math.abs(ye - ys));
          // TP zone (green)
          const tpTop = Math.min(ye, yt), tpBot = Math.max(ye, yt);
          octx.fillStyle = 'rgba(16,185,129,0.12)';
          octx.fillRect(x0, px(tpBot > yt ? yt : tpTop), x1 - x0, Math.abs(yt - ye));
          // Entry line
          octx.strokeStyle = '#10b981'; octx.lineWidth = 1.5; octx.setLineDash([]);
          octx.beginPath(); octx.moveTo(x0, ye); octx.lineTo(x1, ye); octx.stroke();
          // SL line
          octx.strokeStyle = '#ef4444'; octx.setLineDash([4, 3]);
          octx.beginPath(); octx.moveTo(x0, ys); octx.lineTo(x1, ys); octx.stroke();
          // TP line
          octx.strokeStyle = '#fbbf24'; octx.setLineDash([4, 3]);
          octx.beginPath(); octx.moveTo(x0, yt); octx.lineTo(x1, yt); octx.stroke();
          octx.setLineDash([]);
          // Labels
          const risk = Math.abs(d.entry - d.sl);
          const reward = Math.abs(d.tp - d.entry);
          const rr = risk > 0 ? (reward / risk).toFixed(1) : '?';
          octx.font = 'bold 9px Inter'; octx.textAlign = 'left';
          octx.fillStyle = '#10b981'; octx.fillText((isLong ? '▲ LONG' : '▼ SHORT') + ' E:' + fmtP(d.entry), x0 + 4, ye - 3);
          octx.fillStyle = '#ef4444'; octx.fillText('SL:' + fmtP(d.sl), x0 + 4, ys + 9);
          octx.fillStyle = '#fbbf24'; octx.fillText('TP:' + fmtP(d.tp), x0 + 4, yt - 3);
          octx.fillStyle = parseFloat(rr) >= 2 ? '#10b981' : '#fbbf24';
          octx.textAlign = 'right';
          octx.fillText('R:R 1:' + rr, x1 - 4, ye - 3);
        }
        octx.restore();
      });

      // In-progress draw preview
      if (isDragging && drawStart) {
        if (drawTool === 'trendline') {
          octx.strokeStyle = 'rgba(34,211,238,0.5)'; octx.lineWidth = 1; octx.setLineDash([4, 4]);
          octx.beginPath(); octx.moveTo(drawStart.x, drawStart.y); octx.lineTo(crossX, crossY); octx.stroke();
          octx.setLineDash([]);
        }
        if (drawTool === 'long' || drawTool === 'short') {
          const isLong = drawTool === 'long';
          const ye = drawStart.y, ys = crossY;
          const x0 = drawStart.x, x1 = ov.width - PAD.r;
          const entryP = drawStart.price, slP = canvasPrice(crossY);
          const risk = Math.abs(entryP - slP);
          const tpP = isLong ? entryP + risk * 2 : entryP - risk * 2;
          const yt = px(tpP);
          octx.fillStyle = 'rgba(239,68,68,0.10)'; octx.fillRect(x0, Math.min(ye, ys), x1 - x0, Math.abs(ye - ys));
          octx.fillStyle = 'rgba(16,185,129,0.10)'; octx.fillRect(x0, Math.min(ye, yt), x1 - x0, Math.abs(ye - yt));
          octx.strokeStyle = '#10b981'; octx.lineWidth = 1.5; octx.setLineDash([]);
          octx.beginPath(); octx.moveTo(x0, ye); octx.lineTo(x1, ye); octx.stroke();
          octx.strokeStyle = '#ef4444'; octx.setLineDash([4, 3]);
          octx.beginPath(); octx.moveTo(x0, ys); octx.lineTo(x1, ys); octx.stroke();
          octx.strokeStyle = '#fbbf24'; octx.setLineDash([4, 3]);
          octx.beginPath(); octx.moveTo(x0, yt); octx.lineTo(x1, yt); octx.stroke();
          octx.setLineDash([]);
          octx.fillStyle = '#a5b4fc'; octx.font = 'bold 9px Inter'; octx.textAlign = 'left';
          octx.fillText('R:R 1:2.0 (drag to adjust SL)', x0 + 4, ye - 4);
        }
      }
    }

    // ═══ VIEWPORT HELPERS ═══
    function getViewportState() {
      const arr = getCandles();
      const cw = main.width, ch = main.height;
      const cW = cw - PAD.l - PAD.r;
      const visible = Math.max(10, Math.min(barsToShow, arr.length));
      const startIdx = Math.max(0, arr.length - visible - Math.floor(offset));
      const vis = arr.slice(startIdx, startIdx + visible);
      const { loP, priceRange } = calcViewport(vis, ch);
      return { arr, vis, visible, startIdx, cW, ch, loP, priceRange, bw: Math.max(1, cW / visible - 1.5) };
    }

    function canvasPrice(y) {
      const { loP, priceRange, ch } = getViewportState();
      return loP + (1 - (y - PAD.t) / (ch - PAD.t - PAD.b)) * priceRange;
    }

    // ═══ OVERLAY EVENTS ═══
    // FIX #7: Single consolidated mousemove
    ov.addEventListener('mousemove', e => {
      const r = ov.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      crossPrice = canvasPrice(my); crossX = mx; crossY = my;

      document.getElementById('crosshair-price').style.top = my - 9 + 'px';
      document.getElementById('crosshair-price').textContent = fmtP(crossPrice);
      document.getElementById('crosshair-time').style.left = mx + 'px';

      // FIX: Panning direction corrected — drag RIGHT = older bars (offset increases)
      if (isPanning && drawTool === 'none' && panStart) {
        const arr = getViewportState().arr;
        const dx = e.clientX - panStart.x;
        const barsPerPx = barsToShow / (main.width - PAD.l - PAD.r);
        offset = Math.max(0, Math.min(arr.length - 10, panStart.off + dx * barsPerPx));
        scheduleRender(); return;
      }

      // FIX #9: use scheduleRender to batch with tickLive
      octx.clearRect(0, 0, ov.width, ov.height);
      octx.strokeStyle = 'rgba(148,163,184,0.25)'; octx.lineWidth = 0.5; octx.setLineDash([4, 4]);
      octx.beginPath(); octx.moveTo(mx, 0); octx.lineTo(mx, ov.height); octx.stroke();
      octx.beginPath(); octx.moveTo(0, my); octx.lineTo(ov.width, my); octx.stroke();
      octx.setLineDash([]);

      // FIX #1: use shared getViewportState
      const vs = getViewportState();
      renderDrawings(vs.vis, vs.startIdx, vs.cW, vs.visible, vs.ch, vs.loP, vs.priceRange, vs.bw);

      if (isDragging && drawStart && drawTool === 'trendline') {
        octx.strokeStyle = 'rgba(34,211,238,0.6)'; octx.lineWidth = 1.5; octx.setLineDash([]);
        octx.beginPath(); octx.moveTo(drawStart.x, drawStart.y); octx.lineTo(mx, my); octx.stroke();
      }
    });

    ov.addEventListener('mousedown', e => {
      const r = ov.getBoundingClientRect();
      const mx = e.clientX - r.left, my = e.clientY - r.top;
      const price = canvasPrice(my);
      const vs = getViewportState();
      const candleIdx = vs.startIdx + Math.floor((mx - PAD.l) / vs.cW * vs.visible);
      const candleTime = (vs.arr[candleIdx] || vs.arr[vs.arr.length - 1]).t;

      if (drawTool === 'none') {
        isPanning = true; panStart = { x: e.clientX, off: offset };
        return;
      }
      if (drawTool === 'hline') { drawings.push({ type: 'hline', price }); renderAll(); return; }
      if (drawTool === 'entry') { planEntry = price; drawings = drawings.filter(d => d.type !== 'entry'); drawings.push({ type: 'entry', price }); updatePlanBox(); renderAll(); return; }
      if (drawTool === 'sl') { planSL = price; drawings = drawings.filter(d => d.type !== 'sl'); drawings.push({ type: 'sl', price }); updatePlanBox(); renderAll(); return; }
      if (drawTool === 'tp') { planTP = price; drawings = drawings.filter(d => d.type !== 'tp'); drawings.push({ type: 'tp', price }); updatePlanBox(); renderAll(); return; }
      if (drawTool === 'trendline') {
        isDragging = true;
        drawStart = { x: mx, y: my, price, t: candleTime, idx: candleIdx };
      }
      if (drawTool === 'long' || drawTool === 'short') {
        isDragging = true;
        drawStart = { x: mx, y: my, price, t: candleTime, idx: candleIdx };
      }
    });

    ov.addEventListener('mouseup', e => {
      if (drawTool === 'trendline' && isDragging && drawStart) {
        const r = ov.getBoundingClientRect();
        const mx = e.clientX - r.left, my = e.clientY - r.top;
        const price2 = canvasPrice(my);
        const vs = getViewportState();
        const idx2 = vs.startIdx + Math.floor((mx - PAD.l) / vs.cW * vs.visible);
        const t2 = (vs.arr[idx2] || vs.arr[vs.arr.length - 1]).t;
        drawings.push({ type: 'trendline', p1: drawStart.price, p2: price2, t1: drawStart.t, t2 });
        renderAll();
      }
      if ((drawTool === 'long' || drawTool === 'short') && isDragging && drawStart) {
        const r = ov.getBoundingClientRect();
        const my = e.clientY - r.top;
        const price2 = canvasPrice(my);
        // drawStart.price = entry, price2 = sl (drag defines risk)
        const entryP = drawStart.price;
        const slP = price2;
        const risk = Math.abs(entryP - slP);
        const tpP = drawTool === 'long' ? entryP + risk * 2 : entryP - risk * 2;
        drawings.push({ type: drawTool === 'long' ? 'longsetup' : 'shortsetup', entry: entryP, sl: slP, tp: tpP, t: drawStart.t });
        // Also set planEntry/SL/TP from this
        planEntry = entryP; planSL = slP; planTP = tpP;
        drawings = drawings.filter(d => !['entry','sl','tp'].includes(d.type));
        drawings.push({type:'entry',price:entryP},{type:'sl',price:slP},{type:'tp',price:tpP});
        updatePlanBox(); renderAll();
      }
      isDragging = false; drawStart = null;
      isPanning = false; panStart = null;
    });
    ov.addEventListener('mouseleave', () => { isPanning = false; panStart = null; });

    // ─── ZOOM (scroll) ───
    ov.addEventListener('wheel', e => {
      e.preventDefault();
      const arr = getCandles();
      if (e.ctrlKey || e.metaKey) {
        // Y-axis zoom
        const factor = e.deltaY > 0 ? 1.12 : 0.88;
        yScale = (yScale !== null ? yScale : 1.0) * factor;
        yScale = Math.max(0.1, Math.min(20, yScale));
      } else if (e.shiftKey) {
        // Y-axis pan with shift+scroll
        const vs = getViewportState();
        const pricePerPx = vs.priceRange / (vs.ch - PAD.t - PAD.b);
        yOffset = (yOffset !== null ? yOffset : 0) - e.deltaY * pricePerPx * 0.5;
      } else {
        // FIX: X-axis pan direction — scroll right/down = older bars (offset increases)
        const sensitivity = barsToShow / (main.width - PAD.l - PAD.r) * 1.2;
        const delta = (e.deltaX !== 0 ? e.deltaX : e.deltaY) * sensitivity;
        offset = Math.max(0, Math.min(arr.length - 10, offset + delta));
      }
      scheduleRender();
    }, { passive: false });

    // ─── Y-AXIS: drag to pan, double-click to reset ───
    const yAxisOv = document.getElementById('y-axis-overlay');
    let yAxisDrag = null;
    yAxisOv.addEventListener('mousedown', e => {
      e.stopPropagation();
      yAxisDrag = { startY: e.clientY, startOffset: yOffset || 0, startScale: yScale || 1.0 };
    });
    document.addEventListener('mousemove', e => {
      if (!yAxisDrag) return;
      const dy = e.clientY - yAxisDrag.startY;
      const vs = getViewportState();
      const pricePerPx = vs.priceRange / (vs.ch - PAD.t - PAD.b);
      // FIX: Drag DOWN = lower prices visible, drag UP = higher prices visible
      yOffset = yAxisDrag.startOffset - dy * pricePerPx;
      scheduleRender();
    });
    document.addEventListener('mouseup', () => { yAxisDrag = null; });
    yAxisOv.addEventListener('dblclick', e => {
      e.stopPropagation();
      yOffset = null; yScale = null;
      showToast('\u2195 Y-axis reset to auto-fit');
      renderAll();
    });
    yAxisOv.addEventListener('wheel', e => {
      e.preventDefault(); e.stopPropagation();
      const factor = e.deltaY > 0 ? 1.12 : 0.88;
      yScale = (yScale !== null ? yScale : 1.0) * factor;
      yScale = Math.max(0.1, Math.min(20, yScale));
      scheduleRender();
    }, { passive: false });

    // ─── X-AXIS: drag to zoom, double-click to reset ───
    const xAxisOv = document.getElementById('x-axis-overlay');
    let xAxisDrag = null;
    xAxisOv.addEventListener('mousedown', e => {
      e.stopPropagation();
      xAxisDrag = { startX: e.clientX, startBars: barsToShow };
    });
    document.addEventListener('mousemove', e => {
      if (!xAxisDrag) return;
      const dx = e.clientX - xAxisDrag.startX;
      barsToShow = Math.round(Math.max(10, Math.min(400, xAxisDrag.startBars + dx * 0.5)));
      scheduleRender();
    });
    document.addEventListener('mouseup', () => {
      xAxisDrag = null;
      yAxisDrag = null;
    });
    // FIX: dblclick only resets — never starts a drag (xAxisDrag cleared first)
    xAxisOv.addEventListener('dblclick', e => {
      e.stopPropagation();
      xAxisDrag = null;       // ← kill any residual drag state so cursor never sticks
      barsToShow = 80; offset = 0;
      showToast('\u2194 X-axis reset');
      renderAll();
    });
    xAxisOv.addEventListener('wheel', e => {
      e.preventDefault(); e.stopPropagation();
      const factor = e.deltaY > 0 ? 1.08 : 0.92;
      barsToShow = Math.round(Math.max(10, Math.min(400, barsToShow * factor)));
      scheduleRender();
    }, { passive: false });

    // Touch pinch-zoom
    let lastPinchDist = null;
    ov.addEventListener('touchstart', e => { if (e.touches.length === 2) lastPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }, { passive: true });
    ov.addEventListener('touchmove', e => {
      if (e.touches.length === 2 && lastPinchDist) {
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        barsToShow = Math.max(10, Math.min(400, barsToShow * (lastPinchDist / dist)));
        lastPinchDist = dist; scheduleRender();
      }
    }, { passive: true });

    // ═══ ASSET MANAGEMENT ═══
    function buildAssetChips() {
      const bar = document.getElementById('asset-chips'); bar.innerHTML = '';
      Object.entries(ASSETS).forEach(([k, v]) => {
        const c = document.createElement('button');
        c.className = 'asset-chip' + (k === sym ? ' active' : '');
        c.textContent = k; c.dataset.sym = k; c.title = v.name + ' (' + v.cat + ')';
        c.onclick = () => switchAsset(k);
        bar.appendChild(c);
      });
    }

    function filterAssets(q) {
      document.querySelectorAll('.asset-chip').forEach(c => {
        const s = c.dataset.sym.toLowerCase(), a = ASSETS[c.dataset.sym];
        const match = !q || s.includes(q.toLowerCase()) || a.name.toLowerCase().includes(q.toLowerCase()) || a.cat.toLowerCase().includes(q.toLowerCase());
        c.style.display = match ? '' : 'none';
      });
    }

    function switchAsset(s) {
      sym = s;
      // FIX #2: reset offset and view on asset switch
      offset = 0; barsToShow = 80; yOffset = null; yScale = null;
      document.querySelectorAll('.asset-chip').forEach(c => c.classList.toggle('active', c.dataset.sym === s));
      planEntry = planSL = planTP = null;
      ['pl-entry', 'pl-sl', 'pl-tp'].forEach(id => document.getElementById(id).textContent = '—');
      document.getElementById('pnl-preview').textContent = 'Set levels to plan';
      resizeCanvases(); updateLivePriceBar();
    }

    function setTF(t, btn) {
      tf = t;
      // FIX #2: reset offset on TF switch
      offset = 0; yOffset = null; yScale = null;
      document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      resizeCanvases();
    }

    function toggleInd(id, btn) {
      indicators[id] = !indicators[id];
      btn.classList.toggle('on', indicators[id]);
      resizeCanvases();
    }
    function setDraw(tool, btn) {
      drawTool = tool;
      document.querySelectorAll('.draw-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
    }
    // Drawings stored by PRICE so they survive TF & zoom changes.
    // trendline: {type:'trendline', p1, p2, t1, t2 (timestamps)}
    // hline/entry/sl/tp: {type, price}
    // long/short setup: {type:'longsetup'|'shortsetup', entry, sl, tp, t (timestamp anchor)}
    function clearDrawings() { drawings = []; planEntry = planSL = planTP = null; updatePlanBox(); renderAll(); }

    function updatePlanBox() {
      document.getElementById('pl-entry').textContent = planEntry ? fmtP(planEntry) : '—';
      document.getElementById('pl-sl').textContent = planSL ? fmtP(planSL) : '—';
      document.getElementById('pl-tp').textContent = planTP ? fmtP(planTP) : '—';
      const box = document.getElementById('pnl-preview');
      const trigBtn = document.getElementById('plan-trigger-btn');
      if (planEntry && planSL && planTP) {
        const rr = (Math.abs(planTP - planEntry) / Math.abs(planEntry - planSL)).toFixed(2);
        box.textContent = 'R:R = 1:' + rr;
        box.style.color = parseFloat(rr) >= 2 ? '#10b981' : parseFloat(rr) < 1 ? '#ef4444' : '#fbbf24';
        if (trigBtn) trigBtn.style.display = 'block';
      } else {
        box.textContent = 'Set Entry + SL + TP'; box.style.color = '';
        if (trigBtn) trigBtn.style.display = 'none';
      }
    }

    // ─── Pending / OCO Orders ───
    function placePendingOCO() {
      if (!planEntry || !planSL || !planTP) { showToast('Set Entry, SL, and TP first'); return; }
      const qty = parseFloat(document.getElementById('qty-input').value) || 1;
      const order = { sym, side: orderSide, qty, entry: planEntry, sl: planSL, tp: planTP, id: Date.now() };
      pendingOrders.push(order);
      localStorage.setItem('trade-pending', JSON.stringify(pendingOrders));
      showToast('\u23F3 Pending ' + orderSide.toUpperCase() + ' ' + qty + ' ' + sym + ' @ ' + fmtP(planEntry));
      renderPendingOrders();
    }

    function checkPendingOrders(price) {
      pendingOrders = pendingOrders.filter(o => {
        if (o.sym !== sym) return true;
        const triggered = o.side === 'buy' ? price <= o.entry : price >= o.entry;
        if (!triggered) return true;
        const cost = o.entry * o.qty;
        if (o.side === 'buy' && cost > wallet) { showToast('\u274C Pending order failed: Insufficient balance'); return false; }
        wallet += o.side === 'buy' ? -cost : cost;
        positions.push({ sym: o.sym, side: o.side, qty: o.qty, entry: o.entry, sl: o.sl, tp: o.tp, t: Date.now() });
        showToast('\u2705 OCO triggered: ' + o.side.toUpperCase() + ' ' + o.qty + ' ' + o.sym + ' @ ' + fmtP(o.entry));
        persist(); renderWallet(); renderPositions();
        return false;
      });
      positions = positions.filter(pos => {
        if (pos.sym !== sym || !pos.sl || !pos.tp) return true;
        const slHit = pos.side === 'buy' ? price <= pos.sl : price >= pos.sl;
        const tpHit = pos.side === 'buy' ? price >= pos.tp : price <= pos.tp;
        if (slHit || tpHit) {
          const exitPrice = slHit ? pos.sl : pos.tp;
          const pnl = (exitPrice - pos.entry) * (pos.side === 'buy' ? 1 : -1) * pos.qty;
          wallet += pos.qty * exitPrice;
          history.unshift({ sym: pos.sym, side: 'close', qty: pos.qty, entry: pos.entry, exit: exitPrice, pnl, t: Date.now() });
          showToast((slHit ? '\uD83D\uDED1 SL Hit' : '\uD83C\uDFAF TP Hit') + ' ' + pos.sym + ' | PnL: ' + (pnl >= 0 ? '+' : '') + fmtP(pnl));
          persist(); renderWallet(); renderPositions(); renderHistory();
          return false;
        }
        return true;
      });
    }

    function removePending(id) {
      pendingOrders = pendingOrders.filter(o => o.id !== id);
      localStorage.setItem('trade-pending', JSON.stringify(pendingOrders));
      renderPendingOrders();
    }

    function renderPendingOrders() {
      const el = document.getElementById('pending-wrap');
      if (!el) return;
      if (!pendingOrders.length) { el.innerHTML = '<div style="color:var(--muted);font-size:.72rem;padding:6px">No pending orders</div>'; return; }
      el.innerHTML = pendingOrders.map(o => `
    <div class="pos-card">
      <div class="pos-header"><span>${o.sym} <span style="color:#fbbf24">${o.side.toUpperCase()} PENDING</span></span><button class="close-pos" onclick="removePending(${o.id})">Cancel</button></div>
      <div class="pos-row"><span>Qty: ${o.qty}</span><span>@ ${fmtP(o.entry)}</span></div>
      <div class="pos-row" style="margin-top:3px"><span style="color:#ef4444">SL ${fmtP(o.sl)}</span><span style="color:#fbbf24">TP ${fmtP(o.tp)}</span></div>
    </div>`).join('');
    }

    // FIX: updateLivePriceBar shows Balance + P&L in topbar
    function updateLivePriceBar() {
      const arr = getCandles(); if (!arr.length) return;
      const last = arr[arr.length - 1];
      const prev = arr.length > 1 ? arr[arr.length - 2].c : last.o;
      const pct = ((last.c - prev) / prev * 100).toFixed(2);
      const a = ASSETS[sym];
      const cd = document.getElementById('chg-display');
      const symEl = document.getElementById('topbar-sym');
      if (cd) { cd.textContent = a.currency + fmtP(last.c) + ' (' + (pct > 0 ? '+' : '') + pct + '%)'; cd.style.color = last.c >= prev ? '#10b981' : '#ef4444'; }
      if (symEl) symEl.textContent = sym;
      const balEl = document.getElementById('topbar-bal');
      if (balEl) balEl.textContent = '\u20B9' + Math.round(wallet).toLocaleString('en-IN');
      // Open P&L — capped to 2 decimal places
      const pnlEl = document.getElementById('topbar-pnl');
      if (pnlEl) {
        let totalPnl = 0;
        positions.forEach(p => {
          const cur = p.sym === sym ? last.c : (ASSETS[p.sym]?.base || 0);
          totalPnl += p.side === 'buy' ? (cur - p.entry) * p.qty : (p.entry - cur) * p.qty;
        });
        const pnlStr = (Math.abs(totalPnl) < 0.01 ? '0.00' : (totalPnl >= 0 ? '+' : '') + totalPnl.toFixed(2));
        pnlEl.textContent = pnlStr;
        pnlEl.style.color = totalPnl > 0 ? '#10b981' : totalPnl < 0 ? '#ef4444' : 'var(--muted)';
      }
      updateMarginInfo();
    }

    // ─── Margin requirement display ───
    function updateMarginInfo() {
      const el = document.getElementById('margin-info'); if (!el) return;
      const qty = parseFloat(document.getElementById('qty-input')?.value) || 0;
      if (!qty || qty <= 0) { el.textContent = 'Enter quantity to see margin required'; el.className = ''; return; }
      const arr = getCandles(); if (!arr.length) return;
      const last = arr[arr.length - 1].c;
      const otypEl = document.getElementById('order-type');
      const limitEl = document.getElementById('limit-price');
      const isLimit = otypEl && otypEl.value === 'limit';
      const price = (isLimit && limitEl && parseFloat(limitEl.value)) ? parseFloat(limitEl.value) : last;
      const isBuy = orderSide === 'buy';
      const required = isBuy ? price * qty : price * qty * 0.1; // 10% margin for shorts
      const canAfford = required <= wallet;
      const reqStr = '\u20B9' + required.toLocaleString('en-IN', { maximumFractionDigits: 2 });
      const balStr = '\u20B9' + wallet.toLocaleString('en-IN', { maximumFractionDigits: 0 });
      el.textContent = (isBuy ? 'Cost: ' : 'Margin (10%): ') + reqStr + ' | Bal: ' + balStr + (canAfford ? ' \u2713' : ' \u2717 Insufficient');
      el.className = canAfford ? 'ok' : 'err';
    }

    // ─── Deposit Modal ───
    function openDeposit() {
      document.getElementById('modal-title').textContent = '\u2795 Deposit Funds';
      document.getElementById('modal-desc').textContent = 'Add virtual funds to your trading account.';
      document.getElementById('modal-content').innerHTML = '<input class="modal-input" id="deposit-amount" type="number" min="1000" step="1000" placeholder="Amount (e.g. 50000)" style="margin-top:4px" />';
      document.getElementById('modal-btns').innerHTML =
        '<button class="modal-btn confirm" onclick="confirmDeposit()">Deposit</button>' +
        '<button class="modal-btn cancel" onclick="closeModal()">Cancel</button>';
      document.getElementById('modal-overlay').classList.add('show');
      setTimeout(() => document.getElementById('deposit-amount')?.focus(), 50);
    }
    function confirmDeposit() {
      const amt = parseFloat(document.getElementById('deposit-amount')?.value) || 0;
      if (amt <= 0) { showToast('Enter a valid amount'); return; }
      wallet += amt;
      persist(); renderWallet(); updateLivePriceBar(); closeModal();
      showToast('\u2705 Deposited \u20B9' + amt.toLocaleString('en-IN'));
    }

    // ─── Reset Modal ───
    function openReset() {
      document.getElementById('modal-title').textContent = '\u26A0\uFE0F Reset All Data';
      document.getElementById('modal-desc').textContent =
        'This will permanently delete your balance, all open positions, pending orders, and trade history. You will start fresh with \u20B91,00,000. This action cannot be undone.';
      document.getElementById('modal-content').innerHTML = '';
      document.getElementById('modal-btns').innerHTML =
        '<button class="modal-btn danger" onclick="confirmReset()">Yes, Reset Everything</button>' +
        '<button class="modal-btn cancel" onclick="closeModal()">Cancel</button>';
      document.getElementById('modal-overlay').classList.add('show');
    }
    function confirmReset() {
      wallet = 100000; positions = []; history = []; pendingOrders = [];
      drawings = []; planEntry = planSL = planTP = null;
      localStorage.removeItem('trade-wallet'); localStorage.removeItem('trade-pos');
      localStorage.removeItem('trade-hist'); localStorage.removeItem('trade-pending');
      persist(); renderWallet(); renderPositions(); renderHistory(); renderPendingOrders();
      updatePlanBox(); updateLivePriceBar(); renderAll(); closeModal();
      showToast('\uD83D\uDD04 Account reset — starting fresh with \u20B91,00,000');
    }
    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('show');
    }
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ═══ TRADING ═══
    function setOrderSide(side) {
      orderSide = side;
      document.getElementById('tab-buy').className = 'o-tab' + (side === 'buy' ? ' active-buy' : '');
      document.getElementById('tab-sell').className = 'o-tab' + (side === 'sell' ? ' active-sell' : '');
      const btn = document.getElementById('exec-btn');
      btn.className = side;
      btn.textContent = side === 'buy' ? 'BUY NOW' : 'SELL / SHORT NOW';
      updateMarginInfo();
    }

    document.getElementById('order-type').onchange = e => {
      document.getElementById('limit-price-wrap').style.display = e.target.value === 'limit' ? 'block' : 'none';
    };

    // FIX #5: Full short-selling support
    function executeOrder() {
      const qty = parseFloat(document.getElementById('qty-input').value);
      if (!qty || qty <= 0) { showToast('Enter valid quantity'); return; }
      const arr = getCandles(); const last = arr[arr.length - 1].c;
      const otype = document.getElementById('order-type').value;
      let execPrice = otype === 'limit' ? parseFloat(document.getElementById('limit-price').value) || last : last;
      const sl = planSL || null, tp = planTP || null;

      if (orderSide === 'buy') {
        const cost = execPrice * qty;
        if (cost > wallet) { showToast('Insufficient balance!'); return; }
        wallet -= cost;
        positions.push({ sym, side: 'buy', qty, entry: execPrice, sl, tp, t: Date.now() });
        showToast('\u2705 Bought ' + qty + ' ' + sym + ' @ ' + fmtP(execPrice) + (sl ? ' | SL+TP active' : ''));
      } else {
        const longIdx = positions.findIndex(p => p.sym === sym && p.side === 'buy');
        if (longIdx >= 0) {
          const pos = positions[longIdx];
          const pnl = (execPrice - pos.entry) * pos.qty;
          wallet += pos.qty * execPrice;
          history.unshift({ sym, side: 'sell', qty: pos.qty, entry: pos.entry, exit: execPrice, pnl, t: Date.now() });
          positions.splice(longIdx, 1);
          showToast((pnl >= 0 ? '\u2705' : '\u274C') + ' Closed long ' + pos.qty + ' ' + sym + ' | PnL: ' + (pnl >= 0 ? '+' : '') + fmtP(pnl));
        } else {
          const margin = execPrice * qty * 0.1;
          if (margin > wallet) { showToast('Insufficient margin for short!'); return; }
          wallet -= margin;
          positions.push({ sym, side: 'sell', qty, entry: execPrice, sl, tp, margin, t: Date.now() });
          showToast('\u2705 Shorted ' + qty + ' ' + sym + ' @ ' + fmtP(execPrice) + (sl ? ' | SL+TP active' : ''));
        }
      }
      persist(); renderWallet(); renderPositions(); renderHistory();
    }

    function closePosition(i) {
      const arr = getCandles(); const last = arr[arr.length - 1].c;
      const pos = positions[i];
      let pnl;
      if (pos.side === 'buy') {
        pnl = (last - pos.entry) * pos.qty;
        wallet += pos.qty * last;
      } else {
        pnl = (pos.entry - last) * pos.qty;
        wallet += (pos.margin || 0) + pnl;
      }
      history.unshift({ sym: pos.sym, side: pos.side === 'buy' ? 'sell' : 'buy_cover', qty: pos.qty, entry: pos.entry, exit: last, pnl, t: Date.now() });
      positions.splice(i, 1);
      persist(); renderWallet(); renderPositions(); renderHistory();
      showToast('Closed ' + pos.sym + ' ' + pos.side.toUpperCase() + ' | PnL: ' + (pnl >= 0 ? '+' : '') + fmtP(pnl));
    }

    function persist() {
      localStorage.setItem('trade-wallet', wallet);
      localStorage.setItem('trade-pos', JSON.stringify(positions.slice(0, 50)));
      localStorage.setItem('trade-hist', JSON.stringify(history.slice(0, 100)));
    }

    function renderWallet() {
      document.getElementById('wallet-val').textContent = '\u20B9' + Math.round(wallet).toLocaleString('en-IN');
      const balEl = document.getElementById('topbar-bal');
      if (balEl) balEl.textContent = '\u20B9' + Math.round(wallet).toLocaleString('en-IN');
    }

    function updatePositionsPnL() { renderPositions(); }

    function renderPositions() {
      const arr = getCandles(); const last = arr.length ? arr[arr.length - 1].c : 0;
      const wrap = document.getElementById('positions-wrap');
      if (!positions.length) { wrap.innerHTML = '<div style="color:var(--muted);font-size:.72rem;padding:6px">No open positions</div>'; return; }
      wrap.innerHTML = positions.map((p, i) => {
        const cur = p.sym === sym ? last : (ASSETS[p.sym]?.base || 0);
        const pnl = p.side === 'buy' ? (cur - p.entry) * p.qty : (p.entry - cur) * p.qty;
        const col = pnl >= 0 ? '#10b981' : '#ef4444';
        const sideLabel = p.side === 'buy' ? 'LONG' : 'SHORT';
        return `<div class="pos-card">
      <div class="pos-header"><span>${p.sym} <span style="color:${p.side === 'buy' ? '#10b981' : '#ef4444'};font-weight:600">${sideLabel}</span></span><button class="close-pos" onclick="closePosition(${i})">Close</button></div>
      <div class="pos-row"><span>Qty: ${p.qty}</span><span>Entry: ${fmtP(p.entry)}</span></div>
      <div class="pos-row" style="margin-top:3px"><span>Cur: ${fmtP(cur)}</span><span class="pos-pnl" style="color:${col}">${pnl >= 0 ? '+' : ''}${fmtP(pnl)}</span></div>
      ${p.sl ? `<div class="pos-row" style="margin-top:2px"><span style="color:#ef4444;font-size:.65rem">SL: ${fmtP(p.sl)}</span><span style="color:#fbbf24;font-size:.65rem">TP: ${fmtP(p.tp || 0) || '—'}</span></div>` : ''}
    </div>`;
      }).join('');
    }

    function renderHistory() {
      const wrap = document.getElementById('history-wrap');
      if (!history.length) { wrap.innerHTML = '<div style="color:var(--muted);font-size:.72rem;padding:6px">No trades yet</div>'; return; }
      wrap.innerHTML = history.slice(0, 20).map(h => {
        const col = h.pnl >= 0 ? '#10b981' : '#ef4444';
        return `<div class="hist-row"><span>${h.sym} ${h.side.toUpperCase()}</span><span style="color:${col}">${h.pnl >= 0 ? '+' : ''}${fmtP(h.pnl)}</span></div>`;
      }).join('');
    }

    // ═══ UTILS ═══
    // FIX #6: Correct forex price formatting
    function fmtP(p) {
      if (!p && p !== 0) return '—';
      const ap = Math.abs(p);
      const a = ASSETS[sym];
      if (a && a.cat === 'Forex') {
        return sym === 'USDJPY' ? p.toFixed(2) : p.toFixed(4);
      }
      if (ap < 0.01) return p.toFixed(6);
      if (ap < 1) return p.toFixed(4);
      if (ap < 100) return p.toFixed(2);
      if (ap < 10000) return p.toFixed(2);
      return p.toFixed(0);
    }

    // FIX: Time axis labels snap to real clock boundaries
    function fmtT(ts) {
      const d = new Date(ts);
      if (tf === '1d') return d.toLocaleDateString('en', { month: 'short', day: 'numeric' });
      if (tf === '4h') return (d.getMonth() + 1) + '/' + (d.getDate()) + ' ' + d.getHours().toString().padStart(2, '0') + 'h';
      if (tf === '1h') return (d.getMonth() + 1) + '/' + (d.getDate()) + ' ' + d.getHours().toString().padStart(2, '0') + ':00';
      return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
      clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ═══ INIT ═══
    buildAssetChips();
    renderWallet(); renderPositions(); renderHistory(); renderPendingOrders();
    resizeCanvases();
    updateLivePriceBar();
    liveInterval = setInterval(tickLive, 800);

    const stored = localStorage.getItem('theme');
    
  </script>
</body>

</html>
