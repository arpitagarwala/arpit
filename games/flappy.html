<!DOCTYPE html>
<html class="" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flappy Block – Arpit Agarwala</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#050812;font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;user-select:none;}
    canvas{border-radius:16px;border:1px solid rgba(34,211,238,0.1);box-shadow:0 0 40px rgba(34,211,238,0.08);}

    #back-link{position:fixed;top:16px;left:16px;z-index:50;width:38px;height:38px;border-radius:50%;background:rgba(5,10,25,0.85);backdrop-filter:blur(10px);border:1px solid rgba(34,211,238,0.2);color:rgba(147,210,255,0.7);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:18px;transition:all .2s;}
    #back-link:hover{border-color:rgba(34,211,238,0.5);color:#22d3ee;}

    #score-hud{position:fixed;top:16px;right:16px;z-index:20;background:rgba(5,10,25,0.85);backdrop-filter:blur(10px);border:1px solid rgba(34,211,238,0.15);border-radius:12px;padding:8px 16px;text-align:center;}
    .hud-label{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:rgba(34,211,238,0.45);margin-bottom:1px;}
    .hud-val{font-size:1.3rem;font-weight:900;color:#22d3ee;font-variant-numeric:tabular-nums;}
  </style>
</head>
<body>
  <!-- Uniform Back Button -->
<div style="position: fixed; top: 16px; left: 16px; z-index: 50; pointer-events: auto;">
  <a id="back-link" href="../games.html" style="width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.9); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: all 0.2s; text-decoration: none;" onmouseover="this.style.background='rgba(255,255,255,0.2)'; this.style.transform='scale(1.05)';" onmouseout="this.style.background='rgba(255,255,255,0.1)'; this.style.transform='scale(1)';">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414z"/></svg>
  </a>
</div>

  <div id="score-hud">
    <div class="hud-label">Score / Best</div>
    <div class="hud-val"><span id="sc">0</span> / <span id="best">0</span></div>
  </div>
  <canvas id="cvs"></canvas>

  <script>
  const cvs = document.getElementById('cvs');
  const ctx = cvs.getContext('2d');
  const BEST_KEY = 'flappy-best';

  let W, H, bird, pipes, score, best, state, frameN, particles;
  // states: 'idle' | 'play' | 'dead'
  best = parseInt(localStorage.getItem(BEST_KEY) || '0');

  function resize() {
    const sz = Math.min(window.innerWidth - 32, window.innerHeight - 100, 500);
    W = cvs.width  = Math.min(sz * 0.75, 360);
    H = cvs.height = sz;
  }
  window.addEventListener('resize', () => { resize(); if (state==='idle') drawIdle(); });
  resize();

  const GAP      = () => H * 0.24;
  const PIPE_W   = () => W * 0.12;   // BUG FIX: was a constant, stale after resize
  const BIRD_R   = () => W * 0.05;   // BUG FIX: same issue
  const PIPE_SPD = () => W * 0.006 + score * 0.004;

  function init() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; } // BUG FIX: prevent double-loop
    bird      = { x: W*0.25, y: H*0.5, vy: 0, angle: 0 };
    pipes     = [];
    particles = [];
    score     = 0;
    frameN    = 0;
    state     = 'idle';
    document.getElementById('sc').textContent   = 0;
    document.getElementById('best').textContent = best;
    drawIdle();
  }

  function flap() {
    if (state === 'dead') { init(); return; }
    if (state === 'idle') { state = 'play'; rafId = requestAnimationFrame(loop); }
    bird.vy = -H * 0.022;
  }

  // ── Events ── BUG FIX: only fire flap on canvas clicks, not back/hud buttons
  document.addEventListener('keydown', e => { if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }});
  cvs.addEventListener('mousedown', () => flap());
  document.addEventListener('touchstart', e => {
    if (e.target === cvs || e.target === document.body) { e.preventDefault(); flap(); }
  }, {passive:false});

  // ── Idle screen ──
  function drawIdle() {
    ctx.clearRect(0, 0, W, H);
    drawBg();
    // Draw sample pipes
    ctx.globalAlpha = 0.3;
    drawPipeAt(W*0.6, H*0.35);
    ctx.globalAlpha = 1;
    // Bird
    drawBird(W*0.25, H*0.5, 0);
    // Text
    ctx.fillStyle = 'rgba(34,211,238,0.9)';
    ctx.font = `bold ${W*0.07}px Inter`;
    ctx.textAlign = 'center';
    ctx.fillText('Flappy Block', W/2, H*0.42);
    ctx.fillStyle = 'rgba(148,163,184,0.6)';
    ctx.font = `${W*0.04}px Inter`;
    ctx.fillText('Tap / Space to start', W/2, H*0.5);
    ctx.textAlign = 'left';
  }

  let rafId;
  function loop() {
    if (state !== 'play') { rafId = null; return; }
    rafId = requestAnimationFrame(loop);

    const PW = PIPE_W(), BR = BIRD_R();

    // Gravity
    bird.vy += H * 0.001;
    bird.y  += bird.vy;
    bird.angle = Math.min(Math.max(bird.vy / (H*0.03), -0.4), 1.2);

    // Spawn pipes
    if (frameN % Math.max(60, 90 - score * 2) === 0) {
      const y = H * 0.25 + Math.random() * H * 0.5;
      pipes.push({ x: W + PW, y, passed: false });
    }

    // Move pipes
    const spd = PIPE_SPD();
    pipes.forEach(p => {
      p.x -= spd;
      if (!p.passed && p.x + PW < bird.x - BR) {
        p.passed = true; score++;
        document.getElementById('sc').textContent = score;
        if (score > best) { best = score; localStorage.setItem(BEST_KEY, best); document.getElementById('best').textContent = best; }
      }
    });
    pipes = pipes.filter(p => p.x > -PW - 10);

    // Collision
    const g = GAP();
    const dead = bird.y - BR < 0 || bird.y + BR > H ||
      pipes.some(p =>
        bird.x + BR * 0.8 > p.x && bird.x - BR * 0.8 < p.x + PW &&
        (bird.y - BR * 0.8 < p.y - g/2 || bird.y + BR * 0.8 > p.y + g/2)
      );

    if (dead) { die(); return; }

    // Particles
    if (frameN % 4 === 0) particles.push({ x: bird.x - BR, y: bird.y + (Math.random()-0.5)*8, vx: -2, vy: (Math.random()-0.5)*2, life: 20 });
    particles = particles.filter(p => { p.x+=p.vx; p.y+=p.vy; p.life--; return p.life>0; });

    frameN++;
    draw();
  }

  function die() {
    state = 'dead';
    drawDeadScreen();
  }

  // ── Drawing ──
  function drawBg() {
    // Dark sky gradient
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#050812');
    grad.addColorStop(1, '#0a1628');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // Stars
    ctx.fillStyle = 'rgba(200,220,255,0.4)';
    for (let i = 0; i < 40; i++) {
      ctx.beginPath();
      ctx.arc((i*137.5)%W, (i*93.1)%H, 0.8, 0, Math.PI*2);
      ctx.fill();
    }
    // Ground
    ctx.fillStyle = 'rgba(34,211,238,0.07)';
    ctx.fillRect(0, H-4, W, 4);
  }

  function drawPipeAt(x, y) {
    const g = GAP(), PW = PIPE_W();
    // Top pipe
    const topGrad = ctx.createLinearGradient(x, 0, x+PW, 0);
    topGrad.addColorStop(0, '#0e4f5c');
    topGrad.addColorStop(1, '#155e75');
    ctx.fillStyle = topGrad;
    roundRect(ctx, x, 0, PW, y - g/2, [0,0,8,8]);
    ctx.fill();
    // pipe cap
    ctx.fillStyle = '#22d3ee';
    ctx.globalAlpha *= 0.8;
    roundRect(ctx, x-3, y-g/2-14, PW+6, 14, [0,0,6,6]);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Bottom pipe
    const botGrad = ctx.createLinearGradient(x, 0, x+PW, 0);
    botGrad.addColorStop(0, '#0e4f5c');
    botGrad.addColorStop(1, '#155e75');
    ctx.fillStyle = botGrad;
    roundRect(ctx, x, y+g/2, PW, H-(y+g/2), [8,8,0,0]);
    ctx.fill();
    ctx.fillStyle = '#22d3ee';
    ctx.globalAlpha *= 0.8;
    roundRect(ctx, x-3, y+g/2, PW+6, 14, [6,6,0,0]);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  function roundRect(ctx, x, y, w, h, r) {
    if (!Array.isArray(r)) r = [r,r,r,r];
    ctx.beginPath();
    ctx.moveTo(x+r[0], y);
    ctx.lineTo(x+w-r[1], y);       ctx.arcTo(x+w, y, x+w, y+r[1], r[1]);
    ctx.lineTo(x+w, y+h-r[2]);     ctx.arcTo(x+w, y+h, x+w-r[2], y+h, r[2]);
    ctx.lineTo(x+r[3], y+h);       ctx.arcTo(x, y+h, x, y+h-r[3], r[3]);
    ctx.lineTo(x, y+r[0]);         ctx.arcTo(x, y, x+r[0], y, r[0]);
    ctx.closePath();
  }

  function drawBird(x, y, angle) {
    const BR = BIRD_R();
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    // Glow
    ctx.shadowBlur = 16; ctx.shadowColor = '#22d3ee';
    // Body
    const bg = ctx.createRadialGradient(-BR*0.3, -BR*0.3, 1, 0, 0, BR);
    bg.addColorStop(0, '#67e8f9');
    bg.addColorStop(1, '#0891b2');
    ctx.fillStyle = bg;
    roundRect(ctx, -BR, -BR, BR*2, BR*2, BR*0.4);
    ctx.fill();
    // Eye
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(BR*0.3, -BR*0.25, BR*0.28, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#0c4a6e';
    ctx.beginPath(); ctx.arc(BR*0.38, -BR*0.22, BR*0.14, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawBg();

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life / 20 * 0.5;
      ctx.fillStyle = '#22d3ee';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    pipes.forEach(p => drawPipeAt(p.x, p.y));
    drawBird(bird.x, bird.y, bird.angle);

    // Score
    ctx.shadowBlur = 10; ctx.shadowColor = '#22d3ee';
    ctx.fillStyle = '#e2e8f0';
    ctx.font = `bold ${W*0.1}px Inter`;
    ctx.textAlign = 'center';
    ctx.fillText(score, W/2, W*0.12);
    ctx.shadowBlur = 0;
    ctx.textAlign = 'left';
  }

  function drawDeadScreen() {
    draw();
    ctx.fillStyle = 'rgba(5,8,18,0.72)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#f87171';
    ctx.font = `bold ${W*0.09}px Inter`;
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H*0.38);
    ctx.fillStyle = 'rgba(148,163,184,0.7)';
    ctx.font = `${W*0.045}px Inter`;
    ctx.fillText(`Score: ${score}`, W/2, H*0.46);
    ctx.fillText(`Best: ${best}`, W/2, H*0.52);
    ctx.fillStyle = '#22d3ee';
    ctx.font = `bold ${W*0.05}px Inter`;
    ctx.fillText('Tap to Restart', W/2, H*0.62);
    ctx.textAlign = 'left';
  }

  // Back link
  const stored = localStorage.getItem('theme');
  document.getElementById('back-link').href = `../games.html?theme=${stored==='dark'?'dark':'light'}`;

  init();
  </script>
</body>
</html>
