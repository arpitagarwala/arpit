<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro XP Tracker</title>
  
  <script>
    (function () {
      var param = new URLSearchParams(window.location.search).get('theme');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = param || stored || (prefersDark ? 'dark' : 'light');
      if (theme === 'dark') document.documentElement.classList.add('dark');
      else document.documentElement.classList.remove('dark');
      localStorage.setItem('theme', theme);
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class'}</script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">

  <style>
    body { font-family: 'Inter', sans-serif; }
    .glass { backdrop-filter: blur(12px); }
    .xp-bar { background: linear-gradient(90deg, #3b82f6 0%, #a855f7 100%); transition: width 0.5s ease-in-out; }
    .neon-glow { text-shadow: 0 0 20px rgba(168, 85, 247, 0.4); }
  </style>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300 flex items-center justify-center p-4 relative pt-16">

  <!-- BACK + THEME -->
  <div class="fixed top-4 left-4 z-[100]">
    <a href="projects.html" class="internal-link w-10 h-10 flex items-center justify-center rounded-full bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-slate-200 dark:border-slate-700 hover:text-cyan-500 shadow-lg transition-all text-slate-700 dark:text-slate-300">
      <i class="ri-arrow-left-line text-lg"></i>
    </a>
  </div>
  <div class="fixed top-4 right-4 z-[100]">
    <button onclick="toggleTheme()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/90 dark:bg-slate-800/90 backdrop-blur border border-slate-200 dark:border-slate-700 hover:text-cyan-500 shadow-lg transition-all text-slate-700 dark:text-slate-300">
      <i id="theme-icon" class="text-lg"></i>
    </button>
  </div>

  <div x-data="pomoGame()" x-init="init()" class="max-w-xl w-full">
    
    <!-- User Stats -->
    <div class="bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 glass p-6 rounded-3xl mb-6 flex items-center gap-6 shadow-xl relative overflow-hidden">
      <div class="absolute -right-10 -top-10 w-32 h-32 bg-purple-500 rounded-full blur-[80px] opacity-20"></div>
      
      <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg relative shrink-0">
        <i class="ri-fire-fill text-4xl text-white"></i>
        <div class="absolute -bottom-2 -right-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 w-8 h-8 rounded-full flex items-center justify-center font-black text-sm" x-text="level"></div>
      </div>
      
      <div class="flex-1 w-full">
        <div class="flex justify-between items-end mb-2">
          <div>
            <h2 class="text-xl font-extrabold tracking-tight">Focus Mastery</h2>
            <div class="text-xs text-slate-500 dark:text-slate-400 font-bold tracking-wider uppercase">Rank: <span x-text="rankName" class="text-purple-600 dark:text-purple-400"></span></div>
          </div>
          <div class="text-right">
            <span class="text-sm font-bold"><span x-text="xp"></span> / <span x-text="nextLevelXp"></span> XP</span>
          </div>
        </div>
        
        <div class="w-full h-3 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden relative">
          <div class="h-full xp-bar" :style="`width: ${(xp / nextLevelXp) * 100}%`"></div>
        </div>
      </div>
    </div>

    <!-- Timer Central -->
    <div class="bg-white/80 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 glass p-8 sm:p-10 rounded-3xl text-center shadow-xl relative overflow-hidden">
      
      <!-- Settings Panel -->
      <div class="absolute top-4 right-4 z-20">
        <button @click="showSettings = !showSettings" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition"><i class="ri-settings-4-fill text-xl"></i></button>
      </div>
      
      <!-- Settings Modal inline -->
      <div x-show="showSettings" x-transition class="absolute top-12 right-4 bg-white dark:bg-slate-700 border border-slate-200 dark:border-slate-600 p-4 rounded-xl shadow-2xl z-20 text-left w-48">
        <div class="mb-3">
          <label class="block text-[10px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase mb-1">Focus Mins</label>
          <input type="number" x-model.number="confFocus" @change="applySettings" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded px-2 py-1 text-sm font-bold outline-none">
        </div>
        <div>
          <label class="block text-[10px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase mb-1">Break Mins</label>
          <input type="number" x-model.number="confBreak" @change="applySettings" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-600 rounded px-2 py-1 text-sm font-bold outline-none">
        </div>
      </div>

      <div class="inline-flex gap-2 p-1.5 bg-slate-100 dark:bg-slate-800/80 border border-slate-200 dark:border-slate-700/50 rounded-2xl mb-8 relative z-10">
        <button @click="setMode('focus')" :class="mode === 'focus' ? 'bg-indigo-500 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-white'" class="px-5 py-2 rounded-xl text-sm font-bold transition">Focus (<span x-text="confFocus"></span>m)</button>
        <button @click="setMode('break')" :class="mode === 'break' ? 'bg-emerald-500 text-white shadow-md' : 'text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-white'" class="px-5 py-2 rounded-xl text-sm font-bold transition">Break (<span x-text="confBreak"></span>m)</button>
      </div>

      <h1 class="text-7xl sm:text-9xl font-black font-mono tracking-tighter mb-8 text-indigo-900 dark:text-white dark:neon-glow" x-text="formattedTime"></h1>

      <div class="flex justify-center gap-4 relative z-10 w-full max-w-[200px] mx-auto">
        <button @click="toggleTimer" class="flex-1 py-4 bg-slate-100 dark:bg-white/10 hover:bg-slate-200 dark:hover:bg-white/20 active:bg-slate-300 dark:active:bg-white/5 border border-slate-200 dark:border-white/10 backdrop-blur rounded-2xl shadow-md transition-all flex items-center justify-center text-3xl font-bold dark:text-white">
          <i :class="isRunning ? 'ri-pause-circle-fill' : 'ri-play-circle-fill'"></i>
        </button>
        <button @click="resetTimer" class="w-16 h-[68px] bg-rose-50 dark:bg-rose-500/10 hover:bg-rose-100 dark:hover:bg-rose-500/20 active:bg-rose-200 border border-rose-200 dark:border-rose-500/30 text-rose-500 rounded-2xl shadow-md transition-all flex items-center justify-center text-2xl">
          <i class="ri-refresh-line"></i>
        </button>
      </div>

    </div>

    <!-- Streak Box -->
    <div class="grid grid-cols-2 gap-4 mt-6">
      <div class="bg-white/80 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-5 flex items-center justify-between shadow-xl glass">
        <div>
          <div class="text-[10px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase mb-1">Total Focus</div>
          <div class="text-2xl font-black font-mono"><span x-text="totalMins"></span>m</div>
        </div>
        <i class="ri-timer-line text-3xl text-indigo-500 dark:text-indigo-400/50"></i>
      </div>
      <div class="bg-white/80 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700/50 rounded-2xl p-5 flex items-center justify-between shadow-xl glass">
        <div>
          <div class="text-[10px] font-bold tracking-widest text-slate-500 dark:text-slate-400 uppercase mb-1">Sessions</div>
          <div class="text-2xl font-black font-mono" x-text="sessions"></div>
        </div>
        <i class="ri-check-double-line text-3xl text-emerald-500 dark:text-emerald-400/50"></i>
      </div>
    </div>
  </div>

  <script>
    function syncIcon() {
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('theme-icon').className = isDark ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg';
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      syncIcon();
      
      // Sync links
      const thm = isDark ? 'dark' : 'light';
      document.querySelectorAll('a.internal-link').forEach(a => {
        const url = new URL(a.href, location.href);
        url.searchParams.set('theme', thm);
        a.href = url.toString();
      });
    }
    document.addEventListener('DOMContentLoaded', () => {
      syncIcon();
      const thm = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
      document.querySelectorAll('a.internal-link').forEach(a => {
        const url = new URL(a.href, location.href);
        url.searchParams.set('theme', thm);
        a.href = url.toString();
      });
    });

    function pomoGame() {
      return {
        level: parseInt(localStorage.getItem('pomo_level')) || 1,
        xp: parseInt(localStorage.getItem('pomo_xp')) || 0,
        totalMins: parseInt(localStorage.getItem('pomo_mins')) || 0,
        sessions: parseInt(localStorage.getItem('pomo_sessions')) || 0,
        
        confFocus: parseInt(localStorage.getItem('pomo_c_f')) || 25,
        confBreak: parseInt(localStorage.getItem('pomo_c_b')) || 5,
        
        mode: 'focus',
        timeLeft: 25 * 60,
        isRunning: false,
        timerInt: null,
        showSettings: false,
        
        init() {
          this.checkLevel();
          this.timeLeft = this.confFocus * 60;
        },

        applySettings() {
          if(this.confFocus < 1) this.confFocus = 1;
          if(this.confBreak < 1) this.confBreak = 1;
          localStorage.setItem('pomo_c_f', this.confFocus);
          localStorage.setItem('pomo_c_b', this.confBreak);
          
          if(!this.isRunning) {
             this.timeLeft = this.mode === 'focus' ? this.confFocus * 60 : this.confBreak * 60;
          }
        },

        get formattedTime() {
          const m = Math.floor(this.timeLeft / 60).toString().padStart(2, '0');
          const s = (this.timeLeft % 60).toString().padStart(2, '0');
          return `${m}:${s}`;
        },

        get nextLevelXp() {
          return this.level * 100 + 50; 
        },

        get rankName() {
          if(this.level < 5) return 'Novice';
          if(this.level < 10) return 'Apprentice';
          if(this.level < 20) return 'Adept';
          if(this.level < 35) return 'Expert';
          return 'Grandmaster';
        },

        setMode(mod) {
          if(this.isRunning) this.toggleTimer();
          this.mode = mod;
          this.timeLeft = mod === 'focus' ? this.confFocus * 60 : this.confBreak * 60;
        },

        toggleTimer() {
          if(this.isRunning) {
            clearInterval(this.timerInt);
            this.isRunning = false;
          } else {
            this.isRunning = true;
            this.timerInt = setInterval(() => {
              this.timeLeft--;
              if(this.timeLeft <= 0) {
                this.completeSession();
              }
            }, 1000);
          }
        },

        resetTimer() {
          if(this.isRunning) this.toggleTimer();
          this.timeLeft = this.mode === 'focus' ? this.confFocus * 60 : this.confBreak * 60;
        },

        completeSession() {
          clearInterval(this.timerInt);
          this.isRunning = false;
          
          if(this.mode === 'focus') {
            // XP scale based on minutes actually tracked
            const earnedXp = (this.confFocus * 4) + Math.floor(Math.random() * 10);
            this.xp += earnedXp;
            this.totalMins += this.confFocus;
            this.sessions++;
            
            alert(`Focus complete! +${earnedXp} XP`);
            
            this.checkLevel();
            this.saveData();
            this.setMode('break');
          } else {
            alert('Break complete! Back to focus.');
            this.setMode('focus');
          }
        },

        checkLevel() {
          while(this.xp >= this.nextLevelXp) {
            this.xp -= this.nextLevelXp;
            this.level++;
          }
          this.saveData();
        },

        saveData() {
          localStorage.setItem('pomo_level', this.level);
          localStorage.setItem('pomo_xp', this.xp);
          localStorage.setItem('pomo_mins', this.totalMins);
          localStorage.setItem('pomo_sessions', this.sessions);
        }
      }
    }
  </script>
</body>
</html>
