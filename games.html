<body class="transition-colors duration-300 overflow-x-hidden bg-slate-950 text-slate-200">
  <!-- Shared Background Blobs -->

    <a id="back-link" href="index.html" class="w-10 h-10 flex items-center justify-center rounded-full backdrop-blur border transition-all shadow-lg hover:scale-105 active:scale-95 bg-slate-800/50 border-slate-700/50 hover:bg-slate-700/80 text-white">

  </div>

  <div class="max-w-6xl mx-auto px-4 sm:px-8 pt-10 pb-12">
    <!-- Integrated Premium Header -->
    <div class="mb-8 fade-up">
      <div class="flex flex-col sm:flex-row sm:items-end gap-4 mb-6">
        <div>
          <h1 class="text-4xl sm:text-5xl font-black tracking-tight leading-none" style="background:linear-gradient(135deg,#10b981,#22d3ee,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Games</h1>
          <div class="shimmer-underline" style="height:3px;width:72px;background:linear-gradient(90deg,#10b981,#22d3ee);border-radius:99px;margin-top:6px;"></div>
        </div>
        <p class="text-sm max-w-lg pb-1 leading-relaxed text-slate-400">Fully playable browser games — classics rebuilt with physics, AI, and neon aesthetics.</p>
      </div>

      <!-- Compact Search & Stats Row -->
      <div class="flex flex-wrap gap-4 items-center">
        <div class="flex items-center gap-2 text-xs font-bold px-3 py-1.5 rounded-xl border text-slate-400 bg-slate-800/40 border-slate-700/30">
          <i class="ri-gamepad-fill text-cyan-500"></i>
          <span id="total-count">0</span> Titles Total
        </div>
        <div class="relative flex-1 max-w-sm">
          <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-sm pointer-events-none text-slate-500"></i>
          <input id="search-input" type="text" placeholder="Search games archive..."
            class="w-full pl-9 pr-8 py-2.5 rounded-xl border text-sm focus:outline-none transition-colors shadow-sm bg-slate-800 text-slate-100 placeholder-slate-500 border-slate-700/50 focus:border-cyan-500"
            oninput="handleSearch()" />
          <button id="clear-btn" onclick="clearSearch()" class="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 hidden"><i class="ri-close-line text-sm"></i></button>
        </div>
      </div>
    </div>

    <!-- Genre Filters -->
    <div class="flex flex-wrap gap-2 mb-5" id="genre-filters">
      <button onclick="setGenre('all',this)" class="genre-chip active-chip px-4 py-1.5 rounded-full text-xs font-700 border border-cyan-500/40 bg-cyan-500/10 cursor-pointer transition-all text-cyan-400">All</button>
    </div>

    <!-- Grid -->
    <div id="games-grid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-2.5"></div>

    <!-- Empty State -->
    <div id="no-results" class="flex-col items-center justify-center py-16 text-center hidden">
      <i class="ri-search-eye-line text-4xl mb-3 text-slate-600"></i>
      <h3 class="text-lg font-bold mb-2 text-slate-400">No games found.</h3>
      <p class="text-sm mb-3 text-slate-500">Try a different filter or search.</p>
      <button onclick="clearSearch()" class="text-sm hover:underline font-medium text-cyan-400">Clear</button>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center py-3.5 px-6 rounded-2xl border text-sm bg-slate-800/50 border-slate-700/30 text-slate-500">
      &copy; 2026 Arpit Agarwala. Engineered with <span class="text-red-400">&#10084;&#65039;</span>
    </div>
  </div>

  <script>
    const $ = id => document.getElementById(id);
    const GAMES = [
      {
        href: 'games/2048.html', title: '2048',
        sub: 'Slide & merge number tiles',
        icon: 'ri-grid-fill', gradient: 'from-orange-400 to-amber-500',
        genre: 'Puzzle', featured: true, players: '1',
        tags: ['Brain', 'Logic', 'Undo', 'Swipe']
      },
      {
        href: 'games/asteroids.html', title: 'Asteroids',
        sub: 'Blast space rocks to survive',
        icon: 'ri-rocket-line', gradient: 'from-slate-500 to-blue-900',
        genre: 'Arcade', featured: true, players: '1',
        tags: ['Physics', 'Survival', 'Waves']
      },
      {
        href: 'games/city-builder.html', title: 'City Builder',
        sub: 'Design a futuristic neon city',
        icon: 'ri-building-line', gradient: 'from-blue-600 to-indigo-800',
        genre: 'Simulation', featured: true, players: '1',
        tags: ['Strategy', 'Builder', 'Real-time']
      },
      {
        href: 'games/flappy.html', title: 'Flappy Block',
        sub: 'Neon endless flyer',
        icon: 'ri-arrow-up-circle-line', gradient: 'from-cyan-500 to-blue-600',
        genre: 'Arcade', featured: true, players: '1',
        tags: ['Endless', 'Skill', 'High Score']
      },
      {
        href: 'games/memory.html', title: 'Memory Cards',
        sub: 'Match emoji pairs vs timer',
        icon: 'ri-stack-line', gradient: 'from-violet-500 to-purple-600',
        genre: 'Memory', featured: true, players: '1',
        tags: ['Solo', 'Brain', 'Combos']
      },
      {
        href: 'games/clicker.html', title: 'Money Clicker',
        sub: 'CA-themed idle empire',
        icon: 'ri-coin-line', gradient: 'from-amber-400 to-orange-500',
        genre: 'Idle', featured: true, players: '1',
        tags: ['Finance', 'Idle', 'Strategy']
      },
      {
        href: 'games/pong.html', title: 'Pong',
        sub: 'Classic neon arcade paddle',
        icon: 'ri-ping-pong-line', gradient: 'from-fuchsia-600 to-purple-600',
        genre: 'Arcade', featured: false, players: '1',
        tags: ['Classic', 'Action', 'vs AI']
      },
      {
        href: 'games/asmr-rain.html', title: 'Rain ASMR',
        sub: 'Immersive ambient relaxation',
        icon: 'ri-heavy-showers-line', gradient: 'from-blue-400 to-cyan-500',
        genre: 'ASMR', featured: true, players: '1',
        tags: ['Relax', 'Ambient', 'Fullscreen']
      },
      {
        href: 'games/snake.html', title: 'Snake',
        sub: 'Neon glow retro classic',
        icon: 'ri-guide-fill', gradient: 'from-emerald-400 to-green-600',
        genre: 'Arcade', featured: true, players: '1',
        tags: ['Classic', 'Skill', 'Mobile']
      },
      {
        href: 'games/sudoku.html', title: 'Sudoku',
        sub: 'Logic puzzles with hints',
        icon: 'ri-pencil-ruler-2-line', gradient: 'from-teal-400 to-emerald-500',
        genre: 'Puzzle', featured: true, players: '1',
        tags: ['Logic', 'Notes Mode', 'Timer']
      },
      {
        href: 'games/tictactoe.html', title: 'Tic Tac Toe',
        sub: '2P or vs Minimax AI',
        icon: 'ri-layout-grid-line', gradient: 'from-cyan-500 to-blue-600',
        genre: 'Classic', featured: true, players: '1-2',
        tags: ['2 Player', 'vs AI', 'Strategy']
      },
      {
        href: 'games/market-sim.html', title: 'Trading Sim',
        sub: 'Virtual stock market game',
        icon: 'ri-stock-line', gradient: 'from-emerald-500 to-teal-600',
        genre: 'Simulation', featured: true, players: '1',
        tags: ['Finance', 'Trading', 'Real-time']
      }
    ];

    let activeSearch = '', activeGenre = 'all';

    function buildGenreFilters() {
      const genres = ['all', ...new Set(GAMES.map(g => g.genre))];
      const bar = document.getElementById('genre-filters');
      bar.innerHTML = genres.map(g => `
        <button onclick="setGenre('${g}',this)" class="genre-chip px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all ${g==='all' ? 'border-cyan-500/40 bg-cyan-500/10 text-cyan-400 active-chip' : 'border-slate-700/50 bg-slate-800 text-slate-400 hover:border-cyan-400/50 hover:text-cyan-400'}">${g==='all'?'All':g}</button>
      `).join('');
    }

    function setGenre(g, btn) {
      activeGenre = g;
      document.querySelectorAll('.genre-chip').forEach(b => {
        const isActive = b.textContent.trim() === (g==='all'?'All':g);
        b.className = `genre-chip px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all ${isActive
          ? 'border-cyan-500/40 bg-cyan-500/10 text-cyan-400 active-chip'
          : 'border-slate-700/50 bg-slate-800 text-slate-400 hover:border-cyan-400/50 hover:text-cyan-500'}`;
      });
      renderGames();
    }

    function renderGames() {
      const grid    = document.getElementById('games-grid');
      const noRes   = document.getElementById('no-results');
      const totalEl    = $('total-count');
      const query      = activeSearch.toLowerCase().trim();

      const filtered = GAMES.filter(g => {
        const matchGenre = activeGenre === 'all' || g.genre === activeGenre;
        const matchQ = !query || g.title.toLowerCase().includes(query)
          || g.sub.toLowerCase().includes(query)
          || g.tags.some(t => t.toLowerCase().includes(query))
          || g.genre.toLowerCase().includes(query);
        return matchGenre && matchQ;
      });

      if (totalEl) totalEl.innerText = GAMES.length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noRes.classList.remove('hidden'); noRes.classList.add('flex');
        return;
      }
      noRes.classList.add('hidden'); noRes.classList.remove('flex');

      grid.innerHTML = filtered.map((g, i) => `
        <a href="${g.href}" class="stagger-item group backdrop-blur-md rounded-2xl border shadow-sm hover:shadow-xl p-5 flex flex-col items-center text-center transition-all duration-300 bg-slate-800/40 border-slate-700/50 hover:border-cyan-400" style="--delay: ${i*50}ms">
          <div class="w-14 h-14 rounded-2xl bg-gradient-to-br ${g.gradient} flex items-center justify-center shadow-lg mb-4 group-hover:scale-110 group-hover:rotate-3 transition-transform duration-300">
            <i class="${g.icon} text-2xl text-white"></i>
          </div>
          <h2 class="text-xs font-bold mb-0.5 leading-tight text-slate-100">${g.title}</h2>
          <p class="text-[10px] leading-snug text-slate-500">${g.sub}</p>
        </a>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderGames();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = ''; activeGenre = 'all';
      document.getElementById('clear-btn').classList.add('hidden');
      buildGenreFilters();
      renderGames();
    }

      buildGenreFilters(); renderGames();

  </script>
</body>
