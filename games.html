  <!--
    THEME INIT (runs before render to avoid flash)
    Convention: .dark on <html> = dark theme visually.
    localStorage 'theme' = 'dark' | 'light'.
    ?theme= URL param overrides on first load (cross-page sync).
  -->
  <script>
    (function () {
      var param = new URLSearchParams(window.location.search).get('theme');
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

      var theme;
      if (param === 'dark' || param === 'light') {
        theme = param;
        localStorage.setItem('theme', theme);
      } else if (stored === 'dark' || stored === 'light') {
        theme = stored;
      } else {
        theme = prefersDark ? 'dark' : 'light';
      }

      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>

  <script>
    const GAMES = [

      },

        icon: 'ri-coin-line', gradient: 'from-amber-400 to-orange-500',
        genre: 'Idle', featured: true, players: '1',
        tags: ['Finance', 'Idle', 'Strategy']
      },
      {
        href: 'assets/games/pong.html', title: 'Pong',
        sub: 'Classic neon arcade paddle',
        icon: 'ri-ping-pong-line', gradient: 'from-fuchsia-600 to-purple-600',
        genre: 'Arcade', featured: false, players: '1',
        tags: ['Classic', 'Action', 'vs AI']
      },
      {
        href: 'assets/games/asmr-rain.html', title: 'Rain ASMR',
        sub: 'Immersive ambient relaxation',
        icon: 'ri-heavy-showers-line', gradient: 'from-blue-400 to-cyan-500',
        genre: 'ASMR', featured: true, players: '1',
        tags: ['Relax', 'Ambient', 'Fullscreen']
      },
      {
        href: 'assets/games/snake.html', title: 'Snake',
        sub: 'Neon glow retro classic',
        icon: 'ri-guide-fill', gradient: 'from-emerald-400 to-green-600',
        genre: 'Arcade', featured: true, players: '1',
        tags: ['Classic', 'Skill', 'Mobile']
      },
      {
        href: 'assets/games/sudoku.html', title: 'Sudoku',
        sub: 'Logic puzzles with hints',
        icon: 'ri-pencil-ruler-2-line', gradient: 'from-teal-400 to-emerald-500',
        genre: 'Puzzle', featured: true, players: '1',
        tags: ['Logic', 'Notes Mode', 'Timer']
      },

        href: 'tictactoe.html', title: 'Tic Tac Toe',
        sub: '2P or vs Minimax AI',
        icon: 'ri-layout-grid-line', gradient: 'from-cyan-500 to-blue-600',
        genre: 'Classic', featured: true, players: '1-2',
        tags: ['2 Player', 'vs AI', 'Strategy']
      },
      {
        href: 'market-sim.html', title: 'Trading Sim',
        sub: 'Virtual stock market game',
        icon: 'ri-stock-line', gradient: 'from-emerald-500 to-teal-600',
        genre: 'Simulation', featured: true, players: '1',
        tags: ['Finance', 'Trading', 'Real-time']
      }
    ];

    let activeSearch = '', activeGenre = 'all';

    function buildGenreFilters() {
      const genres = ['all', ...new Set(GAMES.map(g => g.genre))];
      const bar = document.getElementById('genre-filters');
      bar.innerHTML = genres.map(g => `
        <button onclick="setGenre('${g}',this)" class="genre-chip ${g==='all'?'active-chip':''} px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all
          ${g==='all' ? 'border-cyan-500/40 bg-cyan-500/10 text-cyan-600 dark:text-cyan-400' : 'border-gray-200 dark:border-slate-700/50 bg-white dark:bg-slate-800 text-gray-500 dark:text-slate-400 hover:border-cyan-400/50 hover:text-cyan-500'}">${g==='all'?'All':g}</button>
      `).join('');
    }

    function setGenre(g, btn) {
      activeGenre = g;
      document.querySelectorAll('.genre-chip').forEach(b => {
        const isActive = b.textContent.trim() === (g==='all'?'All':g);
        b.className = `genre-chip px-4 py-1.5 rounded-full text-xs font-semibold border cursor-pointer transition-all ${isActive
          ? 'border-cyan-500/40 bg-cyan-500/10 text-cyan-600 dark:text-cyan-400 active-chip'
          : 'border-gray-200 dark:border-slate-700/50 bg-white dark:bg-slate-800 text-gray-500 dark:text-slate-400 hover:border-cyan-400/50 hover:text-cyan-500'}`;
      });
      renderGames();
    }

    function renderGames() {
      const grid    = document.getElementById('games-grid');
      const noRes   = document.getElementById('no-results');
      const totalEl = document.getElementById('total-count');
      const featuredEl = document.getElementById('featured-count');
      const q       = activeSearch.toLowerCase().trim();

      const filtered = GAMES.filter(g => {
        const matchGenre = activeGenre === 'all' || g.genre === activeGenre;
        const matchQ = !q || g.title.toLowerCase().includes(q)
          || g.sub.toLowerCase().includes(q)
          || g.tags.some(t => t.toLowerCase().includes(q))
          || g.genre.toLowerCase().includes(q);
        return matchGenre && matchQ;
      });

      totalEl.textContent = GAMES.length;
      if (featuredEl) featuredEl.textContent = GAMES.filter(g=>g.featured).length;

      if (filtered.length === 0) {
        grid.innerHTML = '';
        noRes.classList.remove('hidden'); noRes.classList.add('flex');
        return;
      }
      noRes.classList.add('hidden'); noRes.classList.remove('flex');

      grid.innerHTML = filtered.map((g, i) => `
        <a href="${g.href}" class="group bg-white dark:bg-slate-800 rounded-xl border border-gray-200 dark:border-slate-700/50 hover:border-cyan-500 dark:hover:border-cyan-400 shadow-sm hover:shadow-lg p-4 flex flex-col items-center text-center transition-all duration-200" style="animation:fadeUp .35s ease ${i*40}ms both">
          <div class="w-12 h-12 rounded-2xl bg-gradient-to-br ${g.gradient} flex items-center justify-center shadow-lg mb-3 group-hover:scale-110 transition-transform duration-200">
            <i class="${g.icon} text-2xl text-white"></i>
          </div>
          <h2 class="text-xs font-bold text-gray-900 dark:text-slate-100 mb-0.5 leading-tight">${g.title}</h2>
          <p class="text-[10px] text-gray-400 dark:text-slate-500 leading-snug">${g.sub}</p>
        </a>
      `).join('');
    }

    function handleSearch() {
      activeSearch = document.getElementById('search-input').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !activeSearch);
      renderGames();
    }

    function clearSearch() {
      document.getElementById('search-input').value = '';
      activeSearch = ''; activeGenre = 'all';
      document.getElementById('clear-btn').classList.add('hidden');
      buildGenreFilters();
      renderGames();
    }

    /* ── Theme helpers ── */
    function isDark() { return document.documentElement.classList.contains('dark'); }
    function syncIcon() { document.getElementById('theme-icon').className = isDark() ? 'ri-sun-line text-lg' : 'ri-moon-line text-lg'; }
    function updateBackLink() { var a = document.getElementById('back-link'); if (a) a.href = 'index.html?theme=' + (isDark() ? 'dark' : 'light'); }
    function toggleTheme() { document.documentElement.classList.toggle('dark'); localStorage.setItem('theme', isDark() ? 'dark' : 'light'); syncIcon(); updateBackLink(); }

    syncIcon(); updateBackLink(); buildGenreFilters(); renderGames();

  </script>
