<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Advanced Expense Splitter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-6 font-sans">

  <div class="max-w-4xl mx-auto space-y-6">
    <h1 class="text-3xl font-bold text-center">💸 Advanced Expense Splitter</h1>

    <!-- People Setup -->
    <div class="bg-slate-800 p-4 rounded-lg">
      <h2 class="text-xl font-semibold mb-2">👥 People</h2>
      <div class="flex gap-2 mb-2">
        <input type="text" id="personName" placeholder="Add person" class="flex-1 p-2 rounded bg-slate-700 border border-slate-600" />
        <button onclick="addPerson()" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Add</button>
      </div>
      <ul id="peopleList" class="space-y-1 text-sm"></ul>
    </div>

    <!-- Add Expense -->
    <div class="bg-slate-800 p-4 rounded-lg">
      <h2 class="text-xl font-semibold mb-2">➕ Add Expense</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <input id="expenseTitle" type="text" placeholder="Expense title" class="p-2 rounded bg-slate-700 border border-slate-600" />
        <input id="expenseAmount" type="number" placeholder="Amount" class="p-2 rounded bg-slate-700 border border-slate-600" />

        <select id="paidBy" class="p-2 rounded bg-slate-700 border border-slate-600">
          <option disabled selected>Paid by</option>
        </select>

        <select id="splitType" onchange="updateSplitType()" class="p-2 rounded bg-slate-700 border border-slate-600">
          <option value="equal">Split equally</option>
          <option value="custom">Split by amount</option>
        </select>
      </div>
      <div id="splitInputs" class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-4"></div>
      <button onclick="addExpense()" class="mt-4 bg-green-600 hover:bg-green-700 px-4 py-2 rounded w-full">Add Expense</button>
    </div>
  
   <!-- Transaction History -->
    <div class="bg-slate-800 p-4 rounded-lg">
      <h2 class="text-xl font-semibold mb-2">📜 Transactions</h2>
      <ul id="transactionList" class="space-y-2 text-sm"></ul>
    </div>

    <!-- Export Button -->
    <div class="text-center">
    <button onclick="exportImage()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded mb-2">
      📸 Export Summary as Image
    </button>
    </div>  

   <!-- Wrap content to export -->
  <div id="exportArea">
    <!-- Balance Ledger -->
    <div class="bg-slate-800 p-4 rounded-lg">
      <h2 class="text-xl font-semibold mb-2">🧾 Balances</h2>
      <ul id="balanceList" class="space-y-1 text-sm"></ul>
    </div>
  </div>

<script>
let people = JSON.parse(localStorage.getItem("splitter-people") || "[]");
let transactions = JSON.parse(localStorage.getItem("splitter-transactions") || "[]");

function save() {
  localStorage.setItem("splitter-people", JSON.stringify(people));
  localStorage.setItem("splitter-transactions", JSON.stringify(transactions));
}

function renderPeople() {
  const list = document.getElementById("peopleList");
  list.innerHTML = people.map((p, i) => `
    <li class="flex justify-between items-center bg-slate-700 px-2 py-1 rounded">
      <span>${p}</span>
      <div class="flex gap-2">
        <button onclick="editPerson(${i})" class="text-yellow-300 text-xs">✏️</button>
        <button onclick="deletePerson(${i})" class="text-red-400 text-xs">🗑️</button>
      </div>
    </li>
  `).join('');

  const paidBy = document.getElementById("paidBy");
  paidBy.innerHTML = '<option disabled selected>Paid by</option>' + people.map(p => `<option value="${p}">${p}</option>`).join('');

  updateSplitInputs();
}

function addPerson() {
  const name = document.getElementById("personName").value.trim();
  if (name && !people.includes(name)) {
    people.push(name);
    save();
    renderPeople();
    document.getElementById("personName").value = '';
  }
}

function editPerson(index) {
  const newName = prompt("Edit name:", people[index]);
  if (newName && newName.trim() !== "") {
    const oldName = people[index];
    people[index] = newName.trim();
    transactions = transactions.map(tx => {
      if (tx.paidBy === oldName) tx.paidBy = newName;
      if (tx.splits[oldName] !== undefined) {
        tx.splits[newName] = tx.splits[oldName];
        delete tx.splits[oldName];
      }
      return tx;
    });
    save();
    renderPeople();
    renderTransactions();
    renderBalances();
  }
}

function deletePerson(index) {
  const name = people[index];
  if (confirm(`Remove ${name}? This will delete related splits.`)) {
    people.splice(index, 1);
    transactions = transactions.filter(tx => tx.paidBy !== name);
    transactions.forEach(tx => delete tx.splits[name]);
    save();
    renderPeople();
    renderTransactions();
    renderBalances();
  }
}

function updateSplitInputs() {
  const container = document.getElementById("splitInputs");
  const type = document.getElementById("splitType").value;
  container.innerHTML = people.map(p => {
    const label = `<label class="font-medium">${p}</label>`;
    let input;
    if (type === "equal") {
      input = `<input type="checkbox" checked value="${p}" class="person-check">`;
    } else {
      input = `<input type="number" class="person-input p-1 bg-slate-700 rounded border border-slate-600" placeholder="${type === 'percent' ? '% share' : '₹ amount'}" data-person="${p}">`;
    }
    return `<div class="flex items-center justify-between">${label}${input}</div>`;
  }).join('');
}

function updateSplitType() {
  updateSplitInputs();
}

function addExpense() {
  const title = document.getElementById("expenseTitle").value;
  const amount = parseFloat(document.getElementById("expenseAmount").value);
  const paidBy = document.getElementById("paidBy").value;
  const type = document.getElementById("splitType").value;

  let splits = {};
    if (type === "equal") {
  const checkboxes = document.querySelectorAll(".person-check:checked");
  const share = parseFloat((amount / checkboxes.length).toFixed(2));
  checkboxes.forEach(cb => splits[cb.value] = share);
    } else {
  const inputs = document.querySelectorAll(".person-input");
  inputs.forEach(i => splits[i.dataset.person] = parseFloat(i.value || 0));
    }

  transactions.push({ title, amount, paidBy, splits });
  save();
  renderTransactions();
  renderBalances();
  document.getElementById("expenseTitle").value = "";
  document.getElementById("expenseAmount").value = "";
}

function renderTransactions() {
  const list = document.getElementById("transactionList");
  list.innerHTML = transactions.map((t, i) => {
    const splitDetails = Object.entries(t.splits).map(([p, a]) => `${p}: ₹${a}`).join(', ');
    return `<li class="bg-slate-700 p-2 rounded flex justify-between items-center">
      <div>
        <p><b>${t.title}</b> - ₹${t.amount} <span class="text-sm italic">(Paid by ${t.paidBy})</span></p>
        <p class="text-xs text-slate-300">Split: ${splitDetails}</p>
      </div>
      <button onclick="deleteTransaction(${i})" class="text-red-400">🗑️</button>
    </li>`;
  }).join('');
}

function deleteTransaction(index) {
  transactions.splice(index, 1);
  save();
  renderTransactions();
  renderBalances();
}

function renderBalances() {
  const balances = {};
  people.forEach(p => balances[p] = 0);
  transactions.forEach(t => {
    Object.entries(t.splits).forEach(([person, amt]) => {
      if (person !== t.paidBy) {
        balances[person] -= amt;
        balances[t.paidBy] += amt;
      }
    });
  });

  const list = document.getElementById("balanceList");
  list.innerHTML = Object.entries(balances).map(([p, b]) => {
    const color = b > 0 ? 'text-green-400' : b < 0 ? 'text-red-400' : 'text-slate-300';
    return `<li>${p}: <span class="${color} font-medium">₹${b.toFixed(2)}</span></li>`;
  }).join('');
}

renderPeople();
renderTransactions();
renderBalances();

function exportImage() {
  const target = document.getElementById("exportArea");
  html2canvas(target).then(canvas => {
    const link = document.createElement("a");
    link.download = "expense-summary.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
function exportImage() {
  // Load html2canvas dynamically
  const script = document.createElement("script");
  script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js";
  script.onload = () => {
    const target = document.getElementById("exportArea");
    html2canvas(target).then(canvas => {
      const link = document.createElement("a");
      link.download = "expense-summary.png";
      link.href = canvas.toDataURL();
      link.click();
    });
  };
  document.body.appendChild(script);
}

</script>

</body>
</html>
